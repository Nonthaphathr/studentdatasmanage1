  // Fix Excel-style date corruption — values like "6-Dec", "15-Mar", "Sat Dec 06 2025" or
  // serial numbers should be reverted to "6/12", "15/3" etc.
  // Returns the fixed string. Safe for non-date inputs (passes through).
  function fixDateLike(v){
    if(v==null) return '';
    var s = String(v).trim();
    if(!s) return '';
    var months = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
    // "6-Dec", "15-Mar"  →  "6/12", "15/3"
    var m1 = s.match(/^(\d{1,2})-([A-Za-z]{3})$/);
    if(m1 && months[m1[2]]){ return m1[1] + '/' + months[m1[2]]; }
    // "Dec-6", "Mar-15"  →  "6/12", "15/3"
    var m2 = s.match(/^([A-Za-z]{3})-(\d{1,2})$/);
    if(m2 && months[m2[1]]){ return m2[2] + '/' + months[m2[1]]; }
    // "Sat Dec 06 2025 ..."
    var m3 = s.match(/[A-Za-z]{3}\s+([A-Za-z]{3})\s+(\d{1,2})/);
    if(m3 && months[m3[1]]){ return parseInt(m3[2],10) + '/' + months[m3[1]]; }
    // ISO "2025-12-06"  →  "6/12"
    var m4 = s.match(/^\d{4}-(\d{1,2})-(\d{1,2})/);
    if(m4){ return parseInt(m4[2],10) + '/' + parseInt(m4[1],10); }
    return s;
  }

  // Extract last name (last whitespace-separated token) from a fullname string
  // e.g. "นาย สมชาย ใจดี" → "ใจดี", "เด็กหญิงกัลกร พร้อมพรม" → "พร้อมพรม"
  // Returns empty string if no clear last name (e.g. only a single token).
  function extractLastName(fullname){
    if(!fullname) return '';
    var s = String(fullname).trim();
    if(!s) return '';
    // Strip common Thai prefixes (without space)
    s = s.replace(/^(เด็กชาย|เด็กหญิง|ด\.ช\.|ด\.ญ\.|นางสาว|นาย|นาง)\s*/, '');
    var parts = s.split(/\s+/).filter(Boolean);
    if(parts.length < 2) return '';
    return parts[parts.length - 1];
  }

  function kvRow(k1,v1,k2,v2){
    function cell(v){
      if(v==='_BLANK_') return '<td></td>';                       // intentionally blank (for writing by pen)
      if(v==null || v==='') return '<td><span class="dash">-</span></td>';
      // Allow trusted HTML (for highlighted/styled values) using prefix marker
      if(typeof v==='string' && v.indexOf('__HTML__')===0) return '<td>'+v.slice(8)+'</td>';
      return '<td>'+escH(v)+'</td>';
    }
    var c1 = '<th>'+escH(k1)+'</th>'+cell(v1);
    var c2 = (k2!==undefined) ? ('<th>'+escH(k2)+'</th>'+cell(v2)) : '<th></th><td></td>';
    return '<tr>'+c1+c2+'</tr>';
  }
  function sectionTitle(t, c){
    return '<div class="sp-section" style="border-left-color:'+c+'">'+escH(t)+'</div>';
  }
  function escH(s){
    s = (s==null?'':String(s));
    return s.replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
  }

  window.openManualAddStudent = function(classId){
    if(!classId){ window.showToast('ยังไม่ได้เลือกห้อง','warning'); return; }
    var rm = (window.AppState.classrooms||[]).find(function(c){return c.id===classId});
    if(!rm){ window.showToast('ไม่พบห้อง','error'); return; }
    var info = window.GRADE_INFO[rm.grade];
    var clsLbl = window.classLabel(info.num, rm.room);

    var bd = document.createElement('div'); bd.className='modal-bd show';
    document.body.appendChild(bd);

    function fld(label, id, opts){
      opts = opts || {};
      var req = opts.required ? '<span style="color:#dc2626">*</span>' : '';
      var inp;
      if(opts.type==='select'){
        inp = '<select id="'+id+'">'+(opts.options||[]).map(function(o){return '<option value="'+window.escHTML(o.value||o)+'">'+window.escHTML(o.label||o)+'</option>';}).join('')+'</select>';
      } else if(opts.type==='textarea'){
        inp = '<textarea id="'+id+'" rows="2"></textarea>';
      } else {

    async function handleSave(){
      var V = function(id){ var el=bd.querySelector('#'+id); return el && el.value ? String(el.value).trim() : ''; };

      var prefix = V('masPrefix');
      var firstName = V('masFirstName');
      var lastName = V('masLastName');
      var nationalId = V('masNationalId').replace(/[^0-9]/g,'');
      var guardianPrefix = V('masGuardianPrefix');
      var guardianFirst = V('masGuardianFirstName');
      var guardianLast = V('masGuardianLastName');
      var guardianRel = V('masGuardianRel');
      var guardianPhone = V('masGuardianPhone');

      if(!prefix || !firstName || !lastName){ window.showToast('กรุณากรอก คำนำหน้า ชื่อ และนามสกุลของนักเรียน','warning'); return; }
      if(!nationalId || nationalId.length<13){ window.showToast('กรุณากรอกเลขบัตรประชาชน 13 หลักให้ครบ','warning'); return; }
      if(!guardianPrefix || !guardianFirst || !guardianLast || !guardianRel || !guardianPhone){
        window.showToast('กรุณากรอกข้อมูลผู้ปกครองให้ครบ','warning'); return;
      }

      try {
        window.showLoading(true,'กำลังบันทึก...');
        var fullName = prefix + firstName + ' ' + lastName;
        var gender = (prefix==='เด็กชาย'||prefix==='นาย')?'ชาย':((prefix==='เด็กหญิง'||prefix==='นางสาว'||prefix==='นาง')?'หญิง':'ไม่ระบุ');

        var fatherFirst = V('masFatherFirstName'), fatherLast = V('masFatherLastName'), fatherPrefix = V('masFatherPrefix');
        var fatherFull = (fatherFirst||fatherLast) ? ((fatherPrefix||'')+fatherFirst+(fatherLast?' '+fatherLast:'')) : '';
        var motherFirst = V('masMotherFirstName'), motherLast = V('masMotherLastName'), motherPrefix = V('masMotherPrefix');
        var motherFull = (motherFirst||motherLast) ? ((motherPrefix||'')+motherFirst+(motherLast?' '+motherLast:'')) : '';
        var guardianFull = guardianPrefix + guardianFirst + ' ' + guardianLast;

        var raw = {
          'วันที่บันทึก': new Date().toLocaleString('th-TH'),
          'ปีการศึกษา': String(rm.academicYear),
          'ชั้น/ห้อง': rm.room ? ('ม.'+info.num+'/'+rm.room) : ('ม.'+info.num),
          'เลขประจำตัวนักเรียน': V('masStudentId'),
          'ชื่อ-สกุลนักเรียน': fullName,
          'ชื่อเล่น': V('masNickname'),
          'เลขบัตรนักเรียน': nationalId,
          'วันเกิด(วัน)': V('masBirthDay'), 'วันเกิด(เดือน)': V('masBirthMonth'), 'วันเกิด(ปีพ.ศ.)': V('masBirthYear'),
          'อายุ': V('masAge'), 'น้ำหนัก(กก.)': V('masWeight'), 'ส่วนสูง(ซม.)': V('masHeight'),
          'สัญชาตินักเรียน': V('masNationality'), 'เชื้อชาตินักเรียน': V('masRace'), 'ศาสนานักเรียน': V('masReligion'),
          'โรคประจำตัว': V('masDisease'), 'โรงเรียนเดิม': V('masOldSchool'),
          'บ้านเลขที่นักเรียน': V('masHouseNo'), 'หมู่นักเรียน': V('masMoo'), 'หมู่บ้านนักเรียน': V('masVillage'),
          'ตำบลนักเรียน': V('masSubdistrict'), 'อำเภอนักเรียน': V('masDistrict'),
          'จังหวัดนักเรียน': V('masProvince'), 'รหัสไปรษณีย์นักเรียน': V('masPostal'),
          'โทรนักเรียน': V('masStudentPhone'),
          'ชื่อ-สกุลบิดา': fatherFull, 'คำนำหน้าบิดา': fatherPrefix, 'ชื่อบิดา': fatherFirst, 'นามสกุลบิดา': fatherLast,
          'อาชีพบิดา': V('masFatherJob'), 'โทรบิดา': V('masFatherPhone'),
          'สถานะบิดา': V('masFatherStatus'), 'รายได้บิดา': V('masFatherIncome'),
          'ชื่อ-สกุลมารดา': motherFull, 'คำนำหน้ามารดา': motherPrefix, 'ชื่อมารดา': motherFirst, 'นามสกุลมารดา': motherLast,
          'อาชีพมารดา': V('masMotherJob'), 'โทรมารดา': V('masMotherPhone'),
          'สถานะมารดา': V('masMotherStatus'), 'รายได้มารดา': V('masMotherIncome'),
          'สถานภาพบิดา-มารดา': V('masParentStatus'),
          'ชื่อผู้ปกครอง': guardianFull, 'คำนำหน้าผู้ปกครอง': guardianPrefix,
          'ชื่อจริงผู้ปกครอง': guardianFirst, 'นามสกุลผู้ปกครอง': guardianLast,
          'ความสัมพันธ์ผู้ปกครอง': guardianRel,
          'อาชีพผู้ปกครอง': V('masGuardianJob'),
          'โทรบ้านผู้ปกครอง': V('masGuardianHomePhone'),
          'โทรมือถือผู้ปกครอง': guardianPhone,
          'รายได้ผู้ปกครอง': V('masGuardianIncome'),
          'การเดินทาง': V('masTravel'), 'ระยะทาง(กม.)': V('masDistance'),
          '_addedManually': true,
          '_addedAt': new Date().toISOString()
        };

        var newStudent = {
          studentId: raw['เลขประจำตัวนักเรียน'] || nationalId,
          fullName: fullName,
          nickname: raw['ชื่อเล่น'],
          gender: gender,
          phone: raw['โทรนักเรียน'] || guardianPhone,
          raw: raw
        };

        var existing = await window.getStudentsOfClass(classId, true);
        var dup = existing.find(function(s){
          return (s.raw && s.raw['เลขบัตรนักเรียน']===nationalId) ||
                 (newStudent.studentId && s.studentId===newStudent.studentId);
        });
        if(dup){
          window.showLoading(false);
          window.showToast('พบข้อมูลซ้ำ — เลขบัตรประชาชนหรือเลขประจำตัวนี้มีอยู่แล้ว','error',5000);
          return;
        }
        var combined = existing.slice();
        combined.push(newStudent);
        combined.sort(function(a,b){
          var ia=String(a.studentId||'').trim(), ib=String(b.studentId||'').trim();
          if(!ia&&!ib) return (a.fullName||'').localeCompare(b.fullName||'','th');
          if(!ia) return 1; if(!ib) return -1;
          return ia.localeCompare(ib,'th',{numeric:true});
        });
        combined.forEach(function(s,i){ s.order = i+1; });

        await window.upsertClassroom({
          academicYear: rm.academicYear, grade: rm.grade, room: rm.room,
          studentCount: combined.length,
          maleCount: combined.filter(function(s){return s.gender==='ชาย';}).length,
          femaleCount: combined.filter(function(s){return s.gender==='หญิง';}).length,
          sourceFormat: rm.sourceFormat || 'A'
        });
        await window.bulkSaveStudents(classId, combined);

        window.AppState.studentsCache = {};
        window.showLoading(false);
        window.showToast('เพิ่มนักเรียน '+window.escHTML(fullName)+' เรียบร้อย','success');
        close();
        if(window.refreshCurrentView) window.refreshCurrentView();
      } catch(e){
        console.error(e);
        window.showLoading(false);
        window.showToast('บันทึกผิดพลาด: '+e.message,'error');
      }
    }
  };
})();
</script>

    {label:'การเดินทาง', keys:['การเดินทาง','ระยะทาง(กม.)']}
  ];

  // ── แตกชื่อรวม (บิดา/มารดา/ผู้ปกครอง) → คำนำหน้า/ชื่อ/สกุล ถ้ายังไม่มี ──
  // ใช้ร่วมกันทั้ง "เอกสาร QR (สรุปยังขาด)" และ "ฟอร์ม (ไฮไลต์ช่องที่ขาด)" ให้ตรงกันเป๊ะ
  window.PF_deriveRaw = function(raw){
    var praw = Object.assign({}, raw||{});
    function derive(combinedKey, prefixKey, firstKey, lastKey, prefixList){
      if(praw[firstKey] && String(praw[firstKey]).trim()) return;
      var c = String(praw[combinedKey]||'').trim();
      if(!c) return;
      var pfx='', rest=c;
      for(var i=0;i<prefixList.length;i++){ if(c.indexOf(prefixList[i])===0){ pfx=prefixList[i]; rest=c.slice(prefixList[i].length); break; } }
      rest = rest.trim();
      var sp = rest.indexOf(' ');
      if(!praw[prefixKey]) praw[prefixKey] = pfx;
      praw[firstKey] = sp>=0 ? rest.slice(0,sp) : rest;
      praw[lastKey] = sp>=0 ? rest.slice(sp+1).trim() : '';
    }
    derive('ชื่อ-สกุลบิดา','คำนำหน้าบิดา','ชื่อบิดา','นามสกุลบิดา',['นาย','ดร.','ผศ.','รศ.','ศ.']);
    derive('ชื่อ-สกุลมารดา','คำนำหน้ามารดา','ชื่อมารดา','นามสกุลมารดา',['นางสาว','นาง','ดร.','ผศ.','รศ.','ศ.']);
    derive('ชื่อผู้ปกครอง','คำนำหน้าผู้ปกครอง','ชื่อจริงผู้ปกครอง','นามสกุลผู้ปกครอง',['นาย','นางสาว','นาง','ดร.','ผศ.','รศ.','ศ.']);
    return praw;
  };

  // ── คืนรายการกลุ่มที่ "ยังขาด" (ใช้ตรรกะเดียวกับฟอร์มเป๊ะ) ──
  window.PF_getMissingLabels = function(raw){
    var praw = window.PF_deriveRaw(raw);
    var isMissing = window.PF_isMissing;
    return (window.PF_MISSING_CHECK||[]).filter(function(ck){
      return ck.keys.some(function(k){ return isMissing(praw[k]); });
    }).map(function(ck){ return ck.label; });
  };

  // ── สร้าง lookup: คีย์ raw → id ของช่องในฟอร์ม (จาก PF_FIELD_MAP) ──
  window.PF_keyToFieldId = function(){
    var m = {};
    (window.PF_FIELD_MAP||[]).forEach(function(f){ if(f.key && f.id) m[f.key] = f.id; });
    return m;
  };

  // Parse hash params: #form?grade=m1&room=1&year=2569
  function parseHashParams(){
    var hash = location.hash || '';
    var qIdx = hash.indexOf('?');
    var params = {};
    if(qIdx<0) return params;
    var qs = hash.slice(qIdx+1);
    qs.split('&').forEach(function(pair){
      var kv = pair.split('=');
      if(kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]||'');
    });
    return params;
  }

  //  โหมดปักหมุดบ้าน (สาธารณะ) — นักเรียนสแกน QR → เห็นชื่อ → กดปักหมุด → จบ
  //  บันทึก homeLat/homeLng ลงระเบียนนักเรียน (ใช้ร่วมกับแผนที่บ้านฝั่งครู)

  // โหลด SweetAlert2 (จาก cdnjs) ครั้งเดียว — มี fallback ถ้าโหลดไม่ได้
  window.PF_ensureSwal = function(cb){
    if(window.Swal){ cb(); return; }
    if(window.PF_ensureSwal._loading){ window.PF_ensureSwal._cbs.push(cb); return; }
    window.PF_ensureSwal._loading = true; window.PF_ensureSwal._cbs = [cb];
    var css = document.createElement('link'); css.rel='stylesheet';
    css.href='https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.min.css';
    document.head.appendChild(css);
    var js = document.createElement('script');
    js.src='https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js';
    js.onload = function(){ window.PF_ensureSwal._cbs.forEach(function(f){f();}); };
    js.onerror = function(){ window.PF_ensureSwal._cbs.forEach(function(f){f();}); }; // fallback จะใช้ alert ธรรมดา
    document.head.appendChild(js);
  };
  function pfSwalSuccess(title, text){
    if(window.Swal){
      window.Swal.fire({icon:'success', title:title, text:text||'', confirmButtonText:'ตกลง', confirmButtonColor:'#16a34a'});
    } else {
      // fallback: กล่องข้อความเรียบง่าย
      var ov = document.createElement('div');
      ov.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;z-index:99999';
      ov.innerHTML='<div style="background:#fff;border-radius:18px;padding:28px 26px;max-width:320px;text-align:center;font-family:Sarabun,sans-serif;box-shadow:0 20px 50px rgba(0,0,0,.25)">'+

        '<div style="color:#475569;font-size:.95rem;margin-bottom:16px">'+window.escHTML(text||'')+'</div>'+
        '<button style="background:#16a34a;color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:1rem;font-family:Kanit,sans-serif;cursor:pointer">ตกลง</button>'+
        '</div>';
      ov.querySelector('button').onclick=function(){ ov.remove(); };
      document.body.appendChild(ov);

  }
  function pfSwalError(title, text){
    if(window.Swal){ window.Swal.fire({icon:'error', title:title, text:text||'', confirmButtonText:'ปิด', confirmButtonColor:'#dc2626'}); }

    function pinViewUrl(lat,lng){ return 'https://www.google.com/maps?q='+lat+','+lng; }
    function pinParseLatLng(text){
      if(!text) return null;
      text = String(text).trim();
      var m;
      m = text.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/); if(m) return {lat:+m[1], lng:+m[2]};
      m = text.match(/@(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/);   if(m) return {lat:+m[1], lng:+m[2]};
      m = text.match(/[?&](?:q|ll|query|destination)=(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/); if(m) return {lat:+m[1], lng:+m[2]};
      m = text.match(/^(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)$/); if(m) return {lat:+m[1], lng:+m[2]};
      return null;
    }

          '<a href="'+pinViewUrl(student.homeLat, student.homeLng)+'" target="_blank" rel="noopener" style="display:inline-block;margin-top:4px;background:#dbeafe;color:#1e40af;border-radius:8px;padding:4px 12px;text-decoration:none;font-weight:600">🗺️ ดูบนแผนที่ Google</a>'+
        '</div>';
      }

      body.innerHTML =
        '<div style="font-size:46px;line-height:1;margin-bottom:.3rem">🏠</div>'+
        '<div style="font-family:Kanit,sans-serif;font-size:1.4rem;font-weight:700;color:#1f2937">'+window.escHTML(student.fullName||'(ไม่มีชื่อ)')+'</div>'+
        (student.studentId?('<div style="color:#64748b;margin-top:2px">เลขประจำตัว '+window.escHTML(student.studentId)+'</div>'):'')+
        '<div id="pinStatus" style="margin:14px 0;font-size:.95rem">'+statusHtml(hasPin)+'</div>'+
        '<div id="pinCurrentWrap">'+currentPinHtml()+'</div>'+
        '<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:12px 14px;color:#1e40af;font-size:.9rem;line-height:1.6;text-align:left;margin-bottom:1rem">'+
          '📌 <strong>วิธีปักหมุด:</strong> ให้ยืนอยู่ที่<strong>บ้านของตนเอง</strong> แล้วกดปุ่มด้านล่าง ระบบจะบันทึกตำแหน่งปัจจุบันเป็นที่ตั้งบ้าน<br>'+
          '<span style="font-size:.85em;color:#3730a3">* โปรดอนุญาตให้เว็บไซต์เข้าถึงตำแหน่ง (Location) เมื่อมีคำถามขึ้น</span>'+
        '</div>'+
        '<button id="pinBtn" style="width:100%;background:linear-gradient(135deg,#0891b2,#7c3aed);color:#fff;border:none;border-radius:14px;padding:16px;font-size:1.15rem;font-family:Kanit,sans-serif;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(124,58,237,.3)">📍 '+(hasPin?'ปักหมุดใหม่ (ตำแหน่งปัจจุบัน)':'ปักหมุดบ้านของฉัน')+'</button>'+
        // ── แก้ไขพิกัดด้วยลิงก์ Google Maps ──
        '<details style="margin-top:14px;text-align:left">'+
          '<summary style="cursor:pointer;color:#0891b2;font-weight:600;font-size:.92rem">✏️ แก้ไขหมุดด้วยลิงก์ Google Maps / พิกัด</summary>'+
          '<div style="margin-top:10px">'+

        '</details>';

      // ── ตัวบันทึกพิกัดกลาง (ใช้ทั้ง GPS และลิงก์) ──
      async function doSave(lat, lng){
        await window.savePhotoRef(classId, student.id, { homeLat: lat, homeLng: lng });
        student.homeLat = lat; student.homeLng = lng;
        var stt = body.querySelector('#pinStatus'); if(stt) stt.innerHTML = statusHtml(true);
        var cw  = body.querySelector('#pinCurrentWrap'); if(cw) cw.innerHTML = currentPinHtml();
        var b1  = body.querySelector('#pinBtn'); if(b1) b1.textContent = '📍 ปักหมุดใหม่ (ตำแหน่งปัจจุบัน)';
        pfSwalSuccess('บันทึกแล้ว', 'ระบบบันทึกตำแหน่งบ้านของ '+(student.fullName||'นักเรียน')+' เรียบร้อยแล้ว');
      }

      // ── ปักหมุด/ปักใหม่ ด้วย GPS ──
      var btn = body.querySelector('#pinBtn');
      btn.onclick = function(){
        if(!navigator.geolocation){ pfSwalError('อุปกรณ์ไม่รองรับ', 'เครื่องนี้ไม่รองรับการระบุตำแหน่ง (GPS)'); return; }
        var oldText = btn.textContent;
        btn.disabled = true; btn.textContent = '⏳ กำลังระบุตำแหน่ง...';
        navigator.geolocation.getCurrentPosition(async function(pos){
          try{
            await doSave(pos.coords.latitude, pos.coords.longitude);
            btn.disabled = false; btn.textContent = '📍 ปักหมุดใหม่ (ตำแหน่งปัจจุบัน)';
          }catch(e){
            btn.disabled = false; btn.textContent = '📍 ลองอีกครั้ง';
            pfSwalError('บันทึกไม่สำเร็จ', e.message);
          }
        }, function(err){
          btn.disabled = false; btn.textContent = oldText;
          var msg = 'ไม่สามารถระบุตำแหน่งได้';
          if(err && err.code===1) msg = 'ยังไม่ได้อนุญาตให้เข้าถึงตำแหน่ง — โปรดอนุญาตแล้วลองใหม่';
          else if(err && err.code===2) msg = 'หาตำแหน่งไม่พบ — โปรดตรวจสอบสัญญาณ GPS/อินเทอร์เน็ต';
          else if(err && err.code===3) msg = 'หมดเวลาในการระบุตำแหน่ง — ลองใหม่อีกครั้ง';
          pfSwalError('ปักหมุดไม่สำเร็จ', msg);
        }, { enableHighAccuracy:true, timeout:15000, maximumAge:0 });
      };

      // ── แก้ไขด้วยลิงก์ Google Maps / พิกัด ──
      var linkBtn = body.querySelector('#pinLinkBtn');
      var linkInput = body.querySelector('#pinLinkInput');
      linkBtn.onclick = async function(){
        var parsed = pinParseLatLng(linkInput.value);
        if(!parsed || !isFinite(parsed.lat) || !isFinite(parsed.lng) ||
           parsed.lat<-90 || parsed.lat>90 || parsed.lng<-180 || parsed.lng>180){
          pfSwalError('ลิงก์/พิกัดไม่ถูกต้อง', 'กรุณาวางลิงก์ Google Maps หรือพิกัดในรูปแบบ 15.123, 104.567');
          return;
        }
        linkBtn.disabled = true; linkBtn.textContent = '⏳ กำลังบันทึก...';
        try{
          await doSave(parsed.lat, parsed.lng);
          linkInput.value = '';
        }catch(e){
          pfSwalError('บันทึกไม่สำเร็จ', e.message);
        }
        linkBtn.disabled = false; linkBtn.textContent = '💾 บันทึกพิกัดจากลิงก์';
      };
    }
  };

    async function handleSubmit(){
      var btn = document.getElementById('pfSubmit');
      var $ = function(id){ return document.getElementById(id); };
      var V = function(id){ return ($(id) && $(id).value) ? $(id).value.trim() : ''; };

      // Validate required
      var prefix = V('pfPrefix');
      var firstName = V('pfFirstName');
      var lastName = V('pfLastName');
      var nationalId = V('pfNationalId').replace(/[^0-9]/g,'');
      var guardianPrefix = V('pfGuardianPrefix');
      var guardianFirst = V('pfGuardianFirstName');
      var guardianLast = V('pfGuardianLastName');
      var guardianRel = V('pfGuardianRel');
      var guardianPhone = V('pfGuardianPhone');

      if(!prefix || !firstName || !lastName){
        window.showToast('กรุณากรอกคำนำหน้า ชื่อ และนามสกุลของนักเรียนให้ครบ','warning');
        return;
      }
      if(!nationalId || nationalId.length<13){
        window.showToast('กรุณากรอกเลขบัตรประชาชน 13 หลักให้ครบถ้วน','warning');
        return;
      }
      if(!guardianPrefix || !guardianFirst || !guardianLast || !guardianRel || !guardianPhone){
        window.showToast('กรุณากรอกข้อมูลผู้ปกครองให้ครบ (คำนำหน้า ชื่อ นามสกุล ความสัมพันธ์ และเบอร์โทร)','warning');
        return;
      }

      btn.disabled = true; btn.textContent = 'กำลังส่ง...';

      try {
        var fullName = prefix + firstName + ' ' + lastName;
        var gender = (prefix==='เด็กชาย'||prefix==='นาย')?'ชาย':((prefix==='เด็กหญิง'||prefix==='นางสาว'||prefix==='นาง')?'หญิง':'ไม่ระบุ');

        // Build composed names — preserve original "ชื่อ-สกุล*" CSV schema
        var fatherFirst = V('pfFatherFirstName');
        var fatherLast = V('pfFatherLastName');
        var fatherPrefix = V('pfFatherPrefix');
        var fatherFull = (fatherFirst || fatherLast)
          ? ((fatherPrefix?fatherPrefix:'') + fatherFirst + (fatherLast?' '+fatherLast:''))
          : '';

        var motherFirst = V('pfMotherFirstName');
        var motherLast = V('pfMotherLastName');
        var motherPrefix = V('pfMotherPrefix');
        var motherFull = (motherFirst || motherLast)
          ? ((motherPrefix?motherPrefix:'') + motherFirst + (motherLast?' '+motherLast:''))
          : '';

        var guardianFull = guardianPrefix + guardianFirst + ' ' + guardianLast;

        // Build raw object matching Format A schema
        var raw = {
          'วันที่บันทึก': new Date().toLocaleString('th-TH'),
          'ปีการศึกษา': String(year),
          'ชั้น/ห้อง': room ? ('ม.'+info.num+'/'+room) : ('ม.'+info.num),
          'เลขประจำตัวนักเรียน': V('pfStudentId'),
          'ชื่อ-สกุลนักเรียน': fullName,
          'ชื่อเล่น': V('pfNickname'),
          'เลขบัตรนักเรียน': nationalId,
          'วันเกิด(วัน)': V('pfBirthDay'),
          'วันเกิด(เดือน)': V('pfBirthMonth'),
          'วันเกิด(ปีพ.ศ.)': V('pfBirthYear'),
          'อายุ': V('pfAge'),
          'น้ำหนัก(กก.)': V('pfWeight'),
          'ส่วนสูง(ซม.)': V('pfHeight'),
          'สัญชาตินักเรียน': V('pfNationality'),
          'เชื้อชาตินักเรียน': V('pfRace'),
          'ศาสนานักเรียน': V('pfReligion'),
          'โรคประจำตัว': V('pfDisease'),
          'โรงเรียนเดิม': V('pfOldSchool'),
          'บ้านเลขที่นักเรียน': V('pfHouseNo'),
          'หมู่นักเรียน': V('pfMoo'),
          'หมู่บ้านนักเรียน': V('pfVillage'),
          'ตำบลนักเรียน': V('pfSubdistrict'),
          'อำเภอนักเรียน': V('pfDistrict'),
          'จังหวัดนักเรียน': V('pfProvince'),
          'รหัสไปรษณีย์นักเรียน': V('pfPostal'),
          'โทรนักเรียน': V('pfStudentPhone'),
          // Father
          'ชื่อ-สกุลบิดา': fatherFull,
          'คำนำหน้าบิดา': fatherPrefix,
          'ชื่อบิดา': fatherFirst,
          'นามสกุลบิดา': fatherLast,
          'อาชีพบิดา': V('pfFatherJob'),
          'โทรบิดา': V('pfFatherPhone'),
          'สถานะบิดา': V('pfFatherStatus'),
          'รายได้บิดา': V('pfFatherIncome'),
          // Mother
          'ชื่อ-สกุลมารดา': motherFull,
          'คำนำหน้ามารดา': motherPrefix,
          'ชื่อมารดา': motherFirst,
          'นามสกุลมารดา': motherLast,
          'อาชีพมารดา': V('pfMotherJob'),
          'โทรมารดา': V('pfMotherPhone'),
          'สถานะมารดา': V('pfMotherStatus'),
          'รายได้มารดา': V('pfMotherIncome'),
          'สถานภาพบิดา-มารดา': V('pfParentStatus'),
          // Guardian
          'ชื่อผู้ปกครอง': guardianFull,
          'คำนำหน้าผู้ปกครอง': guardianPrefix,
          'ชื่อจริงผู้ปกครอง': guardianFirst,
          'นามสกุลผู้ปกครอง': guardianLast,
          'ความสัมพันธ์ผู้ปกครอง': guardianRel,
          'อาชีพผู้ปกครอง': V('pfGuardianJob'),
          'โทรบ้านผู้ปกครอง': V('pfGuardianHomePhone'),
          'โทรมือถือผู้ปกครอง': guardianPhone,
          'รายได้ผู้ปกครอง': V('pfGuardianIncome'),
          'การเดินทาง': V('pfTravel'),
          'ระยะทาง(กม.)': V('pfDistance'),
          '_submittedViaForm': true,
          '_submittedAt': new Date().toISOString()
        };

        // ════ โหมดเติมข้อมูล: รวมเข้าระเบียนเดิม (ไม่สร้างซ้ำ) ════
        if(fillMode && fillStudent){
          var existRaw = fillStudent.raw || {};
          var merged = Object.assign({}, existRaw);
          // เขียนทับเฉพาะค่าที่กรอกใหม่ (ไม่ว่าง) — คงค่าเดิมไว้ถ้าปล่อยว่าง
          Object.keys(raw).forEach(function(k){
            if(k==='_submittedViaForm' || k==='_submittedAt') return;
            var nv = raw[k];
            if(nv!=null && String(nv).trim()!=='') merged[k] = nv;
          });
          merged['ชื่อ-สกุลนักเรียน'] = fullName;
          merged['_lastFilledViaForm'] = true;
          merged['_lastFilledAt'] = new Date().toISOString();

          var patchFill = {
            fullName: fullName,
            gender: gender,
            nickname: merged['ชื่อเล่น'] || '',
            phone: merged['โทรนักเรียน'] || guardianPhone || '',
            raw: merged
          };
          // ถ้าเดิมยังไม่มีเลขประจำตัว แต่นักเรียนกรอกมา → อัปเดตค่าที่แสดง (รหัสเอกสารคงเดิม ครูปรับภายหลังได้)
          if(merged['เลขประจำตัวนักเรียน'] && merged['เลขประจำตัวนักเรียน']!==fillStudent.studentId){
            patchFill.studentId = merged['เลขประจำตัวนักเรียน'];
          }

          await window.updateStudent(fillClassId, fillStudent.id, patchFill);

          root.innerHTML =
            '<div class="pf-wrap">'+
              '<div class="pf-success">'+
                '<div class="pf-check">✅</div>'+
                '<h2>บันทึกข้อมูลเรียบร้อยแล้ว</h2>'+
                '<p style="color:#475569;margin:.5rem 0">ขอบคุณ <strong>'+window.escHTML(fullName)+'</strong></p>'+
                '<p style="color:#6b7280;font-size:.9rem;margin-top:1rem">ข้อมูลที่กรอกถูกเติมเข้าระเบียนเดิมในระบบสารสนเทศประจำชั้นแล้ว</p>'+
                '<button class="pf-submit" style="margin-top:1.5rem" onclick="location.reload()">แก้ไข/ดูอีกครั้ง</button>'+
              '</div>'+
            '</div>';
          window.scrollTo({top:0, behavior:'smooth'});
          return;
        }

        var student = {
          studentId: raw['เลขประจำตัวนักเรียน'] || nationalId,
          fullName: fullName,
          nickname: raw['ชื่อเล่น'],
          gender: gender,
          phone: raw['โทรนักเรียน'] || guardianPhone,
          raw: raw
        };

        // Use existing helpers — upsert classroom (creates if missing) then add student
        var classId = window.classroomId(year, grade, room);
        // Don't overwrite existing students — load existing and add new one
        var existing = await window.getStudentsOfClass(classId, true).catch(function(){return [];});
        // Check duplicate by national ID or studentId
        var dup = existing.find(function(s){
          return (s.raw && s.raw['เลขบัตรนักเรียน']===nationalId) ||
                 (student.studentId && s.studentId===student.studentId);
        });
        if(dup){
          window.showToast('พบข้อมูลซ้ำ — เลขบัตรประชาชนหรือเลขประจำตัวนี้มีอยู่แล้ว กรุณาติดต่อครูที่ปรึกษา','error',6000);

          return;
        }
        var combined = existing.slice();
        combined.push(student);
        // Re-sort by studentId
        combined.sort(function(a,b){
          var ia=String(a.studentId||'').trim(), ib=String(b.studentId||'').trim();
          if(!ia&&!ib) return (a.fullName||'').localeCompare(b.fullName||'','th');
          if(!ia) return 1; if(!ib) return -1;
          return ia.localeCompare(ib,'th',{numeric:true});
        });
        combined.forEach(function(s,i){ s.order = i+1; });

        await window.upsertClassroom({
          academicYear: year, grade: grade, room: room,
          studentCount: combined.length,
          maleCount: combined.filter(function(s){return s.gender==='ชาย';}).length,
          femaleCount: combined.filter(function(s){return s.gender==='หญิง';}).length,
          sourceFormat: 'A'
        });
        await window.bulkSaveStudents(classId, combined);

        // Show success screen
        root.innerHTML =
          '<div class="pf-wrap">'+
            '<div class="pf-success">'+
              '<div class="pf-check">✅</div>'+
              '<h2>ส่งข้อมูลเรียบร้อยแล้ว</h2>'+
              '<p style="color:#475569;margin:.5rem 0">ขอบคุณ <strong>'+window.escHTML(fullName)+'</strong></p>'+
              '<p style="color:#6b7280;font-size:.9rem;margin-top:1rem">ครูที่ปรึกษาจะตรวจสอบข้อมูลและบันทึกในระบบสารสนเทศประจำชั้นต่อไป</p>'+
              '<button class="pf-submit" style="margin-top:1.5rem" onclick="location.reload()">กรอกอีกคน</button>'+
            '</div>'+
          '</div>';
        window.scrollTo({top:0, behavior:'smooth'});
      } catch(e){
        console.error(e);
        window.showToast('ส่งข้อมูลไม่สำเร็จ: '+e.message,'error',5000);
        btn.disabled=false; btn.textContent = '📤 ส่งข้อมูล';
      }
    }

    renderForm();

    // ════ โหมดเติมข้อมูล: โหลดนักเรียน → prefill → ไฮไลต์ช่องที่ยังขาด ════
    var THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    function normMonth(v){
      var s = String(v==null?'':v).trim();
      if(!s) return '';
      // เลขไทย → อารบิก
      s = s.replace(/[๐-๙]/g, function(c){ return String('๐๑๒๓๔๕๖๗๘๙'.indexOf(c)); });
      // เป็นตัวเลข 1–12
      if(/^\d{1,2}$/.test(s)){ var n=parseInt(s,10); if(n>=1&&n<=12) return THAI_MONTHS[n-1]; }
      // ชื่อเต็มภาษาไทยตรงตัว
      if(THAI_MONTHS.indexOf(s)>=0) return s;
      // ตัวย่อภาษาไทย (ตัด . และช่องว่าง)
      var sa = s.replace(/[.\s]/g,'');
      var abbr = {'มค':0,'กพ':1,'มีค':2,'เมย':3,'พค':4,'มิย':5,'กค':6,'สค':7,'กย':8,'ตค':9,'พย':10,'ธค':11};
      if(abbr[sa]!=null) return THAI_MONTHS[abbr[sa]];
      // จับคู่บางส่วน (ขึ้นต้นตรงกัน)
      for(var i=0;i<THAI_MONTHS.length;i++){ if(THAI_MONTHS[i].indexOf(s)===0 || s.indexOf(THAI_MONTHS[i])===0) return THAI_MONTHS[i]; }
      // อังกฤษ
      var eng=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'], sl=s.toLowerCase();
      for(var j=0;j<eng.length;j++){ if(sl.indexOf(eng[j])===0) return THAI_MONTHS[j]; }
      return '';
    }
    function fillSetVal(id, val){
      var el = document.getElementById(id);
      if(!el) return;
      var v = (val==null?'':String(val));
      if(el.tagName === 'SELECT'){
        el.value = v;
        // ถ้าไม่ตรง option ใดเลย → จับคู่แบบ trim / ตัดเครื่องหมาย แล้วถ้ายังไม่ได้ ค่อยเพิ่ม option ใหม่
        if(el.selectedIndex === -1 && v.trim()){
          var vt = v.trim();
          var opts = el.options, idx = -1;
          // 1) ตรงตัวหลัง trim
          for(var i=0;i<opts.length;i++){
            if((opts[i].value||opts[i].text||'').trim() === vt){ idx = i; break; }
          }
          // 2) ตรงตัวหลังตัดช่องว่าง/จุด/ขีด (กันความต่างเล็กน้อย เช่น ตัวย่อ)
          if(idx<0){
            var norm = function(x){ return String(x).replace(/[\s.\-]/g,''); };
            var vn = norm(vt);
            for(var k=0;k<opts.length;k++){
              if(norm(opts[k].value||opts[k].text||'') === vn){ idx = k; break; }
            }
          }
          if(idx>=0){
            el.selectedIndex = idx;
          } else {
            // 3) คงค่าจริงจากระบบไว้: เพิ่มเป็นตัวเลือกใหม่แล้วเลือก (ไม่เดา/ไม่ทิ้งข้อมูล)
            var op = document.createElement('option');
            op.value = vt; op.text = vt; op.selected = true;
            el.appendChild(op);
            el.value = vt;
          }
        }
      } else {
        el.value = v;
      }
    }
    function fillMark(id){
      var el = document.getElementById(id);
      if(!el || !el.closest) return;
      var row = el.closest('.pf-row');
      if(!row || row.classList.contains('pf-missing')) return;
      row.classList.add('pf-missing');
      var lbl = row.querySelector('label');
      if(lbl && !lbl.querySelector('.pf-miss-badge')){
        var b = document.createElement('span');
        b.className = 'pf-miss-badge'; b.textContent = 'ต้องกรอก';
        lbl.appendChild(b);
      }
    }
    function prefillStudent(s){
      var orig = s.raw || {};
      // ใช้ตัวแตกชื่อกลาง (เหมือนเอกสาร QR เป๊ะ) → ฟอร์มและเอกสารจะตรงกัน
      var praw = window.PF_deriveRaw(orig);

      // ชื่อนักเรียน → คำนำหน้า/ชื่อ/สกุล
      var fn = s.fullName || praw['ชื่อ-สกุลนักเรียน'] || '';
      var sp_ = ['เด็กชาย','เด็กหญิง','นางสาว','นาย','นาง'];
      var pfx='', rest=fn;
      for(var i=0;i<sp_.length;i++){ if(fn.indexOf(sp_[i])===0){ pfx=sp_[i]; rest=fn.slice(sp_[i].length); break; } }
      rest = rest.trim();
      var spi = rest.indexOf(' ');
      fillSetVal('pfPrefix', pfx);
      fillSetVal('pfFirstName', spi>=0?rest.slice(0,spi):rest);
      fillSetVal('pfLastName', spi>=0?rest.slice(spi+1).trim():'');

      // เติมค่าจาก map (เฉพาะที่มีค่า)
      (window.PF_FIELD_MAP||[]).forEach(function(f){
        var v = praw[f.key];
        if(v==null || String(v).trim()==='') return;
        if(f.id==='pfBirthMonth') v = normMonth(v) || v; // แปลงเดือนให้ตรง option
        fillSetVal(f.id, v);
      });
      // ── ไฮไลต์ช่องที่ยังขาด ── ใช้ "กลุ่มเดียวกับเอกสาร QR" (PF_MISSING_CHECK)
      // เพื่อให้รายการที่เอกสารบอกว่าขาด ตรงกับช่องที่ถูกไฮไลต์ในฟอร์ม
      var k2id = window.PF_keyToFieldId();
      (window.PF_MISSING_CHECK||[]).forEach(function(ck){
        ck.keys.forEach(function(key){
          if(window.PF_isMissing(praw[key])){
            var fid = k2id[key];
            if(fid) fillMark(fid);
          }
        });
      });
    }

    if(fillMode){
      (async function(){
        var sbtn = document.getElementById('pfSubmit');
        if(sbtn){ sbtn.disabled=true; sbtn.textContent='กำลังโหลดข้อมูล...'; }
        try{
          var list = await window.getStudentsOfClass(fillClassId, true);
          var found = null;
          if(fillNid){
            found = list.find(function(x){
              return String((x.raw&&x.raw['เลขบัตรนักเรียน'])||'').replace(/[^0-9]/g,'')===fillNid;
            });
          }
          if(!found && fillSid){
            found = list.find(function(x){ return String(x.studentId||'').trim()===fillSid; });
          }
          if(!found){
            root.innerHTML = '<div class="pf-wrap"><div class="pf-card" style="text-align:center;border-top:6px solid #dc2626">'+
              '<h2 style="color:#b91c1c">ไม่พบข้อมูลนักเรียน</h2>'+
              '<p style="color:#475569;line-height:1.7">ไม่พบระเบียนที่ตรงกับ QR นี้ในห้อง <strong>'+window.escHTML(clsLbl)+'</strong> ปีการศึกษา '+year+'<br>กรุณาติดต่อครูที่ปรึกษา</p>'+
              '</div></div>';
            return;
          }
          fillStudent = found;
          // แบนเนอร์ระบุตัวตน
          var head = root.querySelector('.pf-head');
          if(head && head.parentNode){
            var banner = document.createElement('div');
            banner.style.cssText = 'background:linear-gradient(135deg,#ecfeff,#ede9fe);border:1px solid #a5b4fc;border-radius:14px;padding:12px 14px;margin-bottom:1rem;color:#3730a3;line-height:1.6';
            banner.innerHTML = '🧩 <strong>เติมข้อมูลที่ยังขาด</strong><br>นักเรียน: <strong>'+window.escHTML(found.fullName||'')+'</strong>'+(found.studentId?(' &nbsp;(เลขประจำตัว '+window.escHTML(found.studentId)+')'):'')+'<br><span style="font-size:.85em;color:#6366f1">ช่องที่มีกรอบสีเหลือง = ข้อมูลที่ยังขาด กรอกเฉพาะส่วนนั้นแล้วกดบันทึก (ช่องอื่นแก้ไขได้เช่นกัน)</span>';
            head.parentNode.insertBefore(banner, head.nextSibling);
          }
          prefillStudent(found);
          if(sbtn){ sbtn.disabled=false; sbtn.textContent='💾 บันทึกข้อมูลที่เติม'; }
          window.scrollTo({top:0, behavior:'smooth'});
        }catch(e){
          console.error(e);
          if(sbtn){ sbtn.disabled=false; sbtn.textContent='📤 ส่งข้อมูล'; }
          window.showToast('โหลดข้อมูลไม่สำเร็จ: '+e.message,'error',5000);
        }
      })();
    }

    // ── Custom autocomplete for pfVillage & pfOldSchool (mobile-friendly) ──
    (function(){
      var st = window.AppState && window.AppState.settings;
      if(!st) return;
      var schools  = (st.suggestSchools  || []).filter(Boolean);
      var villages = (st.suggestVillages || []).filter(Boolean);

      function setupAc(inputId, dropId, items){
        if(!items || !items.length) return;
        setTimeout(function(){
          var inp = document.getElementById(inputId);
          var drop = document.getElementById(dropId);
          if(!inp || !drop) return;
          var active = false;

          function showDrop(filter){
            var q = (filter||'').trim().toLowerCase();
            var hits = q ? items.filter(function(v){ return v.toLowerCase().indexOf(q)>=0; }) : items;
            if(!hits.length){ drop.style.display='none'; return; }
            drop.innerHTML = hits.map(function(v){
              return '<div class="pf-ac-item" data-val="'+window.escHTML(v)+'">'+window.escHTML(v)+'</div>';
            }).join('');
            drop.style.display = 'block';
            drop.querySelectorAll('.pf-ac-item').forEach(function(item){
              // Use touchstart + mousedown for fast mobile tap
              function pick(e){
                e.preventDefault();
                inp.value = item.dataset.val;
                drop.style.display = 'none';
                active = false;
                inp.blur();
              }
              item.addEventListener('touchstart', pick, {passive:false});
              item.addEventListener('mousedown', pick);
            });
          }

          inp.addEventListener('focus', function(){
            active = true;
            showDrop(inp.value);
          });
          inp.addEventListener('input', function(){
            active = true;
            showDrop(inp.value);
          });
          // Close on outside touch/click
          document.addEventListener('touchstart', function(e){
            if(active && !inp.contains(e.target) && !drop.contains(e.target)){
              drop.style.display='none'; active=false;
            }
          }, {passive:true});
          document.addEventListener('mousedown', function(e){
            if(active && !inp.contains(e.target) && !drop.contains(e.target)){
              drop.style.display='none'; active=false;
            }
          });
        }, 200);
      }

      setupAc('pfOldSchool', 'pfOldSchoolDrop', schools);
      setupAc('pfVillage',   'pfVillageDrop',   villages);
    })();
  };
})();

<!-- ═══════════════════════════════════════════════════════════════
     ANALYTICS MODULE — สารสนเทศนักเรียน
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function(){

// ─── Helpers ───────────────────────────────────────────────────
function escH(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

var PALETTE = [
  '#4338ca','#e11d48','#ea580c','#16a34a','#0891b2','#7c3aed',
  '#ca8a04','#db2777','#059669','#b45309','#1d4ed8','#be185d',
  '#0e7490','#15803d','#7e22ce','#b91c1c'
];

// ─── Normalization ──────────────────────────────────────────────
// แปลง "-", "–", "—", "ไม่มี", null, ว่าง → "ไม่ระบุ"
function normalizeVal(v){
  if(v==null) return 'ไม่ระบุ';
  var s = String(v).trim();
  if(!s || /^[-–—_\s]+$/.test(s)) return 'ไม่ระบุ';
  if(s==='ไม่มี'||s==='none'||s==='null'||s==='N/A'||s==='n/a') return 'ไม่ระบุ';
  return s;
}

// ─── คีย์ fuzzy สำหรับชื่อโรงเรียน/หมู่บ้าน ───────────────────
// ลบคำนำหน้าทั่วไป วรรค เครื่องหมาย แล้ว lowercase
function fuzzyKey(s){
  if(s==='ไม่ระบุ') return '__unspecified__';
  return s
    .replace(/โรงเรียน/g,'').replace(/วิทยาลัย/g,'').replace(/วิทยา/g,'')
    .replace(/ฯ/g,'').replace(/\s+/g,'').replace(/[.\-_]/g,'')
    .toLowerCase()
    .trim() || '__empty__';
}

// fuzzyGroup สำหรับโรงเรียน/หมู่บ้าน:
// → ใช้ชื่อที่มีความถี่สูงสุดในกลุ่มเป็น canonical
// (ผู้ใช้ปรับข้อมูลแล้ว ชื่อที่ถูกต้องจะมีจำนวนมากกว่า)
function fuzzyGroup(rawMap){
  var buckets = {}; // fuzzyKey → { canon, canonCount, students[] }
  Object.keys(rawMap).forEach(function(label){
    var fk = fuzzyKey(label);
    var cnt = rawMap[label].length;
    if(!buckets[fk]){
      buckets[fk] = { canon:label, canonCount:cnt, students:[] };
    } else {
      // เลือกชื่อที่มีความถี่มากกว่าเป็น canonical
      // ถ้าเท่ากัน ให้เลือกชื่อที่ยาวกว่า (สมบูรณ์กว่า)
      if(cnt > buckets[fk].canonCount ||
         (cnt === buckets[fk].canonCount && label.length > buckets[fk].canon.length)){
        buckets[fk].canon = label;
        buckets[fk].canonCount = cnt;
      }
    }
    buckets[fk].students = buckets[fk].students.concat(rawMap[label]);
  });
  return Object.values(buckets)
    .map(function(b){ return {label:b.canon, count:b.students.length, students:b.students}; })
    .sort(function(a,b){ return b.count-a.count; });
}

// จัดกลุ่มธรรมดา (ไม่ fuzzy)
function simpleGroup(rawMap){
  return Object.keys(rawMap)
    .map(function(k){ return {label:k, count:rawMap[k].length, students:rawMap[k]}; })
    .sort(function(a,b){ return b.count-a.count; });
}

// ─── Fuzzy grouping สำหรับอาชีพผู้ปกครอง ──────────────────────
// กฎ: keyword (ต้นคำ/ตรงทั้งหมด) → canon label
var JOB_RULES = [
  { canon:'รับจ้าง',    patterns:['รับจ้าง'] },
  { canon:'เกษตรกร',   patterns:['เกษตรกร','ทำนา','ทำสวน','ทำไร่','ชาวนา','ชาวสวน','ชาวไร่'] },
  { canon:'รปภ.',      patterns:['รปภ','รักษาความปลอดภัย','ยาม'] },
];

function jobCanon(raw){
  var s = raw.replace(/\s+/g,'');  // ลบช่องว่างทั้งหมดก่อนเทียบ
  for(var i=0;i<JOB_RULES.length;i++){
    var rule = JOB_RULES[i];
    for(var j=0;j<rule.patterns.length;j++){
      var p = rule.patterns[j].replace(/\s+/g,'');
      // ตรงกันตั้งแต่ต้น (startsWith) — ครอบคลุม "รับจ้างทั่วไป" จาก "รับจ้าง"
      if(s.indexOf(p)===0 || s===p) return rule.canon;
    }
  }
  return raw; // ไม่ตรงกฎใดเลย ใช้ชื่อเดิม
}

// jobGroup: ใช้กฎ JOB_RULES แล้ว simpleGroup ผลลัพธ์
function jobGroup(rawMap){
  var merged = {};
  Object.keys(rawMap).forEach(function(label){
    var canon = (label==='ไม่ระบุ') ? 'ไม่ระบุ' : jobCanon(label);
    merged[canon] = (merged[canon]||[]).concat(rawMap[label]);
  });
  return Object.keys(merged)
    .map(function(k){ return {label:k, count:merged[k].length, students:merged[k]}; })
    .sort(function(a,b){ return b.count-a.count; });
}

// นับและจัดกลุ่มนักเรียนตาม keyFn
// mode: 'simple' | 'fuzzy' | 'job'
function countBy(students, keyFn, mode){
  var rawMap = {};
  students.forEach(function(s){
    var k = normalizeVal(keyFn(s));
    rawMap[k] = rawMap[k] || [];
    rawMap[k].push(s);
  });
  if(mode==='fuzzy') return fuzzyGroup(rawMap);
  if(mode==='job')   return jobGroup(rawMap);
  return simpleGroup(rawMap);
}

// ─── Chart renderers ───────────────────────────────────────────
function renderBarChart(items, total){
  if(!items.length) return '<div class="muted" style="padding:.5rem;font-size:.9rem">ไม่มีข้อมูล</div>';
  var maxC = items[0].count || 1;
  var html = '<div class="bar-chart">';
  items.slice(0,18).forEach(function(item,i){
    var pct  = total ? (item.count/total*100).toFixed(1) : '0';
    var barW = Math.round(item.count/maxC*100);
    var c    = PALETTE[i%PALETTE.length];
    html += '<div class="bar-row">'+
      '<div class="bar-label" title="'+escH(item.label)+'">'+escH(item.label)+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+barW+'%;background:'+c+'">'+(barW>16?pct+'%':'')+'</div></div>'+
      '<div class="bar-pct">'+(barW<=16?pct+'%':'')+'</div>'+
      '<div class="bar-count">'+item.count+'</div>'+
      '</div>';
  });
  if(items.length>18) html += '<div style="font-size:.8rem;color:var(--ink-muted);margin-top:.3rem">...และอีก '+(items.length-18)+' รายการ</div>';
  html += '</div>';
  return html;
}

function renderPieChart(items){
  var shown = items.slice(0,9), rest = items.slice(9);
  if(rest.length){
    shown.push({label:'อื่นๆ ('+rest.length+' รายการ)', count:rest.reduce(function(s,x){return s+x.count;},0), students:[]});
  }
  var total = shown.reduce(function(s,x){return s+x.count;},0);
  if(!total) return '<div class="muted" style="padding:.5rem;font-size:.9rem">ไม่มีข้อมูล</div>';
  var cx=80,cy=80,r=72,angle=-Math.PI/2,paths='',legend='';
  shown.forEach(function(item,i){
    var sw=(item.count/total)*2*Math.PI; if(sw<0.001) return;
    var x1=(cx+r*Math.cos(angle)).toFixed(2),y1=(cy+r*Math.sin(angle)).toFixed(2);
    var a2=angle+sw;
    var x2=(cx+r*Math.cos(a2)).toFixed(2),y2=(cy+r*Math.sin(a2)).toFixed(2);
    var c=PALETTE[i%PALETTE.length];
    paths+='<path d="M'+cx+' '+cy+' L'+x1+' '+y1+' A'+r+' '+r+' 0 '+(sw>Math.PI?1:0)+' 1 '+x2+' '+y2+' Z" fill="'+c+'" stroke="#fff" stroke-width="2.5"/>';
    legend+='<div class="pie-legend-item">'+
      '<div class="pie-dot" style="background:'+c+'"></div>'+
      '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(item.label)+'</span>'+
      '<span style="font-weight:600;color:var(--ink);margin-left:auto;white-space:nowrap">'+item.count+'</span>'+
      '<span style="color:var(--ink-muted);font-size:.76rem;width:38px;text-align:right"> '+(item.count/total*100).toFixed(1)+'%</span></div>';
    angle=a2;
  });
  return '<div class="pie-wrap">'+
    '<svg width="160" height="160" viewBox="0 0 160 160" style="flex-shrink:0">'+paths+'</svg>'+
    '<div class="pie-legend">'+legend+'</div></div>';
}

// ─── setupAnalyticsCharts ───────────────────────────────────────
window.setupAnalyticsCharts = async function(){
  var container=document.getElementById('anaChartsContainer');
  var statsRow=document.getElementById('anaStatsRow');
  var subtitle=document.getElementById('anaSubtitle');
  if(!container) return;

  var st=window.AppState.settings||{}, cur=st.currentAcademicYear;
  var classes=(window.AppState.classrooms||[]).filter(function(c){ return c.academicYear===cur; });

  try{
    // โหลดนักเรียนทุกห้อง พร้อมแนบข้อมูลห้องเรียนไปด้วย
    var allStudents=[];
    for(var i=0;i<classes.length;i++){
      var sts=await window.getStudentsOfClass(classes[i].id);
      var cls=classes[i];
      sts.forEach(function(s){ s._classRef=cls; }); // แนบ class info
      allStudents=allStudents.concat(sts);
    }

    var total=allStudents.length;
    var males=allStudents.filter(function(s){return s.gender==='ชาย';}).length;
    var females=allStudents.filter(function(s){return s.gender==='หญิง';}).length;

    if(subtitle) subtitle.textContent='ปีการศึกษา '+cur+' · '+classes.length+' ห้องเรียน · นักเรียน '+total+' คน';

    if(statsRow){
      statsRow.innerHTML=
        mkStatBox(total,'นักเรียนทั้งหมด','#4338ca')+
        mkStatBox(males,'นักเรียนชาย','#1d4ed8')+
        mkStatBox(females,'นักเรียนหญิง','#be185d')+
        mkStatBox(classes.length,'ห้องเรียน','#16a34a');
    }

    // ── 5 หมวดข้อมูล ──
    var sections=[
      { id:'sec-disease', icon:'🏥', title:'โรคประจำตัว', type:'bar',
        items: countBy(allStudents, function(s){
          var v=s.raw&&s.raw['โรคประจำตัว']; return v||'';
        }, 'simple') },
      { id:'sec-school',  icon:'🏫', title:'โรงเรียนที่จบมา', type:'bar',
        items: countBy(allStudents, function(s){
          var r=s.raw||{}; return r['โรงเรียนเดิม']||r['เดิม']||r['ชื่อโรงเรียนเดิม']||r['โรงเรียนที่จบ']||'';
        }, 'fuzzy') },   // fuzzy: ชื่อที่มีความถี่มากสุดในกลุ่มเป็น canonical
      { id:'sec-village', icon:'🏘️', title:'หมู่บ้าน', type:'bar',
        items: countBy(allStudents, function(s){
          return (s.raw&&s.raw['หมู่บ้านนักเรียน'])||'';
        }, 'fuzzy') },
      { id:'sec-religion',icon:'🙏', title:'ศาสนาที่นับถือ', type:'pie',
        items: countBy(allStudents, function(s){
          return (s.raw&&s.raw['ศาสนานักเรียน'])||'';
        }, 'simple') },
      { id:'sec-job',     icon:'💼', title:'อาชีพของผู้ปกครอง', type:'bar',
        items: countBy(allStudents, function(s){
          var r=s.raw||{};
          return r['อาชีพผู้ปกครอง']||r['อาชีพบิดา']||r['อาชีพมารดา']||'';
        }, 'job') },     // job: รวมกลุ่มตามกฎ JOB_RULES
    ];

    window._anaData={ sections:sections, total:total, cur:cur, allStudents:allStudents };

    var html='<div class="analytics-grid">';
    sections.forEach(function(sec){
      var chart=sec.type==='pie'?renderPieChart(sec.items):renderBarChart(sec.items,total);
      var fullW=(sec.type==='bar'&&sec.items.length>6)?' full-width':'';
      html+='<div class="analytics-card'+fullW+'" id="'+sec.id+'">'+
        '<div class="ac2-head"><h3>'+sec.icon+' '+escH(sec.title)+
        ' <span class="tag">'+sec.items.length+' ประเภท</span></h3>'+
        '<button class="btn-pdf" onclick="window.exportSectionPDF(\''+sec.id+'\',\''+escH(sec.title)+'\')">📄 PDF</button>'+
        '</div>'+
        '<hr class="ac2-divider">'+
        '<div class="ac2-body">'+chart+'</div>'+
        '</div>';
    });
    html+='</div>';
    container.innerHTML=html;

  }catch(e){
    console.error(e);
    if(container) container.innerHTML=
      '<div class="room-empty"><div class="ic">❌</div><h3>โหลดข้อมูลไม่สำเร็จ</h3><p>'+escH(e.message)+'</p></div>';

};

          '<tr class="tr-total">'+

        '<div class="detail-section-hd">รายชื่อนักเรียน แยกตาม'+escH(sec.title)+'</div>'+

  var w=window.open('','_blank','width=960,height=760');

<script>
/* ═══════════════════════════════════════════════════════════════
   แผนที่บ้านนักเรียน (Home Map)
   - Leaflet + OpenStreetMap (ฟรี ไม่ต้องใช้ API key)
   - บันทึกพิกัด homeLat / homeLng ลง Firestore ผ่าน savePhotoRef (setDoc merge)
   - ปักหมุดได้ 3 วิธี: คลิกแผนที่ / วางลิงก์-พิกัด Google Maps / ใช้ GPS ปัจจุบัน
   - ปุ่มนำทางเปิด Google Maps จริง
   ═══════════════════════════════════════════════════════════════ */
(function(){
  var HM = { map:null, markers:{}, students:[], classId:null, selectedId:null };

  function loadLeaflet(cb){
    if(window.L){ cb(); return; }
    if(loadLeaflet._loading){ loadLeaflet._cbs.push(cb); return; }
    loadLeaflet._loading = true; loadLeaflet._cbs = [cb];
    var css = document.createElement('link');
    css.rel = 'stylesheet';
    css.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
    document.head.appendChild(css);
    var js = document.createElement('script');
    js.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
    js.onload = function(){ loadLeaflet._cbs.forEach(function(f){f();}); };
    js.onerror = function(){ window.showToast('โหลดไลบรารีแผนที่ไม่สำเร็จ — ตรวจสอบอินเทอร์เน็ต','error'); };
    document.head.appendChild(js);
  }

  function hasPin(s){ return typeof s.homeLat==='number' && typeof s.homeLng==='number'; }

  function shortAddr(s){
    var r = s.raw || {};
    var parts = [];
    if(r['บ้านเลขที่นักเรียน']) parts.push('บ้านเลขที่ '+r['บ้านเลขที่นักเรียน']);
    if(r['หมู่นักเรียน']) parts.push('หมู่ '+r['หมู่นักเรียน']);
    if(r['ตำบลนักเรียน']) parts.push('ต.'+r['ตำบลนักเรียน']);
    if(r['อำเภอนักเรียน']) parts.push('อ.'+r['อำเภอนักเรียน']);
    return parts.join(' ');
  }

  // ── แปลงลิงก์ Google Maps หรือข้อความพิกัด → {lat,lng} ──
  function parseLatLng(text){
    if(!text) return null;
    text = text.trim();
    var m;
    // รูปแบบ !3d15.123!4d104.567 (ลิงก์สถานที่)
    m = text.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/);
    if(m) return {lat:+m[1], lng:+m[2]};
    // รูปแบบ @15.123,104.567
    m = text.match(/@(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/);
    if(m) return {lat:+m[1], lng:+m[2]};
    // รูปแบบ q=15.123,104.567 หรือ ll=...
    m = text.match(/[?&](?:q|ll|query|destination)=(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/);
    if(m) return {lat:+m[1], lng:+m[2]};
    // พิกัดเปล่า "15.123, 104.567"
    m = text.match(/^(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)$/);
    if(m) return {lat:+m[1], lng:+m[2]};
    return null;
  }

  function gmapsNavUrl(lat,lng){
    return 'https://www.google.com/maps/dir/?api=1&destination='+lat+','+lng;
  }
  function gmapsViewUrl(lat,lng){
    return 'https://www.google.com/maps?q='+lat+','+lng;
  }

  // ── หน้าแผนที่ ──
  window.renderHomeMapPage = function(){
    var classId = window.AppState.currentClassId;
    if(!classId){ setTimeout(function(){ window.setView('main'); },0); return ''; }
    var rm = (window.AppState.classrooms||[]).find(function(r){return r.id===classId});
    var label = rm ? window.classLabel((window.GRADE_INFO&&window.GRADE_INFO[rm.grade]?window.GRADE_INFO[rm.grade].num:rm.grade), rm.room) : '';
    setTimeout(initHomeMap, 40);
    return '<div class="toolbar">'+
      '<button class="btn-back" data-act="backGrade">← กลับ</button>'+
      '<h2 class="section-title" style="margin:0"><span class="ico">🗺️</span> แผนที่บ้านนักเรียน '+window.escHTML(label)+'</h2>'+
      '</div>'+
      '<div class="hm-hint" id="hmHint">💡 เลือกนักเรียนจากรายชื่อด้านซ้าย แล้ว<b>คลิกบนแผนที่</b>เพื่อปักหมุดบ้าน — หมุดลากย้ายได้ และบันทึกอัตโนมัติ</div>'+
      '<div class="hm-wrap" style="margin-top:.6rem">'+
        '<div class="hm-side">'+
          '<div class="hm-side-head">'+
            '<input id="hmSearch" placeholder="🔍 ค้นหาชื่อนักเรียน...">'+
            '<div class="hm-count" id="hmCount"></div>'+
          '</div>'+
          '<div class="hm-list" id="hmList"><div style="padding:1rem;text-align:center;color:var(--ink-muted)">กำลังโหลด...</div></div>'+
        '</div>'+
        '<div class="hm-mapbox">'+
          '<div class="hm-toolbar">'+
            '<input id="hmPaste" placeholder="📋 วางลิงก์ Google Maps หรือพิกัด เช่น 15.2448, 104.8473 แล้วกด Enter">'+
            '<button class="btn" id="hmGps" title="ใช้ตำแหน่ง GPS ปัจจุบันปักหมุดให้นักเรียนที่เลือก">📡 ตำแหน่งปัจจุบัน</button>'+
          '</div>'+
          '<div id="hmMap"><div style="padding:2rem;text-align:center;color:var(--ink-muted)"><div class="spinner" style="margin:0 auto 1rem"></div>กำลังโหลดแผนที่...</div></div>'+
        '</div>'+
      '</div>';
  };

  async function initHomeMap(){
    var classId = window.AppState.currentClassId;
    HM.classId = classId; HM.selectedId = null; HM.markers = {};
    try{
      HM.students = await window.getStudentsOfClass(classId, true);
    }catch(e){
      window.showToast('โหลดข้อมูลนักเรียนไม่สำเร็จ: '+e.message,'error'); return;
    }
    renderList('');
    loadLeaflet(buildMap);

    var search = document.getElementById('hmSearch');
    if(search) search.oninput = function(){ renderList(this.value); };

    var paste = document.getElementById('hmPaste');
    if(paste) paste.onkeydown = function(ev){
      if(ev.key!=='Enter') return;
      var pos = parseLatLng(this.value);
      if(!pos){ window.showToast('อ่านพิกัดไม่ได้ — วางลิงก์เต็มจาก Google Maps หรือพิมพ์ "lat, lng" (ลิงก์ย่อ maps.app.goo.gl ใช้ไม่ได้ ให้เปิดลิงก์แล้วคัดลอกจากแถบ URL)','error',6000); return; }
      if(!HM.selectedId){ window.showToast('กรุณาเลือกนักเรียนจากรายชื่อก่อน','error'); return; }
      savePin(HM.selectedId, pos.lat, pos.lng);
      this.value='';
    };

    var gps = document.getElementById('hmGps');
    if(gps) gps.onclick = function(){
      if(!HM.selectedId){ window.showToast('กรุณาเลือกนักเรียนจากรายชื่อก่อน','error'); return; }
      if(!navigator.geolocation){ window.showToast('อุปกรณ์นี้ไม่รองรับ GPS','error'); return; }
      window.showToast('กำลังอ่านตำแหน่ง GPS...','info');
      navigator.geolocation.getCurrentPosition(function(p){
        savePin(HM.selectedId, p.coords.latitude, p.coords.longitude);
        if(HM.map) HM.map.setView([p.coords.latitude, p.coords.longitude], 17);
      }, function(){ window.showToast('อ่านตำแหน่งไม่สำเร็จ — กรุณาอนุญาตการเข้าถึงตำแหน่ง','error'); }, {enableHighAccuracy:true, timeout:12000});
    };
  }

  function buildMap(){
    var el = document.getElementById('hmMap');
    if(!el || !window.L) return;
    el.innerHTML = '';
    HM.map = L.map(el);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(HM.map);

    // ตั้งมุมมองเริ่มต้น: ครอบหมุดที่มี → ไม่มีหมุดใช้ GPS → ไม่ได้ก็กลางประเทศไทย
    var pinned = HM.students.filter(hasPin);
    if(pinned.length){
      var b = L.latLngBounds(pinned.map(function(s){return [s.homeLat, s.homeLng];}));
      HM.map.fitBounds(b.pad(0.25));
    }else{
      HM.map.setView([15.87, 100.99], 6);
      if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(p){
          HM.map.setView([p.coords.latitude, p.coords.longitude], 14);
        }, function(){}, {timeout:8000});
      }
    }

    HM.map.on('click', function(ev){
      if(!HM.selectedId){
        window.showToast('เลือกนักเรียนจากรายชื่อด้านซ้ายก่อน แล้วคลิกแผนที่เพื่อปักหมุด','info',3500);
        return;
      }
      savePin(HM.selectedId, ev.latlng.lat, ev.latlng.lng);
    });

    HM.students.forEach(function(s){ if(hasPin(s)) addMarker(s); });
  }

  function pinIcon(sel){
    return L.divIcon({className:'', html:'<div class="hm-pin'+(sel?' sel':'')+'">'+(sel?'🔴':'📍')+'</div>', iconSize:[26,26], iconAnchor:[13,24]});
  }

  function addMarker(s){
    if(HM.markers[s.id]){ HM.map.removeLayer(HM.markers[s.id]); }
    var mk = L.marker([s.homeLat, s.homeLng], {draggable:true, icon:pinIcon(HM.selectedId===s.id)}).addTo(HM.map);
    mk.bindTooltip(s.fullName||'', {direction:'top', offset:[0,-22]});
    mk.bindPopup(popupHtml(s));
    mk.on('dragend', function(){
      var ll = mk.getLatLng();
      savePin(s.id, ll.lat, ll.lng, true);
    });
    mk.on('click', function(){ selectStudent(s.id, false); });
    HM.markers[s.id] = mk;
  }

  function popupHtml(s){
    var addr = shortAddr(s);
    return '<div class="hm-pop"><b>'+window.escHTML(s.fullName||'')+'</b>'+
      (addr?'<div class="addr">'+window.escHTML(addr)+'</div>':'')+
      '<div class="row">'+
        '<a class="nav" target="_blank" rel="noopener" href="'+gmapsNavUrl(s.homeLat,s.homeLng)+'">🧭 นำทาง</a>'+
        '<button class="del" onclick="window.hmDeletePin(\''+s.id+'\')">🗑 ลบหมุด</button>'+
      '</div>'+
      '<div class="row"><a target="_blank" rel="noopener" style="background:#e0e7ff;color:#3730a3" href="'+gmapsViewUrl(s.homeLat,s.homeLng)+'">เปิดใน Google Maps</a></div>'+
    '</div>';
  }

  function renderList(filter){
    var list = document.getElementById('hmList');
    var count = document.getElementById('hmCount');
    if(!list) return;
    var f = (filter||'').trim().toLowerCase();
    var pinned = HM.students.filter(hasPin).length;
    if(count) count.textContent = 'ปักหมุดแล้ว '+pinned+' / '+HM.students.length+' คน';
    var html = '';
    HM.students.forEach(function(s){
      var name = (s.fullName||'') + ' ' + (s.nickname||'');
      if(f && name.toLowerCase().indexOf(f)===-1) return;
      var p = hasPin(s);
      html += '<div class="hm-item'+(HM.selectedId===s.id?' sel':'')+'" data-sid="'+s.id+'">'+
        '<span class="st">'+(p?'📍':'⚪')+'</span>'+
        '<span class="nm">'+window.escHTML(s.fullName||'')+
          '<small>'+(p?'ปักหมุดแล้ว':'ยังไม่ปักหมุด')+(s.nickname?' · '+window.escHTML(s.nickname):'')+'</small></span>'+
        (p?'<button class="nav-btn" data-nav="'+s.id+'" title="นำทางด้วย Google Maps">🧭</button>':'')+
      '</div>';
    });
    list.innerHTML = html || '<div style="padding:1rem;text-align:center;color:var(--ink-muted)">ไม่พบนักเรียน</div>';
    list.querySelectorAll('.hm-item').forEach(function(el){
      el.onclick = function(ev){
        if(ev.target.dataset && ev.target.dataset.nav){
          var s = HM.students.find(function(x){return x.id===ev.target.dataset.nav});
          if(s && hasPin(s)) window.open(gmapsNavUrl(s.homeLat,s.homeLng),'_blank');
          return;
        }
        selectStudent(el.dataset.sid, true);
      };
    });
  }

  function selectStudent(sid, panTo){
    var prev = HM.selectedId;
    HM.selectedId = sid;
    // อัปเดตไอคอนหมุดเก่า/ใหม่
    [prev, sid].forEach(function(id){
      if(!id) return;
      var s = HM.students.find(function(x){return x.id===id});
      if(s && hasPin(s) && HM.markers[id]) HM.markers[id].setIcon(pinIcon(HM.selectedId===id));
    });
    var sEl = document.getElementById('hmSearch');
    renderList(sEl?sEl.value:'');
    var s = HM.students.find(function(x){return x.id===sid});
    var hint = document.getElementById('hmHint');
    if(hint && s){
      hint.innerHTML = hasPin(s)
        ? '✏️ <b>'+window.escHTML(s.fullName||'')+'</b> — คลิกแผนที่เพื่อย้ายหมุด หรือลากหมุดได้เลย (บันทึกอัตโนมัติ)'
        : '📌 <b>'+window.escHTML(s.fullName||'')+'</b> — คลิกตำแหน่งบ้านบนแผนที่เพื่อปักหมุด หรือวางลิงก์ Google Maps ด้านบน';
    }
    if(panTo && s && hasPin(s) && HM.map){
      HM.map.setView([s.homeLat, s.homeLng], Math.max(HM.map.getZoom(), 16));
      if(HM.markers[sid]) HM.markers[sid].openPopup();
    }
  }

  async function savePin(sid, lat, lng, silent){
    var s = HM.students.find(function(x){return x.id===sid});
    if(!s) return;
    lat = Math.round(lat*1e6)/1e6; lng = Math.round(lng*1e6)/1e6;
    s.homeLat = lat; s.homeLng = lng;
    addMarker(s);
    var sEl = document.getElementById('hmSearch');
    renderList(sEl?sEl.value:'');
    selectStudent(sid, false);
    try{
      // setDoc merge — ทนทานต่อ docId stale เช่นเดียวกับการบันทึกรูป
      await window.savePhotoRef(HM.classId, sid, {homeLat:lat, homeLng:lng});
      if(!silent) window.showToast('📍 บันทึกหมุดบ้าน '+(s.fullName||'')+' เรียบร้อย','success');
    }catch(e){
      window.showToast('บันทึกหมุดไม่สำเร็จ: '+e.message,'error');
    }
  }

  window.hmDeletePin = async function(sid){
    var s = HM.students.find(function(x){return x.id===sid});
    if(!s) return;
    if(!confirm('ลบหมุดบ้านของ '+(s.fullName||'นักเรียนคนนี้')+' ?')) return;
    s.homeLat = null; s.homeLng = null;
    if(HM.markers[sid]){ HM.map.removeLayer(HM.markers[sid]); delete HM.markers[sid]; }
    var sEl = document.getElementById('hmSearch');
    renderList(sEl?sEl.value:'');
    try{
      await window.savePhotoRef(HM.classId, sid, {homeLat:null, homeLng:null});
      window.showToast('ลบหมุดเรียบร้อย','success');
    }catch(e){
      window.showToast('ลบหมุดไม่สำเร็จ: '+e.message,'error');
    }
  };
})();
</script>
</body>
</html>
