<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>ระบบสารสนเทศชั้นเรียน — โรงเรียนกระดุมทองวิทยา</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════════════════════ */
:root{
  --c-m1:#e11d48; --c-m2:#ea580c; --c-m3:#ca8a04;
  --c-m4:#16a34a; --c-m5:#0891b2; --c-m6:#7c3aed;
  --bg:#f6f7fb; --surface:#fff; --ink:#1f2937; --ink-muted:#6b7280;
  --border:#e5e7eb; --border-strong:#d1d5db;
  --primary:#4338ca; --primary-2:#6366f1;
  --success:#16a34a; --warning:#d97706; --danger:#dc2626; --info:#0891b2;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 14px rgba(0,0,0,.08);
  --shadow-lg:0 14px 40px rgba(0,0,0,.12);
  --r-sm:8px; --r:12px; --r-lg:16px; --r-xl:20px;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:'Sarabun',system-ui,sans-serif;color:var(--ink);background:var(--bg);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;font-variant-numeric:normal;unicode-bidi:plaintext}
h1,h2,h3,h4{font-family:'Kanit',sans-serif;font-weight:600;margin:0;color:var(--ink)}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px}
a{color:var(--primary);text-decoration:none}

/* ═══════════════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════════════ */
#app{min-height:100vh;display:flex;flex-direction:column}
.page{flex:1;padding:1.5rem;max-width:1200px;width:100%;margin:0 auto}
@media(max-width:640px){.page{padding:1rem}}

.app-header{background:linear-gradient(135deg,#4338ca 0%,#6366f1 100%);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;box-shadow:var(--shadow);position:sticky;top:0;z-index:50}
.app-header img.logo{width:48px;height:48px;border-radius:50%;background:#fff;padding:4px;flex-shrink:0}
.app-header .titles{flex:1;min-width:0}
.app-header .titles h1{font-size:1.15rem;color:#fff;font-weight:600;line-height:1.2}
.app-header .titles p{margin:0;font-size:.85rem;opacity:.9}
.app-header .year-badge{background:rgba(255,255,255,.2);padding:.4rem .8rem;border-radius:999px;font-size:.85rem;font-weight:500;white-space:nowrap}
.app-header .icon-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:.2s}
.app-header .icon-btn:hover{background:rgba(255,255,255,.3);transform:rotate(30deg)}

.app-footer{background:var(--surface);border-top:1px solid var(--border);padding:1rem 1.5rem;text-align:center;font-size:.82rem;color:var(--ink-muted);line-height:1.6}
.app-footer strong{color:var(--ink)}

/* ═══════════════════════════════════════════════════════════════
   SPLASH / LANDING
   ═══════════════════════════════════════════════════════════════ */
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#4338ca 0%,#7c3aed 50%,#e11d48 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;text-align:center;padding:1.5rem;transition:opacity .6s,visibility .6s}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
#splash .splash-logo{width:140px;height:140px;border-radius:50%;background:#fff;padding:12px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:logoIn 1.2s cubic-bezier(.2,.8,.2,1) both}
#splash .splash-welcome{font-family:'Kanit',sans-serif;font-size:2.4rem;font-weight:700;margin-top:2rem;animation:textIn .9s .5s cubic-bezier(.2,.8,.2,1) both}
#splash .splash-school{font-size:1.3rem;font-weight:300;margin-top:.5rem;opacity:.95;animation:textIn .9s .8s cubic-bezier(.2,.8,.2,1) both}
#splash .splash-tagline{margin-top:1.5rem;font-size:.95rem;opacity:.85;animation:textIn .9s 1.1s cubic-bezier(.2,.8,.2,1) both}
@keyframes logoIn{from{opacity:0;transform:scale(.4) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes textIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@media(max-width:640px){#splash .splash-logo{width:110px;height:110px}#splash .splash-welcome{font-size:1.8rem}#splash .splash-school{font-size:1.05rem}}

/* ═══ Public Student Form ═══ */
html.public-form, html.public-form body{background:linear-gradient(135deg,#f0f9ff 0%,#fef3c7 100%);min-height:100vh}
.pf-wrap{max-width:720px;margin:0 auto;padding:1.5rem 1rem 4rem;font-family:'Sarabun',sans-serif}
.pf-head{background:#fff;border-radius:18px;padding:1.5rem;text-align:center;box-shadow:0 10px 30px rgba(67,56,202,.15);margin-bottom:1rem;border-top:6px solid #6366f1}
.pf-head img{width:80px;height:80px;border-radius:50%;background:#fff;padding:6px;margin-bottom:.5rem;object-fit:contain}
.pf-head h1{font-family:'Kanit',sans-serif;color:#4338ca;font-size:1.4rem;margin:.3rem 0;font-weight:600}
.pf-head .pf-school{font-size:1rem;color:#475569;margin:.2rem 0}
.pf-head .pf-class{display:inline-block;background:#eef2ff;color:#4338ca;padding:.3rem .9rem;border-radius:999px;font-weight:600;margin-top:.5rem;font-size:.95rem}
.pf-card{background:#fff;border-radius:18px;padding:1.25rem;box-shadow:0 4px 16px rgba(0,0,0,.06);margin-bottom:1rem}
.pf-card h2{font-family:'Kanit',sans-serif;color:#4338ca;font-size:1.1rem;margin:0 0 .8rem;border-bottom:2px solid #eef2ff;padding-bottom:.4rem}
.pf-row{margin-bottom:.85rem}
.pf-row label{display:block;font-weight:600;color:#374151;margin-bottom:.3rem;font-size:.95rem}
.pf-row label .req{color:#dc2626;margin-left:.2rem}
.pf-row input,.pf-row select,.pf-row textarea{width:100%;padding:.7rem .85rem;border:1.5px solid #e5e7eb;border-radius:10px;font-size:16px;font-family:inherit;background:#fff;-webkit-appearance:none;touch-action:manipulation}
.pf-row input:focus,.pf-row select:focus,.pf-row textarea:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.pf-row textarea{min-height:80px;resize:vertical}
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.pf-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem}
@media(max-width:520px){.pf-grid,.pf-grid-3{grid-template-columns:1fr}}
.pf-hint{font-size:.82rem;color:#6b7280;margin-top:.2rem}
.pf-submit{width:100%;background:linear-gradient(135deg,#4338ca,#7c3aed);color:#fff;border:none;padding:1rem;border-radius:14px;font-size:1.05rem;font-weight:600;font-family:'Kanit',sans-serif;cursor:pointer;box-shadow:0 8px 20px rgba(67,56,202,.3);margin-top:.5rem;transition:.2s}
.pf-submit:active{transform:scale(.98)}
.pf-submit:disabled{opacity:.6;cursor:not-allowed}
.pf-success{background:#fff;border-radius:18px;padding:2rem 1.5rem;text-align:center;box-shadow:0 10px 30px rgba(16,185,129,.2);border-top:6px solid #10b981}
.pf-success .pf-check{font-size:4rem;color:#10b981;margin-bottom:.5rem}
.pf-success h2{font-family:'Kanit',sans-serif;color:#059669;font-size:1.5rem;margin:.3rem 0}
.pf-error{background:#fef2f2;border:1px solid #fca5a5;color:#b91c1c;padding:1rem;border-radius:12px;margin-bottom:1rem}
.pf-foot{text-align:center;color:#6b7280;font-size:.85rem;margin-top:1.5rem;line-height:1.6}

/* ═══════════════════════════════════════════════════════════════
   GRADE CARDS GRID
   ═══════════════════════════════════════════════════════════════ */
.section-title{font-family:'Kanit',sans-serif;font-size:1.6rem;font-weight:600;margin-bottom:1.25rem;display:flex;align-items:center;gap:.6rem}
.section-title .ico{font-size:1.5rem}

.grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem}
@media(max-width:900px){.grade-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.grade-grid{grid-template-columns:1fr}}
.grade-card{background:var(--surface);border-radius:var(--r-lg);padding:1.5rem;box-shadow:var(--shadow-sm);border:1px solid var(--border);cursor:pointer;transition:.25s;overflow:hidden;position:relative}
.grade-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--accent,#999)}
.grade-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--accent)}
.grade-card .gc-top{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
.grade-card .gc-icon{width:54px;height:54px;border-radius:14px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Kanit',sans-serif;font-weight:700;font-size:1.4rem;flex-shrink:0}
.grade-card .gc-title{font-family:'Kanit',sans-serif;font-size:1.4rem;font-weight:600;color:var(--ink)}
.grade-card .gc-sub{font-size:.9rem;color:var(--ink-muted);margin-top:.15rem}
.grade-card .gc-stats{display:flex;gap:.8rem;margin-top:.75rem}
.grade-card .gc-stat{flex:1;background:var(--bg);border-radius:var(--r);padding:.65rem .8rem}
.grade-card .gc-stat .lbl{font-size:.78rem;color:var(--ink-muted);margin-bottom:.15rem}
.grade-card .gc-stat .val{font-family:'Kanit',sans-serif;font-size:1.25rem;font-weight:600;color:var(--accent)}

/* ═══════════════════════════════════════════════════════════════
   ROOM TABS
   ═══════════════════════════════════════════════════════════════ */
.toolbar{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:1.25rem}
.btn-back{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.55rem 1rem;font-size:.95rem;color:var(--ink);display:inline-flex;align-items:center;gap:.4rem;transition:.2s}
.btn-back:hover{background:var(--bg);border-color:var(--border-strong)}

.room-tabs{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1.25rem;border-bottom:1px solid var(--border)}
.room-tabs::-webkit-scrollbar{height:6px}
.room-tabs::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.room-tab{background:var(--surface);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;padding:.6rem 1.1rem;font-size:.95rem;color:var(--ink);white-space:nowrap;transition:.15s;border-bottom:none;position:relative;top:1px}
.room-tab:hover{background:var(--bg)}
.room-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.room-tab.add-room{background:transparent;border:1px dashed var(--border-strong);color:var(--accent)}
.room-tab.add-room:hover{background:#fff;border-color:var(--accent)}

.room-empty{background:var(--surface);border:2px dashed var(--border-strong);border-radius:var(--r-lg);padding:3rem 1.5rem;text-align:center;color:var(--ink-muted)}
.room-empty .ic{font-size:3rem;margin-bottom:.75rem;opacity:.5}
.room-empty h3{font-family:'Kanit',sans-serif;color:var(--ink);margin-bottom:.5rem}

/* ═══════════════════════════════════════════════════════════════
   ROOM SUMMARY + ACTION CARDS
   ═══════════════════════════════════════════════════════════════ */
.room-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;margin-bottom:1.25rem;display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:start}
@media(max-width:720px){.room-summary{grid-template-columns:1fr}}
.room-summary .rs-info h2{font-family:'Kanit',sans-serif;color:var(--accent);font-size:1.4rem;margin-bottom:.4rem}
.room-summary .rs-meta{display:flex;flex-wrap:wrap;gap:.8rem;margin-top:.6rem;font-size:.9rem;color:var(--ink-muted)}
.room-summary .rs-meta span{background:var(--bg);padding:.3rem .65rem;border-radius:999px}
.room-summary .rs-actions{display:flex;flex-wrap:wrap;gap:.4rem}

.action-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
@media(max-width:640px){.action-cards{grid-template-columns:1fr}}
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.5rem;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:1rem}
.action-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--accent)}
.action-card .ac-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent),#000 20%));color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0}
.action-card .ac-text h3{font-family:'Kanit',sans-serif;font-size:1.2rem;margin-bottom:.25rem}
.action-card .ac-text p{margin:0;color:var(--ink-muted);font-size:.9rem}

/* ═══ Add-student CTA (green animated) ═══ */
.add-student-cta{display:flex;align-items:center;gap:1rem;width:100%;margin-top:1rem;padding:1.1rem 1.4rem;background:linear-gradient(135deg,#10b981 0%,#059669 50%,#047857 100%);color:#fff;border:none;border-radius:var(--r-lg);cursor:pointer;font-family:'Kanit',sans-serif;font-size:1.05rem;text-align:left;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(16,185,129,.35),inset 0 1px 0 rgba(255,255,255,.2);transition:transform .15s ease,box-shadow .15s ease;animation:ascPulse 2.4s ease-in-out infinite}
.add-student-cta:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(16,185,129,.5),inset 0 1px 0 rgba(255,255,255,.25)}
.add-student-cta:active{transform:translateY(0)}
.add-student-cta .asc-icon{font-size:2rem;background:rgba(255,255,255,.2);width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:ascBounce 1.8s ease-in-out infinite}
.add-student-cta .asc-text{display:flex;flex-direction:column;flex:1;line-height:1.3}
.add-student-cta .asc-text strong{font-size:1.15rem;font-weight:700}
.add-student-cta .asc-text small{font-size:.86rem;font-weight:400;opacity:.92;margin-top:2px}
.add-student-cta .asc-shine{position:absolute;top:0;left:-30%;width:30%;height:100%;background:linear-gradient(110deg,transparent 0%,rgba(255,255,255,.35) 50%,transparent 100%);transform:skewX(-20deg);animation:ascShine 3.5s ease-in-out infinite;pointer-events:none}
@keyframes ascPulse{0%,100%{box-shadow:0 8px 24px rgba(16,185,129,.35),inset 0 1px 0 rgba(255,255,255,.2)}50%{box-shadow:0 8px 30px rgba(16,185,129,.6),inset 0 1px 0 rgba(255,255,255,.25)}}
@keyframes ascBounce{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-3px) rotate(-5deg)}75%{transform:translateY(-3px) rotate(5deg)}}
@keyframes ascShine{0%{left:-30%}45%,100%{left:130%}}

/* ═══════════════════════════════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════════════════════════════ */
.btn{border:none;border-radius:var(--r);padding:.6rem 1.1rem;font-size:.95rem;font-weight:500;display:inline-flex;align-items:center;gap:.4rem;transition:.15s;background:var(--surface);color:var(--ink);border:1px solid var(--border)}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-2)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover{filter:brightness(1.1)}
.btn-warning{background:var(--warning);color:#fff;border-color:var(--warning)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-info{background:var(--info);color:#fff;border-color:var(--info)}
.btn-sm{padding:.4rem .8rem;font-size:.85rem}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ═══════════════════════════════════════════════════════════════
   FORM CONTROLS
   ═══════════════════════════════════════════════════════════════ */
.form-row{margin-bottom:1rem}
.form-row label{display:block;font-weight:500;margin-bottom:.35rem;font-size:.92rem;color:var(--ink)}
.form-row .hint{font-size:.82rem;color:var(--ink-muted);margin-top:.25rem}
.form-row input[type=text],.form-row input[type=number],.form-row input[type=tel],.form-row input[type=email],.form-row input[type=url],.form-row select,.form-row textarea{width:100%;padding:.6rem .8rem;border:1px solid var(--border-strong);border-radius:var(--r-sm);background:var(--surface);transition:.15s;touch-action:manipulation}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15)}

/* ═══════════════════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════════════════ */
.modal-bd{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;visibility:hidden;transition:.2s}
.modal-bd.show{opacity:1;visibility:visible}
.modal{background:var(--surface);border-radius:var(--r-lg);max-width:680px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);transform:translateY(20px);transition:.25s}
.modal-bd.show .modal{transform:none}
.modal-lg{max-width:920px}
.modal-xl{max-width:1100px}
.modal-head{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem}
.modal-head h3{flex:1;font-family:'Kanit',sans-serif;font-size:1.2rem}
.modal-close{background:none;border:none;width:34px;height:34px;border-radius:8px;font-size:1.4rem;color:var(--ink-muted)}
.modal-close:hover{background:var(--bg);color:var(--ink)}
.modal-body{flex:1;overflow-y:auto;padding:1.25rem}
.modal-foot{padding:.85rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.5rem;flex-wrap:wrap}

/* ═══════════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════════ */
#toast-host{position:fixed;top:1rem;right:1rem;z-index:9000;display:flex;flex-direction:column;gap:.5rem;max-width:calc(100vw - 2rem)}
.toast{background:var(--surface);border-left:4px solid var(--info);border-radius:var(--r);padding:.75rem 1rem;box-shadow:var(--shadow-lg);min-width:240px;max-width:380px;animation:toastIn .25s ease-out;display:flex;align-items:flex-start;gap:.5rem}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--danger)}
.toast.warning{border-color:var(--warning)}
.toast .ic{flex-shrink:0;font-size:1.1rem}
.toast .msg{flex:1;font-size:.92rem;line-height:1.4}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}

/* ═══════════════════════════════════════════════════════════════
   LOADER
   ═══════════════════════════════════════════════════════════════ */
#loader{position:fixed;inset:0;background:rgba(255,255,255,.7);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:8000;flex-direction:column;gap:1rem}
#loader.show{display:flex}
.spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader .msg{color:var(--ink);font-weight:500}

/* ═══════════════════════════════════════════════════════════════
   TABLE
   ═══════════════════════════════════════════════════════════════ */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.tbl-toolbar{padding:.85rem 1rem;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.tbl-toolbar .search{flex:1;min-width:200px;display:flex;align-items:center;gap:.5rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:.4rem .75rem}
.tbl-toolbar .search input{border:none;background:transparent;outline:none;flex:1;font-size:.95rem}
.tbl-scroll{overflow-x:auto;max-height:65vh}
table.data-tbl{width:100%;border-collapse:collapse;font-size:.92rem}
table.data-tbl thead{background:var(--bg);position:sticky;top:0;z-index:1}
table.data-tbl th{padding:.65rem .75rem;text-align:left;font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
table.data-tbl th:hover{background:#eef0f5}
table.data-tbl th.sortable::after{content:"⇅";opacity:.4;margin-left:.25rem;font-size:.85em}
table.data-tbl th.sort-asc::after{content:"↑";opacity:1;color:var(--primary)}
table.data-tbl th.sort-desc::after{content:"↓";opacity:1;color:var(--primary)}
table.data-tbl td{padding:.65rem .75rem;border-bottom:1px solid var(--border)}
table.data-tbl tr:hover td{background:#fafbff}

<!-- ═══════════════════════════════════════════════════════════════
     PLAIN SCRIPT — splash exit + UI bootstrap (ไม่รอ Firebase)
     ═══════════════════════════════════════════════════════════════ -->
<script>
// ───── PUBLIC STUDENT FORM ROUTE — runs at top, just sets a flag and hides teacher UI ─────
// IMPORTANT: This block must NOT prevent the rest of the script from running, because
// the rest of this script defines critical globals (AppState, GRADE_INFO, escHTML, classLabel)
// that the public form needs.
(function(){
  if(typeof location !== 'undefined' && location.hash && location.hash.indexOf('#form') === 0){
    window.IS_PUBLIC_FORM = true;
    document.documentElement.classList.add('public-form');
    var splashEl = document.getElementById('splash');
    if(splashEl){ splashEl.style.display='none'; }
    var appEl = document.getElementById('app');
    if(appEl){ appEl.style.display='none'; }
  }
})();

(function(){
  // Skip splash logic entirely if we're in public-form mode
  if(!window.IS_PUBLIC_FORM){
    // Splash exit
    var SPLASH_KEY='nt_splash_seen_at';
    var seen=parseInt(localStorage.getItem(SPLASH_KEY)||'0',10);
    var skipSplash=Date.now()-seen<60*60*1000;  // 1 ชั่วโมง
    var killSplash=function(){
      var s=document.getElementById('splash'); if(!s) return;
      s.classList.add('hide');
      document.getElementById('app').style.display='flex';
      setTimeout(function(){ s.style.display='none'; },650);
      localStorage.setItem(SPLASH_KEY, String(Date.now()));
    };
    if(skipSplash){ killSplash(); }
    else { setTimeout(killSplash, 2400); }

    // อนุญาตคลิกข้าม splash
    document.getElementById('splash').addEventListener('click', killSplash);
  }

  // ───── TOAST ─────
  window.showToast=function(msg, type, ms){
    type=type||'info'; ms=ms||3200;
    var host=document.getElementById('toast-host');
    var t=document.createElement('div');
    t.className='toast '+type;
    var ic={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'}[type]||'ℹ️';
    t.innerHTML='<span class="ic">'+ic+'</span><span class="msg"></span>';
    t.querySelector('.msg').textContent=msg;
    host.appendChild(t);
    setTimeout(function(){ t.style.transition='.3s';t.style.opacity='0';t.style.transform='translateX(40px)'; setTimeout(function(){t.remove()},300); }, ms);
  };

  // ───── LOADER ─────
  window.showLoading=function(on, msg){
    var l=document.getElementById('loader');
    if(msg) document.getElementById('loaderMsg').textContent=msg;
    if(on) l.classList.add('show'); else l.classList.remove('show');
  };

  // ───── DIALOGS ─────
  // confirm dialog
  window.confirmDialog=function(opts){
    return new Promise(function(resolve){
      opts=opts||{};
      var bd=document.createElement('div'); bd.className='modal-bd show';
      bd.innerHTML='<div class="modal" style="max-width:440px"><div class="modal-head"><h3>'+(opts.title||'ยืนยัน')+'</h3></div>'+
        '<div class="modal-body"><p class="dlg-msg">'+(opts.message||'')+'</p>'+
        (opts.warning?'<div class="dlg-warn '+(opts.danger?'dlg-danger':'')+'">'+opts.warning+'</div>':'')+
        (opts.requireType?'<div class="form-row mt-2"><label>พิมพ์ "<strong>'+opts.requireType+'</strong>" เพื่อยืนยัน</label><input type="text" id="ctfm" autocomplete="off"></div>':'')+
        '</div>'+
        '<div class="modal-foot"><button class="btn" id="cno">'+(opts.cancelText||'ยกเลิก')+'</button>'+
        '<button class="btn '+(opts.danger?'btn-danger':'btn-primary')+'" id="cyes">'+(opts.confirmText||'ยืนยัน')+'</button></div></div>';
      document.body.appendChild(bd);
      function done(v){ bd.classList.remove('show'); setTimeout(function(){bd.remove()},220); resolve(v); }
      bd.querySelector('#cno').onclick=function(){ done(false); };
      bd.querySelector('#cyes').onclick=function(){
        if(opts.requireType){
          var v=bd.querySelector('#ctfm').value.trim();
          if(v!==opts.requireType){ window.showToast('กรุณาพิมพ์ "'+opts.requireType+'" ให้ตรง','warning'); return; }
        }
        done(true);
      };
    });
  };
  // prompt dialog
  window.promptDialog=function(opts){
    return new Promise(function(resolve){
      opts=opts||{};
      var bd=document.createElement('div'); bd.className='modal-bd show';
      var optsHTML='';
      if(opts.options){ optsHTML='<datalist id="pdsugs">'+opts.options.map(function(o){return '<option value="'+o+'">';}).join('')+'</datalist>'; }
      bd.innerHTML='<div class="modal" style="max-width:440px"><div class="modal-head"><h3>'+(opts.title||'ใส่ข้อมูล')+'</h3></div>'+
        '<div class="modal-body"><p class="dlg-msg">'+(opts.message||'')+'</p>'+
        '<div class="form-row"><input type="'+(opts.type||'text')+'" id="pdv" '+
        (opts.options?'list="pdsugs"':'')+
        ' value="'+(opts.defaultValue||'')+'" autocomplete="off"></div>'+optsHTML+
        '</div>'+
        '<div class="modal-foot"><button class="btn" id="pno">ยกเลิก</button>'+
        '<button class="btn btn-primary" id="pyes">ตกลง</button></div></div>';
      document.body.appendChild(bd);
      function done(v){ bd.classList.remove('show'); setTimeout(function(){bd.remove()},220); resolve(v); }
      bd.querySelector('#pno').onclick=function(){ done(null); };
      bd.querySelector('#pyes').onclick=function(){
        var v=bd.querySelector('#pdv').value.trim();
        if(opts.required && !v){ window.showToast('กรุณากรอกข้อมูล','warning'); return; }
        done(v);
      };
      setTimeout(function(){ bd.querySelector('#pdv').focus(); },50);
    });
  };

  // ───── ROUTING (ง่ายๆ) ─────
  window.AppState={
    settings:null,        // {currentAcademicYear, schoolName, schoolAddress, schoolLogo, advisors:{classId:{...}} }
    classrooms:[],        // [{id,academicYear,grade,room,studentCount,advisors,...}]
    studentsCache:{},     // {classId: [students]}
    currentGrade:null,
    currentClassId:null,
    isFirebaseReady:false,
  };

  window.GRADE_INFO={
    m1:{label:'ม.1',num:'1',color:'#e11d48',icon:'1'},
    m2:{label:'ม.2',num:'2',color:'#ea580c',icon:'2'},
    m3:{label:'ม.3',num:'3',color:'#ca8a04',icon:'3'},
    m4:{label:'ม.4',num:'4',color:'#16a34a',icon:'4'},
    m5:{label:'ม.5',num:'5',color:'#0891b2',icon:'5'},
    m6:{label:'ม.6',num:'6',color:'#7c3aed',icon:'6'},
  };

  // Helpers
  window.escHTML=function(s){
    s=(s==null?'':String(s));
    return s.replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  };

  window.thaiNum=function(n){ return String(n); };  // placeholder

  // Class label helper: shows "ม.X/Y" if room exists, otherwise just "ม.X"
  // (this school has only one room per grade — fallback gracefully)
  window.classLabel=function(gradeKeyOrNum, room){
    var num;
    if(typeof gradeKeyOrNum === 'string' && window.GRADE_INFO[gradeKeyOrNum]){
      num = window.GRADE_INFO[gradeKeyOrNum].num;
    } else {
      num = gradeKeyOrNum;
    }
    return 'ม.'+num + (room ? '/'+room : '');
  };
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     FIREBASE (ESM module) — initialize + load settings/classrooms
     ═══════════════════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, initializeFirestore,
  persistentLocalCache, persistentSingleTabManager,
  collection, doc, getDoc, getDocs, getDocsFromServer,
  setDoc, updateDoc, deleteDoc, addDoc,
  query, where, orderBy, limit, onSnapshot,
  writeBatch, serverTimestamp, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC37MlL3u0WNnNlJJvQtOTBobNlghNbZPQ",
  authDomain: "classroominformation.firebaseapp.com",
  projectId: "classroominformation",
  storageBucket: "classroominformation.firebasestorage.app",
  messagingSenderId: "26917205218",
  appId: "1:26917205218:web:2ba146059f2c9b8b259abb"
};

const app = initializeApp(firebaseConfig);

// iOS WebKit detect — ใช้ getFirestore ปกติบน iOS
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.userAgent.includes('Mac') && 'ontouchend' in document);
let db;
try{
  if(isIOS){
    db = getFirestore(app);
  } else {
    db = initializeFirestore(app, {
      localCache: persistentLocalCache({tabManager: persistentSingleTabManager()})
    });
  }
}catch(e){
  console.warn('Firestore init fallback:', e);
  db = getFirestore(app);
}

window.db = db;
window.firestore = {
  collection, doc, getDoc, getDocs, getDocsFromServer, setDoc, updateDoc, deleteDoc, addDoc,
  query, where, orderBy, limit, onSnapshot, writeBatch, serverTimestamp, Timestamp
};

// ═════════════════════════════════════════════════════════════════
// SETTINGS LOADER
// ═════════════════════════════════════════════════════════════════
const DEFAULT_SETTINGS = {
  currentAcademicYear: new Date().getFullYear() + 543,
  schoolName: 'โรงเรียนกระดุมทองวิทยา',
  schoolAddress: 'อำเภอ — จังหวัดศรีสะเกษ',
  schoolLogo: 'https://nonthaphathr.github.io/uploadimg/logorecruit2026.png',
  advisors: {}  // {classId: [{name, position, phone}]}
};

async function loadSettings(){
  try{
    const sref = doc(db, 'settings', 'global');
    let snap;
    try{ snap = await getDocsFromServer ? await getDoc(sref) : await getDoc(sref); }
    catch(e){ snap = await getDoc(sref); }
    if(snap.exists()){
      window.AppState.settings = Object.assign({}, DEFAULT_SETTINGS, snap.data());
    } else {
      window.AppState.settings = Object.assign({}, DEFAULT_SETTINGS);
      await setDoc(sref, window.AppState.settings);
    }
  }catch(e){
    console.error('loadSettings:', e);
    window.AppState.settings = Object.assign({}, DEFAULT_SETTINGS);
    window.showToast('ใช้การตั้งค่าเริ่มต้น (Firebase ไม่ตอบสนอง)', 'warning');
  }
  applySettingsToHeader();
}
window.loadSettings = loadSettings;

window.saveSettings = async function(patch){
  try{
    Object.assign(window.AppState.settings, patch);
    await setDoc(doc(db, 'settings', 'global'), window.AppState.settings, {merge:true});
    applySettingsToHeader();
    window.showToast('บันทึกการตั้งค่าแล้ว','success');
    return true;
  }catch(e){
    console.error(e);
    window.showToast('บันทึกไม่สำเร็จ: '+e.message,'error');
    return false;
  }
};

function applySettingsToHeader(){
  const s = window.AppState.settings || DEFAULT_SETTINGS;
  document.getElementById('hdrLogo').src = s.schoolLogo || DEFAULT_SETTINGS.schoolLogo;
  document.getElementById('hdrSchool').textContent = s.schoolName || '';
  document.getElementById('hdrYear').textContent = 'ปีการศึกษา ' + String(s.currentAcademicYear);
  document.getElementById('splashSchool').textContent = s.schoolName || '';
  document.getElementById('splashLogo').src = s.schoolLogo || DEFAULT_SETTINGS.schoolLogo;
}

// ═════════════════════════════════════════════════════════════════
// CLASSROOMS LOADER (realtime)
// ═════════════════════════════════════════════════════════════════
let classroomsUnsub = null;
let _firstSnapshotHandled = false;

async function listenClassrooms(){
  if(classroomsUnsub) classroomsUnsub();
  _firstSnapshotHandled = false;

  // Initial server fetch (iOS friendly)
  try{
    const initialSnap = await getDocsFromServer(collection(db, 'classrooms'));
    const arr = [];
    initialSnap.forEach(d => arr.push(Object.assign({id:d.id}, d.data())));
    window.AppState.classrooms = arr;
    _firstSnapshotHandled = true;
    if(window.refreshCurrentView) window.refreshCurrentView();
  }catch(e){
    console.warn('initial getDocsFromServer failed, fallback:', e);
    try{
      const initialSnap = await getDocs(collection(db, 'classrooms'));
      const arr = [];
      initialSnap.forEach(d => arr.push(Object.assign({id:d.id}, d.data())));
      window.AppState.classrooms = arr;
      _firstSnapshotHandled = true;
      if(window.refreshCurrentView) window.refreshCurrentView();
    }catch(e2){ console.error('classroom load failed', e2); }
  }

  // Subscribe to realtime updates
  try{
    classroomsUnsub = onSnapshot(collection(db, 'classrooms'), (snap) => {
      // Empty snapshot guard (iOS): avoid wiping loaded data on first empty
      if(snap.empty && !_firstSnapshotHandled) return;
      const arr = [];
      snap.forEach(d => arr.push(Object.assign({id:d.id}, d.data())));
      window.AppState.classrooms = arr;
      _firstSnapshotHandled = true;
      if(window.refreshCurrentView) window.refreshCurrentView();
    }, err => console.error('classrooms snapshot err', err));
  }catch(e){ console.error(e); }
}
window.listenClassrooms = listenClassrooms;

// ═════════════════════════════════════════════════════════════════
// CLASSROOM CRUD
// ═════════════════════════════════════════════════════════════════
window.classroomId = function(year, grade, room){
  // Normalize room: empty/null/undefined/0 → no suffix; otherwise sanitize
  var roomStr = (room==null || room==='' || room===0) ? '' : String(room).trim();
  // Sanitize: replace any chars that aren't safe for Firestore document IDs
  if(roomStr) roomStr = roomStr.replace(/[\/\\.#$\[\]]/g, '-');
  return roomStr ? (year+'_'+grade+'_'+roomStr) : (year+'_'+grade);
};

window.upsertClassroom = async function(payload){
  // Normalize room before computing id and saving
  payload = Object.assign({}, payload);
  payload.room = (payload.room==null || payload.room==='' || payload.room===0) ? '' : String(payload.room).trim();
  const id = window.classroomId(payload.academicYear, payload.grade, payload.room);
  const ref = doc(db, 'classrooms', id);
  const existing = await getDoc(ref);
  const now = serverTimestamp();
  const body = Object.assign({}, existing.exists()?existing.data():{}, payload, {
    updatedAt: now,
  });
  if(!existing.exists()) body.importedAt = now;
  await setDoc(ref, body, {merge:true});
  return id;
};

window.deleteClassroom = async function(classId){
  // ลบ students subcollection ก่อน (limit 500)
  const stuRef = collection(db, 'classrooms', classId, 'students');
  const stuSnap = await getDocs(stuRef);
  const batch = writeBatch(db);
  let n=0;
  stuSnap.forEach(d => { batch.delete(d.ref); n++; });
  if(n>0) await batch.commit();
  await deleteDoc(doc(db, 'classrooms', classId));
};

window.getStudentsOfClass = async function(classId, forceServer){
  const colRef = collection(db, 'classrooms', classId, 'students');
  const q = query(colRef, orderBy('order','asc'));
  let snap;
  try{
    if(forceServer || isIOS) snap = await getDocsFromServer(q);
    else snap = await getDocs(q);
  }catch(e){ snap = await getDocs(q); }
  const arr=[];
  snap.forEach(d => arr.push(Object.assign({id:d.id}, d.data())));
  window.AppState.studentsCache[classId] = arr;
  return arr;
};

window.bulkSaveStudents = async function(classId, students){
  // ใช้ writeBatch ครั้งละ 500
  const colRef = collection(db, 'classrooms', classId, 'students');
  // ลบเก่าทั้งหมดก่อน
  const oldSnap = await getDocs(colRef);
  let bd = writeBatch(db);
  let cnt = 0;
  oldSnap.forEach(d => { bd.delete(d.ref); cnt++; if(cnt>=400){ /* will commit below */ }});
  await bd.commit();
  // เพิ่มใหม่
  let bw = writeBatch(db);
  let n = 0;
  for(const s of students){
    const docId = (s.studentId || ('TMP_'+Math.random().toString(36).slice(2,10))).toString().replace(/[^a-zA-Z0-9_-]/g,'_');
    const ref = doc(db, 'classrooms', classId, 'students', docId);
    bw.set(ref, Object.assign({}, s, {createdAt: serverTimestamp(), updatedAt: serverTimestamp()}));
    n++;
    if(n%400===0){ await bw.commit(); bw = writeBatch(db); }
  }
  if(n%400!==0) await bw.commit();
};

window.updateStudent = async function(classId, studentDocId, patch){
  const ref = doc(db, 'classrooms', classId, 'students', studentDocId);
  await updateDoc(ref, Object.assign({}, patch, {updatedAt: serverTimestamp()}));
};

window.deleteStudent = async function(classId, studentDocId){
  await deleteDoc(doc(db, 'classrooms', classId, 'students', studentDocId));
};

// BOOTSTRAP
// ═════════════════════════════════════════════════════════════════
(async function boot(){
  try{
    if(window.IS_PUBLIC_FORM){
      // Public student form route — load only settings (need school name/logo); no classroom listener
      await loadSettings();
      window.AppState.isFirebaseReady = true;
      // bootPublicForm is defined in a later <script> tag — wait for it
      var tries = 0;
      var iv = setInterval(function(){
        if(typeof window.bootPublicForm === 'function'){
          clearInterval(iv);
          try{ window.bootPublicForm(); }
          catch(e){ console.error('bootPublicForm error', e); document.getElementById('publicForm').innerHTML = '<div style="padding:2rem;text-align:center;color:#b91c1c">เกิดข้อผิดพลาด: '+e.message+'</div>'; }
        } else if(++tries > 50){
          clearInterval(iv);
          console.error('bootPublicForm not found after 5s');
          document.getElementById('publicForm').innerHTML = '<div style="padding:2rem;text-align:center;color:#b91c1c">ระบบโหลดไม่สำเร็จ — ลองรีเฟรชหน้า</div>';
        }
      }, 100);
      return;
    }
    await loadSettings();
    await listenClassrooms();
    window.AppState.isFirebaseReady = true;
    if(window.renderMain) window.renderMain();
  }catch(e){
    console.error('boot err', e);
    if(window.IS_PUBLIC_FORM){
      var pf = document.getElementById('publicForm');
      if(pf) pf.innerHTML = '<div style="padding:2rem;text-align:center;color:#b91c1c">โหลดข้อมูลโรงเรียนไม่สำเร็จ — ลองรีเฟรชหน้า<br><small>'+e.message+'</small></div>';
    } else if(window.showToast){
      window.showToast('Firebase ไม่ตอบสนอง: '+e.message,'error');
    }
  }
})();

     UI RENDERING (plain script — ทำงานทันทีไม่ต้องรอ Firebase)

<script>
(function(){

  function setView(view, params){
    window.AppState.currentView = view;
    window.AppState.viewParams = params || {};
    render();

  window.setView = setView;

  function refreshCurrentView(){ render(); }

    var v = window.AppState.currentView || 'main';
    var main = document.getElementById('mainView');
    if(v==='main')           main.innerHTML = renderMainPage();
    else if(v==='grade')     main.innerHTML = renderGradePage();
    else if(v==='studentList') main.innerHTML = renderStudentListPage();
    else                     main.innerHTML = renderMainPage();

    // attach handlers via class delegation
    bindDelegates(main);
  }

  function bindDelegates(root){
    root.querySelectorAll('[data-act]').forEach(function(el){
      el.onclick = function(ev){
        ev.preventDefault();
        var act = el.dataset.act;
        var p = el.dataset.p ? JSON.parse(el.dataset.p) : {};

      };

<!-- ═══════════════════════════════════════════════════════════════
     PARSER / IMPORT / EXPORT — File handling
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function(){
  // ═══════════════ Format Detection ═══════════════
  // ฟิลด์เด่นของรูปแบบ A (ใบมอบตัว) - ใช้ตรวจสอบ
  var FMT_A_REQUIRED = ['ชั้น/ห้อง','เลขประจำตัวนักเรียน','ชื่อ-สกุลนักเรียน'];
  // ฟิลด์เด่นของรูปแบบ B (ผู้สมัคร)
  var FMT_B_REQUIRED = ['ระดับชั้น','ชื่อ-สกุล','เลขบัตรประชาชน'];

  function detectFormat(rows){
    if(!rows.length) return null;
    var headers = Object.keys(rows[0]);
    var aMatch = FMT_A_REQUIRED.every(function(h){return headers.indexOf(h)>=0});
    var bMatch = FMT_B_REQUIRED.every(function(h){return headers.indexOf(h)>=0});
    if(aMatch) return 'A';
    if(bMatch) return 'B';
    return null;
  }

  // ═══════════════ Parse class/room ═══════════════
  // Accepts many formats — room is OPTIONAL (school may have only one room per grade):
  //   "ม.1/1"   → {grade:'m1', room:'1'}
  //   "ม.1 / 2" → {grade:'m1', room:'2'}
  //   "ม.1"     → {grade:'m1', room:''}     ← no room
  //   "ม. 1"    → {grade:'m1', room:''}
  //   "1/1"     → {grade:'m1', room:'1'}
  //   "1"       → {grade:'m1', room:''}
  //   "ม.๑/๑"   → Thai numerals also accepted
  //   "มัธยมศึกษาปีที่ 1" → {grade:'m1', room:''}
  function parseClassRoom(s){
    if(s==null) return null;
    s = String(s).trim();
    if(!s) return null;
    // Convert Thai numerals to Arabic numerals first
    s = s.replace(/[๐-๙]/g, function(c){ return String('๐๑๒๓๔๕๖๗๘๙'.indexOf(c)); });
    // Match grade and optional room — accepts "ม.X" "ม X" "ม.X/Y" "X" "X/Y" "มัธยมศึกษาปีที่ X" etc.
    var m = s.match(/(?:ม(?:ัธยมศึกษาปีที่)?[.\s]*)?([1-6])(?:\s*[\/.\-]\s*(\w+))?/);
    if(!m) return null;
    var grade = 'm' + m[1];
    var room = m[2] ? String(m[2]).trim() : '';
    return {grade:grade, room:room};
  }
  // "ม.1" => 'm1' (also accepts ม.๑, มัธยมศึกษาปีที่ 1, etc.)
  function parseGradeOnly(s){
    if(s==null) return null;
    s = String(s).trim();
    if(!s) return null;
    s = s.replace(/[๐-๙]/g, function(c){ return String('๐๑๒๓๔๕๖๗๘๙'.indexOf(c)); });
    var m = s.match(/(?:ม(?:ัธยมศึกษาปีที่)?[.\s]*)?([1-6])/);
    return m ? ('m'+m[1]) : null;
  }

  // ═══════════════ Gender from prefix ═══════════════
  function inferGender(fullName){
    var n = (fullName||'').trim();
    if(!n) return 'ไม่ระบุ';
    if(n.indexOf('เด็กชาย')===0 || n.indexOf('นาย ')===0 || n==='นาย') return 'ชาย';
    if(n.indexOf('เด็กหญิง')===0 || n.indexOf('นางสาว')===0 || n.indexOf('นาง ')===0) return 'หญิง';
    // เผื่อเขียนย่อ
    if(n.indexOf('ด.ช.')===0) return 'ชาย';
    if(n.indexOf('ด.ญ.')===0) return 'หญิง';
    return 'ไม่ระบุ';
  }

  // ═══════════════ Read file (xlsx/csv) → rows ═══════════════
  // CSVs are parsed manually as text to preserve leading zeros (phone, student IDs).
  // SheetJS is used only for true binary .xlsx/.xls files.
  window.readFileToRows = function(file){
    return new Promise(function(resolve, reject){
      var fr = new FileReader();
      fr.onerror = function(){ reject(new Error('อ่านไฟล์ไม่ได้')); };
      var name = (file.name||'').toLowerCase();
      var isCsv = name.endsWith('.csv') || file.type==='text/csv' || file.type==='application/csv';

      if(isCsv){
        fr.onload = function(e){
          try{
            var text = e.target.result;
            var rows = parseCSVText(text);
            resolve(rows);
          }catch(err){ reject(err); }
        };
        fr.readAsText(file, 'UTF-8');
      } else {
        fr.onload = function(e){
          try{
            var data = new Uint8Array(e.target.result);
            // For xlsx: cells are typed by Excel; if cell is text-formatted with leading zero
            // it preserves; if cell is numeric it loses leading zero (Excel limitation).
            // raw:false + cellText:true returns the displayed string of each cell.
            var wb = XLSX.read(data, {type:'array', cellDates:false, raw:false, cellText:true});
            var sheetName = wb.SheetNames[0];
            var ws = wb.Sheets[sheetName];
            var rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw:false});
            rows = rows.map(function(r){
              var out = {};
              for(var k in r) out[k] = (r[k]==null?'':String(r[k]));
              return out;
            });
            resolve(rows);
          }catch(err){ reject(err); }
        };
        fr.readAsArrayBuffer(file);
      }
    });
  };

  // Manual CSV parser — preserves all values as strings, handles quoted fields, BOM, CRLF/LF
  function parseCSVText(text){
    if(!text) return [];
    // Strip UTF-8 BOM
    if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
    var lines = [];
    var current = [];
    var field = '';
    var inQuotes = false;
    for(var i=0; i<text.length; i++){
      var c = text[i];
      if(inQuotes){
        if(c==='"' && text[i+1]==='"'){ field += '"'; i++; }
        else if(c==='"'){ inQuotes = false; }
        else { field += c; }
      } else {
        if(c==='"'){ inQuotes = true; }
        else if(c===','){ current.push(field); field=''; }
        else if(c==='\n'){ current.push(field); lines.push(current); current=[]; field=''; }
        else if(c==='\r'){ /* skip */ }
        else { field += c; }
      }
    }
    if(field !== '' || current.length){ current.push(field); lines.push(current); }
    if(!lines.length) return [];
    var headers = lines[0].map(function(h){ return String(h||'').trim(); });
    var result = [];
    for(var l=1; l<lines.length; l++){
      var line = lines[l];
      // skip blank lines (single-empty-cell row)
      if(!line || (line.length===1 && line[0]==='')) continue;
      var obj = {};
      headers.forEach(function(h, idx){
        obj[h] = (line[idx] != null) ? String(line[idx]) : '';
      });
      result.push(obj);
    }
    return result;
  }
  window.parseCSVText = parseCSVText;

  // Fix Excel-style date corruption (e.g. "6/12" → "6-Dec" or "12/6/2025") on house number fields
  function fixDateLikeImport(v){
    if(v==null) return '';
    var s = String(v).trim();
    if(!s) return '';
    var months = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
    var m1 = s.match(/^(\d{1,2})-([A-Za-z]{3})$/);
    if(m1 && months[m1[2]]){ return m1[1] + '/' + months[m1[2]]; }
    var m2 = s.match(/^([A-Za-z]{3})-(\d{1,2})$/);
    if(m2 && months[m2[1]]){ return m2[2] + '/' + months[m2[1]]; }
    var m3 = s.match(/[A-Za-z]{3}\s+([A-Za-z]{3})\s+(\d{1,2})/);
    if(m3 && months[m3[1]]){ return parseInt(m3[2],10) + '/' + months[m3[1]]; }
    var m4 = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(m4){ return parseInt(m4[3],10) + '/' + parseInt(m4[2],10); }
    return s;
  }
  // Apply date-corruption fix to house-number-like fields in a row
  function sanitizeRow(row){
    var fields = ['บ้านเลขที่นักเรียน','บ้านเลขที่ปัจจุบัน','บ้านเลขที่ผู้ปกครอง','บ้านเลขที่บิดา','บ้านเลขที่มารดา'];
    fields.forEach(function(f){
      if(row[f]) row[f] = fixDateLikeImport(row[f]);
    });
    return row;
  }

  // ═══════════════ Map row → student object ═══════════════
  function mapRowFormatA(row){
    row = sanitizeRow(row);
    var fullName = (row['ชื่อ-สกุลนักเรียน']||'').trim();
    var gender = inferGender(fullName);
    var phone = row['โทรนักเรียน'] || row['โทรปัจจุบัน'] || row['โทรมือถือผู้ปกครอง'] || '';
    return {
      studentId: String(row['เลขประจำตัวนักเรียน']||'').trim(),
      fullName: fullName,
      nickname: (row['ชื่อเล่น']||'').trim(),
      gender: gender,
      phone: String(phone||'').trim(),
      raw: row
    };
  }
  function mapRowFormatB(row, grade, room){
    row = sanitizeRow(row);
    var fullName = (row['ชื่อ-สกุล']||'').trim();
    var gender = inferGender(fullName);
    return {
      studentId: String(row['เลขบัตรประชาชน']||'').replace(/[^0-9]/g,'').trim(),
      fullName: fullName,
      nickname: '',
      gender: gender,
      phone: String(row['โทรศัพท์']||'').trim(),
      raw: row
    };
  }

  // ═══════════════ Sort + assign order ═══════════════
  // Sort by studentId (numeric-aware: "001" < "010" < "100"); missing IDs go to end.
  function sortAndOrder(students){
    students.sort(function(a,b){
      var ia = String(a.studentId||'').trim();
      var ib = String(b.studentId||'').trim();
      if(!ia && !ib) return (a.fullName||'').localeCompare(b.fullName||'','th');
      if(!ia) return 1;
      if(!ib) return -1;
      return ia.localeCompare(ib, 'th', {numeric:true});
    });
    students.forEach(function(s,i){ s.order = i+1; });
    return students;
  }

          rowsCache.forEach(function(r){
            var cr = parseClassRoom(r['ชั้น/ห้อง']);

            var key = cr.grade+'/'+cr.room;
            if(!groups[key]) groups[key] = {grade:cr.grade, room:cr.room, students:[]};
            groups[key].students.push(mapRowFormatA(r));

              academicYear: year, grade: g2.grade, room: g2.room,
              studentCount: students.length,
              maleCount: male, femaleCount: female,

      var rm = (window.AppState.classrooms||[]).find(function(c){return c.id===cid});

      // ใช้ raw object ตามรูปแบบเดิม (ถ้า A จะมีคอลัมน์ครบ)
      var rows = students.map(function(s, i){

          'ลำดับ': s.order||i+1,

          'ชื่อ-สกุล': s.fullName||'',
          'ชื่อเล่น': s.nickname||'',
          'เพศ': s.gender||''
        };
        // ผสานกับ raw data ของเดิม
        if(s.raw){ Object.assign(base, s.raw); }
        return base;
      });
      var ws = XLSX.utils.json_to_sheet(rows);
      var wb = XLSX.utils.book_new();

      var fname = 'รายชื่อนักเรียน_ม'+info.num + (rm.room?'-'+rm.room:'') +'_ปี'+rm.academicYear+'.xlsx';
      XLSX.writeFile(wb, fname);
      window.showLoading(false);
      window.showToast('ส่งออก '+rows.length+' คน','success');

      window.showLoading(false);

      });
      bd.querySelector('#acy').onclick = save;

    function readForm(){
      bd.querySelectorAll('.advisor-row').forEach(function(row){
        var i = parseInt(row.dataset.i,10);
        advisors[i] = {
          name: row.querySelector('.adv-name').value.trim(),
          position: row.querySelector('.adv-pos').value.trim(),
          phone: row.querySelector('.adv-phone').value.trim()
        };
      });

    async function save(){
      readForm();
      var clean = advisors.filter(function(a){return a.name});
      try{
        window.showLoading(true);
        await window.upsertClassroom({
          academicYear: rm.academicYear, grade: rm.grade, room: rm.room,
          advisors: clean
        });

        window.showToast('บันทึกครูที่ปรึกษาแล้ว','success');
        close();
      }catch(e){ window.showLoading(false); window.showToast('บันทึกไม่สำเร็จ: '+e.message,'error'); }
    }
    function close(){ bd.classList.remove('show'); setTimeout(function(){bd.remove()},220); }
    document.body.appendChild(bd);
    buildHTML();
  };

  // ═══════════════ Village name template (export blank → user fills → re-import) ═══════════════
  window.exportVillageTemplate = async function(){
    if(typeof XLSX === 'undefined'){ window.showToast('SheetJS ยังโหลดไม่เสร็จ ลองใหม่อีกครั้ง','error'); return; }
    try{
      window.showLoading(true,'กำลังเตรียม Template...');
      var year = window.AppState.settings.currentAcademicYear;
      var classrooms = (window.AppState.classrooms||[]).filter(function(c){return Number(c.academicYear)===Number(year);});
      if(!classrooms.length){
        window.showLoading(false);
        window.showToast('ไม่มีห้องเรียนในปี '+year,'warning');
        return;
      }
      // Sort classrooms by grade then room
      classrooms.sort(function(a,b){
        if(a.grade!==b.grade) return a.grade.localeCompare(b.grade);
        return String(a.room||'').localeCompare(String(b.room||''),'th',{numeric:true});
      });
      var rows = [];
      for(var i=0;i<classrooms.length;i++){
        var cr = classrooms[i];
        var info = window.GRADE_INFO[cr.grade];
        var label = window.classLabel(info.num, cr.room);
        var students = await window.getStudentsOfClass(cr.id, true);
        // Sort students by studentId for predictable order
        students.sort(function(a,b){
          return String(a.studentId||'').localeCompare(String(b.studentId||''),'th',{numeric:true});
        });
        students.forEach(function(s){
          rows.push({
            'เลขประจำตัวนักเรียน': s.studentId || '',
            'ชื่อ-สกุล': s.fullName || '',
            'ชั้น': label,
            'ชื่อหมู่บ้านนักเรียน': (s.raw && s.raw['หมู่บ้านนักเรียน']) || '',
            'ชื่อหมู่บ้านผู้ปกครอง': (s.raw && s.raw['หมู่บ้านผู้ปกครอง']) || '',
            'โรงเรียนเดิม': (s.raw && s.raw['โรงเรียนเดิม']) || ''
          });
        });
      }
      if(!rows.length){
        window.showLoading(false);
        window.showToast('ไม่พบนักเรียนในระบบ','warning');
        return;
      }
      var wb = XLSX.utils.book_new();
      var ws = XLSX.utils.json_to_sheet(rows);
      // Force studentId column to render as text in Excel (preserves leading zeros)
      var range = XLSX.utils.decode_range(ws['!ref']);
      for(var R=range.s.r+1; R<=range.e.r; R++){
        var addr = XLSX.utils.encode_cell({c:0, r:R});
        if(ws[addr]){ ws[addr].t = 's'; ws[addr].v = String(ws[addr].v); }
      }
      ws['!cols'] = [{wch:18},{wch:30},{wch:12},{wch:24},{wch:24},{wch:30}];
      XLSX.utils.book_append_sheet(wb, ws, 'หมู่บ้าน');
      var fname = 'Template_หมู่บ้าน_'+year+'.xlsx';
      XLSX.writeFile(wb, fname);
      window.showLoading(false);
      window.showToast('ส่งออก Template เรียบร้อย ('+rows.length+' คน)','success');
    }catch(e){
      console.error(e);
      window.showLoading(false);
      window.showToast('ส่งออกผิดพลาด: '+e.message,'error');
    }
  };

  window.importVillageData = function(){
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = '.xlsx,.xls,.csv';
    input.style.display = 'none';
    document.body.appendChild(input);
    input.onchange = async function(ev){
      var f = ev.target.files[0];
      if(!f){ input.remove(); return; }
      try{
        window.showLoading(true,'กำลังอ่านไฟล์...');
        var rows = await window.readFileToRows(f);
        if(!rows.length){
          window.showLoading(false);
          window.showToast('ไฟล์ว่างเปล่า','warning');
          input.remove();
          return;
        }
        // Validate columns
        var headers = Object.keys(rows[0]);
        if(headers.indexOf('เลขประจำตัวนักเรียน')<0 || headers.indexOf('ชื่อหมู่บ้านนักเรียน')<0){
          window.showLoading(false);
          window.showToast('ไฟล์ไม่ถูกรูปแบบ — ต้องมีคอลัมน์ "เลขประจำตัวนักเรียน" และ "ชื่อหมู่บ้านนักเรียน"','error');
          input.remove();
          return;
        }
        // Build student index across ALL classrooms (any year) by studentId
        window.showLoading(true,'กำลังจับคู่ข้อมูล...');
        var allClasses = window.AppState.classrooms || [];
        var studentIndex = {};
        for(var i=0;i<allClasses.length;i++){
          var cr = allClasses[i];
          var students = await window.getStudentsOfClass(cr.id, true);
          students.forEach(function(s){
            var sid = String(s.studentId||'').trim();
            if(sid){
              studentIndex[sid] = {
                classId: cr.id,
                docId: s.id,
                fullName: s.fullName || '',
                currentVillage: (s.raw && s.raw['หมู่บ้านนักเรียน']) || '',
                currentGuardianVillage: (s.raw && s.raw['หมู่บ้านผู้ปกครอง']) || '',
                currentSchool: (s.raw && s.raw['โรงเรียนเดิม']) || ''
              };
            }
          });
        }
        // Process rows
        var updates = [];
        var unmatched = [];
        rows.forEach(function(r){
          var sid = String(r['เลขประจำตัวนักเรียน']||'').trim();
          if(!sid) return;
          var vStu  = String(r['ชื่อหมู่บ้านนักเรียน']||'').trim();
          var vGuar = String(r['ชื่อหมู่บ้านผู้ปกครอง']||'').trim();
          var vSch  = String(r['โรงเรียนเดิม']||'').trim();
          if(!vStu && !vGuar && !vSch) return;   // user didn't fill anything
          var match = studentIndex[sid];
          if(!match){
            unmatched.push({sid:sid, name:r['ชื่อ-สกุล']||''});
            return;
          }
          var changedStu  = vStu  && vStu  !== match.currentVillage;
          var changedGuar = vGuar && vGuar !== match.currentGuardianVillage;
          var changedSch  = vSch  && vSch  !== match.currentSchool;
          if(changedStu || changedGuar || changedSch){
            updates.push({
              classId: match.classId, docId: match.docId,
              name: match.fullName, sid: sid,
              vStu: changedStu ? vStu : null,
              vGuar: changedGuar ? vGuar : null,
              vSch:  changedSch ? vSch : null,
              oldVStu: match.currentVillage,
              oldVGuar: match.currentGuardianVillage,
              oldVSch: match.currentSchool
            });
          }
        });
        window.showLoading(false);

        if(!updates.length && !unmatched.length){
          window.showToast('ไม่มีข้อมูลที่ต้องอัปเดต (อาจจะตรงกับที่มีอยู่แล้ว)','info');
          input.remove();
          return;
        }

        // Build confirmation message
        var msg = '<div style="margin-bottom:10px">เตรียมอัปเดตข้อมูลให้นักเรียน <strong style="color:#16a34a">'+updates.length+'</strong> คน</div>';
        if(updates.length){
          msg += '<div style="max-height:200px;overflow:auto;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px;font-size:12px;line-height:1.6">';
          updates.slice(0,15).forEach(function(u){
            var line = '• '+window.escHTML(u.name)+' ('+window.escHTML(u.sid)+')';
            if(u.vStu)  line += '<br>&nbsp;&nbsp;หมู่บ้านนักเรียน: <span style="color:#9ca3af">'+window.escHTML(u.oldVStu||'(ว่าง)')+'</span> → <strong style="color:#16a34a">'+window.escHTML(u.vStu)+'</strong>';
            if(u.vGuar) line += '<br>&nbsp;&nbsp;หมู่บ้านผู้ปกครอง: <span style="color:#9ca3af">'+window.escHTML(u.oldVGuar||'(ว่าง)')+'</span> → <strong style="color:#16a34a">'+window.escHTML(u.vGuar)+'</strong>';
            if(u.vSch)  line += '<br>&nbsp;&nbsp;โรงเรียนเดิม: <span style="color:#9ca3af">'+window.escHTML(u.oldVSch||'(ว่าง)')+'</span> → <strong style="color:#16a34a">'+window.escHTML(u.vSch)+'</strong>';
            msg += '<div>'+line+'</div>';
          });
          if(updates.length>15) msg += '<div style="color:#6b7280;margin-top:4px">... และอีก '+(updates.length-15)+' คน</div>';
          msg += '</div>';
        }
        if(unmatched.length){
          msg += '<div style="margin-top:10px;padding:8px;background:#fef3c7;border-radius:8px;color:#92400e;font-size:12px">⚠️ ไม่พบในระบบ '+unmatched.length+' คน:';
          unmatched.slice(0,5).forEach(function(u){ msg += '<br>• '+window.escHTML(u.name)+' ('+window.escHTML(u.sid)+')'; });
          if(unmatched.length>5) msg += '<br>... และอีก '+(unmatched.length-5)+' คน';
          msg += '</div>';
        }

        var ok = await window.confirmDialog({
          title:'ยืนยันอัปเดตข้อมูล',
          message: msg,
          confirmText: 'อัปเดตทั้งหมด',
          cancelText: 'ยกเลิก'
        });
        if(!ok){ input.remove(); return; }

        // Apply updates with Firestore writeBatch
        window.showLoading(true,'กำลังอัปเดต...');
        var fns = window.firestore;
        var batch = fns.writeBatch(window.db);
        var n = 0, totalDone = 0;
        for(var j=0;j<updates.length;j++){
          var u = updates[j];
          var ref = fns.doc(window.db, 'classrooms', u.classId, 'students', u.docId);
          var snap = await fns.getDoc(ref);
          if(!snap.exists()) continue;
          var data = snap.data();
          var newRaw = Object.assign({}, data.raw||{});
          if(u.vStu)  newRaw['หมู่บ้านนักเรียน'] = u.vStu;
          if(u.vGuar) newRaw['หมู่บ้านผู้ปกครอง'] = u.vGuar;
          if(u.vSch)  newRaw['โรงเรียนเดิม'] = u.vSch;
          batch.update(ref, {raw:newRaw, updatedAt:fns.serverTimestamp()});
          n++; totalDone++;
          if(n>=400){ await batch.commit(); batch = fns.writeBatch(window.db); n=0; }
        }
        if(n>0) await batch.commit();
        // Invalidate cache
        window.AppState.studentsCache = {};
        window.showLoading(false);
        window.showToast('อัปเดตข้อมูลเรียบร้อย '+totalDone+' คน','success');
        if(window.refreshCurrentView) window.refreshCurrentView();
      }catch(e){
        console.error(e);
        window.showLoading(false);
        window.showToast('ผิดพลาด: '+e.message,'error');
      }finally{
        input.remove();
      }
    };
    input.click();
  };

  // ═══════════════ Repair date-corrupted house numbers (batch) ═══════════════
  // Scans every student in every classroom for house number fields that look like
  // "6-Dec" or other date corruption, and reverts them to "6/12" format.
  window.fixDateCorruptedHouseNos = async function(){
    function fixDateLikeStr(v){
      if(v==null) return '';
      var s = String(v).trim();
      if(!s) return '';
      var months = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
      var m1 = s.match(/^(\d{1,2})-([A-Za-z]{3})$/);
      if(m1 && months[m1[2]]){ return m1[1] + '/' + months[m1[2]]; }
      var m2 = s.match(/^([A-Za-z]{3})-(\d{1,2})$/);
      if(m2 && months[m2[1]]){ return m2[2] + '/' + months[m2[1]]; }
      var m3 = s.match(/[A-Za-z]{3}\s+([A-Za-z]{3})\s+(\d{1,2})/);
      if(m3 && months[m3[1]]){ return parseInt(m3[2],10) + '/' + months[m3[1]]; }
      var m4 = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
      if(m4){ return parseInt(m4[3],10) + '/' + parseInt(m4[2],10); }
      return s;
    }
    var fields = ['บ้านเลขที่นักเรียน','บ้านเลขที่ปัจจุบัน','บ้านเลขที่ผู้ปกครอง','บ้านเลขที่บิดา','บ้านเลขที่มารดา'];
    try{
      window.showLoading(true,'กำลังสแกน...');
      var allClasses = window.AppState.classrooms || [];
      var planned = [];   // {classId, docId, name, sid, changes:[{field, old, fixed}]}
      for(var i=0;i<allClasses.length;i++){
        var cr = allClasses[i];
        var students = await window.getStudentsOfClass(cr.id, true);
        students.forEach(function(s){
          var raw = s.raw || {};
          var changes = [];
          fields.forEach(function(f){
            var orig = raw[f];
            if(!orig) return;
            var fixed = fixDateLikeStr(orig);
            if(fixed && fixed !== String(orig)){
              changes.push({field:f, old:String(orig), fixed:fixed});
            }
          });
          if(changes.length){
            planned.push({classId:cr.id, docId:s.id, name:s.fullName||'', sid:s.studentId||'', changes:changes});
          }
        });
      }
      window.showLoading(false);
      if(!planned.length){
        window.showToast('ไม่พบข้อมูลที่ต้องซ่อม ✅','success');
        return;
      }
      // Confirm dialog
      var msg = '<div style="margin-bottom:10px">พบบ้านเลขที่ที่ต้องซ่อม <strong style="color:#16a34a">'+planned.length+'</strong> รายการ</div>'+
                '<div style="max-height:240px;overflow:auto;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px;font-size:12px;line-height:1.6">';
      planned.slice(0,20).forEach(function(p){
        msg += '<div style="margin-bottom:4px">• '+window.escHTML(p.name)+' ('+window.escHTML(p.sid)+')';
        p.changes.forEach(function(ch){
          msg += '<br>&nbsp;&nbsp;<span style="color:#6b7280">'+window.escHTML(ch.field)+'</span>: <span style="color:#dc2626">'+window.escHTML(ch.old)+'</span> → <strong style="color:#16a34a">'+window.escHTML(ch.fixed)+'</strong>';
        });
        msg += '</div>';
      });
      if(planned.length>20) msg += '<div style="color:#6b7280;margin-top:4px">... และอีก '+(planned.length-20)+' คน</div>';
      msg += '</div>';
      var ok = await window.confirmDialog({
        title:'ยืนยันการซ่อมข้อมูล',
        message: msg,
        confirmText: 'ซ่อมทั้งหมด',
        cancelText: 'ยกเลิก'
      });
      if(!ok) return;
      // Apply
      window.showLoading(true,'กำลังซ่อม...');
      var fns = window.firestore;
      var batch = fns.writeBatch(window.db);
      var n=0, total=0;
      for(var j=0;j<planned.length;j++){
        var p = planned[j];
        var ref = fns.doc(window.db, 'classrooms', p.classId, 'students', p.docId);
        var snap = await fns.getDoc(ref);
        if(!snap.exists()) continue;
        var data = snap.data();
        var newRaw = Object.assign({}, data.raw||{});
        p.changes.forEach(function(ch){ newRaw[ch.field] = ch.fixed; });
        batch.update(ref, {raw:newRaw, updatedAt:fns.serverTimestamp()});
        n++; total++;
        if(n>=400){ await batch.commit(); batch = fns.writeBatch(window.db); n=0; }
      }
      if(n>0) await batch.commit();
      window.AppState.studentsCache = {};
      window.showLoading(false);
      window.showToast('ซ่อมข้อมูลเรียบร้อย '+total+' รายการ','success');
      if(window.refreshCurrentView) window.refreshCurrentView();
    }catch(e){
      console.error(e);
      window.showLoading(false);
      window.showToast('ผิดพลาด: '+e.message,'error');
    }
  };

  window.backupAll = async function(){
    try{
      window.showLoading(true,'กำลังสำรอง...');
      var dump = {
        version: 1,
        exportedAt: new Date().toISOString(),
        settings: window.AppState.settings,
        classrooms: []
      };
      var classes = window.AppState.classrooms || [];
      for(var i=0;i<classes.length;i++){
        var c = classes[i];
        var students = await window.getStudentsOfClass(c.id, false);
        // strip Timestamps
        var cClean = Object.assign({}, c);
        delete cClean.id;
        if(cClean.importedAt && cClean.importedAt.toDate) cClean.importedAt = cClean.importedAt.toDate().toISOString();
        if(cClean.updatedAt && cClean.updatedAt.toDate) cClean.updatedAt = cClean.updatedAt.toDate().toISOString();
        var stuClean = students.map(function(s){
          var x = Object.assign({}, s);
          delete x.id;
          if(x.createdAt && x.createdAt.toDate) x.createdAt = x.createdAt.toDate().toISOString();
          if(x.updatedAt && x.updatedAt.toDate) x.updatedAt = x.updatedAt.toDate().toISOString();
          return x;
        });
        dump.classrooms.push({id: c.id, data: cClean, students: stuClean});
      }
      var blob = new Blob([JSON.stringify(dump, null, 2)], {type:'application/json'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'classroom_backup_'+new Date().toISOString().slice(0,10)+'.json';
      a.click();
      window.showLoading(false);
      window.showToast('สำรองข้อมูลเรียบร้อย','success');
    }catch(e){ window.showLoading(false); window.showToast('สำรองไม่สำเร็จ: '+e.message,'error'); }
  };
