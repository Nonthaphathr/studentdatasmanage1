        '<div class="modal-foot">'+
          '<button class="btn" id="biCancel">ยกเลิก</button>'+
          '<button class="btn btn-primary" id="biSubmit" disabled>✅ ดำเนินการนำเข้า</button>'+
        '</div>'+
      '</div>';
    document.body.appendChild(bd);

    var rowsCache = null;
    function close(){ bd.classList.remove('show'); setTimeout(function(){bd.remove();}, 220); }
    bd.querySelector('#biClose').onclick = close;
    bd.querySelector('#biCancel').onclick = close;

    bd.querySelector('#biFile').addEventListener('change', async function(ev){
      var f = ev.target.files[0]; if(!f) return;
      bd.querySelector('#biSubmit').disabled = true;
      bd.querySelector('#biPreview').innerHTML = '';
      try{
        window.showLoading(true, 'กำลังอ่านไฟล์...');
        var rows = await window.readFileToRows(f);
        window.showLoading(false);
        if(!rows.length){ window.showToast('ไฟล์ว่างเปล่า','warning'); return; }
        var firstRow = rows[0];
        if(!('ชั้น/ห้อง' in firstRow) || !('ชื่อ-สกุลนักเรียน' in firstRow)){
          var cols = Object.keys(firstRow).slice(0,12).join(', ');
          bd.querySelector('#biPreview').innerHTML =
            '<div class="dlg-warn dlg-danger">⚠️ ไม่พบคอลัมน์ที่ต้องการ (<code>ชั้น/ห้อง</code>, <code>ชื่อ-สกุลนักเรียน</code>)<br>'+
            'คอลัมน์ที่พบ: '+window.escHTML(cols)+(Object.keys(firstRow).length>12?'...':'')+'</div>';
          return;
        }
        rowsCache = rows;
        renderBulkPreview();
      } catch(e){
        window.showLoading(false);
        window.showToast('อ่านไฟล์ผิดพลาด: '+e.message, 'error');
      }
    });

    function renderBulkPreview(){
      var st = window.AppState.settings || {};
      var yearGuess = parseInt(rowsCache[0]['ปีการศึกษา'] || st.currentAcademicYear, 10);
      var groups = {}, invalidCount = 0;
      rowsCache.forEach(function(r){
        var cr = parseClassRoom(r['ชั้น/ห้อง']);
        if(!cr){ invalidCount++; return; }
        var key = cr.grade+'/'+cr.room;
        if(!groups[key]) groups[key] = {grade:cr.grade, room:cr.room, students:[]};
        groups[key].students.push(r);
      });
      var groupKeys = Object.keys(groups);
      var html = '<div style="background:var(--bg);border-radius:var(--r);padding:.85rem;margin-top:.6rem">';
      html += '<div style="display:flex;gap:1.2rem;flex-wrap:wrap;margin-bottom:.6rem">';
      html += '<span><strong>จำนวนแถวทั้งหมด:</strong> '+rowsCache.length+' คน</span>';
      html += '<span><strong>ห้องที่พบ:</strong> '+groupKeys.length+' ห้อง</span>';
      if(invalidCount) html += '<span style="color:var(--danger)">⚠️ ระบุชั้น/ห้องไม่ได้: '+invalidCount+' คน (จะข้าม)</span>';
      html += '</div>';
      if(groupKeys.length){
        html += '<table class="data-tbl" style="margin-bottom:.8rem">';
        html += '<thead><tr><th>ชั้น/ห้อง</th><th>นักเรียน</th><th>ชาย</th><th>หญิง</th><th>สถานะในระบบ</th></tr></thead><tbody>';
        var existingIds = (window.AppState.classrooms||[]).map(function(c){return c.id;});
        groupKeys.sort().forEach(function(k){
          var g = groups[k];
          var cid = window.classroomId(yearGuess, g.grade, g.room);
          var info = window.GRADE_INFO[g.grade];
          var maleCount = g.students.filter(function(r){
            var n = (r['ชื่อ-สกุลนักเรียน']||'').trim();
            return n.indexOf('เด็กชาย')===0 || n.indexOf('นาย')===0 || n.indexOf('ด.ช.')===0;
          }).length;
          var exists = existingIds.indexOf(cid) >= 0;
          html += '<tr>';
          html += '<td><span style="background:'+info.color+'1a;color:'+info.color+';padding:2px 8px;border-radius:99px;font-weight:600">'+window.classLabel(info.num, g.room)+'</span></td>';
          html += '<td style="text-align:center">'+g.students.length+'</td>';
          html += '<td style="text-align:center">'+maleCount+'</td>';
          html += '<td style="text-align:center">'+(g.students.length-maleCount)+'</td>';
          html += '<td>'+(exists?'<span style="color:var(--warning);font-weight:600">⚠️ มีอยู่แล้ว</span>':'<span style="color:var(--success)">✅ ใหม่</span>')+'</td>';
          html += '</tr>';
        });
        html += '</tbody></table>';
      }
      html += '<details style="margin-bottom:.6rem"><summary style="cursor:pointer;font-weight:600;margin-bottom:.4rem">ดูตัวอย่างข้อมูล 3 แถวแรก</summary>';
      html += '<div style="overflow-x:auto"><table class="data-tbl" style="font-size:.82rem">';
      var pf = ['ชั้น/ห้อง','เลขประจำตัวนักเรียน','ชื่อ-สกุลนักเรียน','ชื่อเล่น','หมู่เลือด'];
      html += '<thead><tr>'+pf.map(function(f){return '<th>'+window.escHTML(f)+'</th>';}).join('')+'</tr></thead><tbody>';
      rowsCache.slice(0,3).forEach(function(r){ html += '<tr>'+pf.map(function(f){return '<td>'+window.escHTML(r[f]||'')+'</td>';}).join('')+'</tr>'; });
      html += '</tbody></table></div></details>';
      html += '<div class="form-row" style="margin:0"><label>ปีการศึกษาที่จะนำเข้า (พ.ศ.) '+
               '<span style="color:var(--ink-muted);font-weight:400;font-size:.85em">'+(rowsCache[0]['ปีการศึกษา']?'(อ่านจากไฟล์: '+rowsCache[0]['ปีการศึกษา']+')':'(ใช้ค่าจาก Settings)')+'</span></label>'+
               '<input type="number" id="biYear" value="'+yearGuess+'"></div>';
      html += '</div>';
      bd.querySelector('#biPreview').innerHTML = html;
      bd.querySelector('#biSubmit').disabled = (groupKeys.length === 0);
    }

    bd.querySelector('#biSubmit').onclick = async function(){
      if(!rowsCache) return;
      var year = parseInt(bd.querySelector('#biYear').value, 10);
      if(!year || year<2400 || year>2700){ window.showToast('ปีการศึกษาไม่ถูกต้อง','warning'); return; }
      try{
        window.showLoading(true, 'กำลังประมวลผล...');
        var groups = {}, skipped = 0;
        rowsCache.forEach(function(r){
          var cr = parseClassRoom(r['ชั้น/ห้อง']);
          if(!cr){ skipped++; return; }
          var key = cr.grade+'/'+cr.room;
          if(!groups[key]) groups[key] = {grade:cr.grade, room:cr.room, students:[]};
          groups[key].students.push(mapRowFormatA(r));
        });
        var groupKeys = Object.keys(groups);
        if(!groupKeys.length){
          window.showLoading(false);
          window.showToast('ไม่พบแถวที่ระบุชั้น/ห้องได้ ('+skipped+' แถวถูกข้าม)','error');
          return;
        }
        var existingClassIds = (window.AppState.classrooms||[]).map(function(c){return c.id;});
        var conflicts = groupKeys
          .map(function(k){ return window.classroomId(year, groups[k].grade, groups[k].room); })
          .filter(function(cid){ return existingClassIds.indexOf(cid)>=0; });
        var mode = 'overwrite';
        if(conflicts.length){
          window.showLoading(false);
          mode = await chooseConflictMode(conflicts);
          if(!mode) return;
          window.showLoading(true, 'กำลังบันทึก...');
        }
        var totalImported = 0;
        for(var i=0; i<groupKeys.length; i++){
          var k = groupKeys[i];
          var g = groups[k];
          var students = sortAndOrder(g.students);
          var male = students.filter(function(s){return s.gender==='ชาย';}).length;
          var female = students.filter(function(s){return s.gender==='หญิง';}).length;
          var cid = await window.upsertClassroom({
            academicYear: year, grade: g.grade, room: g.room,
            studentCount: students.length, maleCount: male, femaleCount: female, sourceFormat:'A'
          });
          if(mode==='merge'){
            var existing = await window.getStudentsOfClass(cid, true);
            var existingIdMap = {};
            existing.forEach(function(s){ existingIdMap[String(s.studentId||'').trim()] = true; });
            var combined = existing.slice();
            students.forEach(function(s){
              var sid = String(s.studentId||'').trim();
              if(!existingIdMap[sid]) combined.push(s);
            });
            combined = sortAndOrder(combined);
            await window.bulkSaveStudents(cid, combined);
            await window.upsertClassroom({
              academicYear: year, grade: g.grade, room: g.room,
              studentCount: combined.length,
              maleCount: combined.filter(function(s){return s.gender==='ชาย';}).length,
              femaleCount: combined.filter(function(s){return s.gender==='หญิง';}).length,
              sourceFormat:'A'
            });
            totalImported += combined.length - existing.length;
          } else {
            await window.bulkSaveStudents(cid, students);
            totalImported += students.length;
          }
        }
        window.showLoading(false);
        var msg = 'นำเข้าสำเร็จ '+totalImported+' คน ('+groupKeys.length+' ห้อง)';
        if(skipped) msg += ' — ข้าม '+skipped+' แถว (ไม่มีชั้น/ห้อง)';
        window.showToast(msg, 'success', 5000);
        close();
      } catch(e){
        window.showLoading(false);
        console.error(e);
        window.showToast('นำเข้าผิดพลาด: '+e.message, 'error');
      }
    };
  };


  // ═══════════════════════════════════════════════════════════════
  //  IMPORT จาก LEC (RPT318 — รายงานรายละเอียดข้อมูลนักเรียน อปท.)
  //  ไฟล์ .xls หัวตาราง 2 แถว (แถว 0=ชื่อรายงาน, 1-2=หัวคอลัมน์, 3+=ข้อมูล)
  //  อ่านตามตำแหน่งคอลัมน์คงที่ของแบบฟอร์มราชการ แล้ว map เข้าคีย์ของระบบ
  // ═══════════════════════════════════════════════════════════════

  // ดึงค่าจาก cell ของ SheetJS ตาม row/col (เก็บ leading zero / เลขบัตร)
  function lecCellAt(ws, r, c){
    var addr = XLSX.utils.encode_cell({r:r, c:c});
    var cell = ws[addr];
    if(!cell) return '';
    var v = (cell.w!=null ? cell.w : cell.v);
    return window.cleanExcelValue(v==null ? '' : v);
  }

  // map "มัธยมศึกษาปีที่ X" → 'mX'
  function lecGrade(s){
    s = String(s||'').trim();
    s = s.replace(/[๐-๙]/g, function(ch){ return String('๐๑๒๓๔๕๖๗๘๙'.indexOf(ch)); });
    var m = s.match(/([1-6])/);
    return m ? ('m'+m[1]) : null;
  }
  // ห้องเรียน "1.0" → "1" ; ว่าง → ''
  function lecRoom(s){
    s = String(s==null?'':s).trim();
    if(!s) return '';
    var m = s.match(/^(\d+)(?:\.0+)?$/);
    return m ? m[1] : s;
  }
  function lecGender(s){
    s = String(s||'').trim();
    if(s.indexOf('ชาย')>=0) return 'ชาย';
    if(s.indexOf('หญิง')>=0) return 'หญิง';
    return 'ไม่ระบุ';
  }
  // รวมคำนำหน้า+ชื่อ+สกุล เป็น "ชื่อ-สกุล" (ตัดช่องว่างซ้ำ)
  function lecJoinName(prefix, first, last){
    return [String(prefix||'').trim(), String(first||'').trim(), String(last||'').trim()]
      .filter(Boolean).join(' ').replace(/\s+/g,' ').trim();
  }

  // ── อ่านไฟล์ LEC → [{grade, room, student}] ──
  // student = {studentId, fullName, gender, phone, raw:{...คีย์ระบบ}}
  window.readLECFile = function(file){
    return new Promise(function(resolve, reject){
      var fr = new FileReader();
      fr.onerror = function(){ reject(new Error('อ่านไฟล์ไม่ได้')); };
      fr.onload = function(e){
        try{
          var data = new Uint8Array(e.target.result);
          var wb = XLSX.read(data, {type:'array', cellDates:false});
          var ws = wb.Sheets[wb.SheetNames[0]];
          if(!ws || !ws['!ref']) throw new Error('ไม่พบข้อมูลในไฟล์');
          var range = XLSX.utils.decode_range(ws['!ref']);

          // หาแถวหัวตาราง (แถวที่มีคำว่า "เลขประจำตัวนักเรียน")
          var headerRow = -1;
          for(var r=range.s.r; r<=Math.min(range.s.r+8, range.e.r); r++){
            for(var c=range.s.c; c<=range.e.c; c++){
              if(String(lecCellAt(ws,r,c)).indexOf('เลขประจำตัวนักเรียน')>=0){ headerRow=r; break; }
            }
            if(headerRow>=0) break;
          }
          if(headerRow<0) throw new Error('ไม่ใช่ไฟล์ LEC (RPT318) — ไม่พบหัวคอลัมน์มาตรฐาน');
          // ข้อมูลเริ่มหลังหัวตาราง 2 แถว (หัวเป็น merged 2 บรรทัด)
          var dataStart = headerRow + 2;

          // ตำแหน่งคอลัมน์คงที่ของ RPT318 (อิง index จากหัวคอลัมน์ตัวแรก)
          var C = {
            sid:7, gender:8, prefix:9, first:10, last:11, birth:12,
            nationality:13, race:14, religion:15, nid:16, grade:18, room:19,
            height:22, weight:23,
            fPrefix:43, fFirst:44, fLast:45, fReligion:46, fJob:47, fIncome:48, fPhone:49,
            mPrefix:50, mFirst:51, mLast:52, mReligion:53, mJob:54, mIncome:55, mPhone:56,
            parentStatus:57,
            gPrefix:58, gFirst:59, gLast:60, gReligion:61, gJob:62, gIncome:63, gRel:64, gPhone:65,
            // ที่อยู่ตามทะเบียนบ้าน 68-74 ; ที่อยู่ปัจจุบัน 75-81
            rNo:68, rMoo:69, rRoad:70, rTambon:71, rAmphoe:72, rProvince:73, rZip:74,
            cNo:75, cMoo:76, cRoad:77, cTambon:78, cAmphoe:79, cProvince:80, cZip:81
          };

          var out = [];
          for(var rr=dataStart; rr<=range.e.r; rr++){
            var sid    = lecCellAt(ws, rr, C.sid).trim();
            var first  = lecCellAt(ws, rr, C.first).trim();
            var last   = lecCellAt(ws, rr, C.last).trim();
            var prefix = lecCellAt(ws, rr, C.prefix).trim();
            // ข้ามแถวว่าง / แถวรวม
            if(!sid && !first && !last) continue;

            var gradeKey = lecGrade(lecCellAt(ws, rr, C.grade));
            var room     = lecRoom(lecCellAt(ws, rr, C.room));
            var nid      = lecCellAt(ws, rr, C.nid).replace(/[^0-9]/g,'').trim();
            var fullName = lecJoinName(prefix, first, last);
            var phone    = lecCellAt(ws, rr, C.gPhone).trim() || lecCellAt(ws, rr, C.fPhone).trim() || lecCellAt(ws, rr, C.mPhone).trim();

            // แยกวันเกิด DD/MM/YYYY(พ.ศ.)
            var bd='', bm='', by='';
            var bRaw = lecCellAt(ws, rr, C.birth).trim();
            var bm_ = bRaw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if(bm_){ bd=String(parseInt(bm_[1],10)); bm=String(parseInt(bm_[2],10)); by=bm_[3]; }

            var raw = {
              'ชื่อ-สกุลนักเรียน': fullName,
              'เลขประจำตัวนักเรียน': sid,
              'เลขบัตรนักเรียน': nid,
              'วันเกิด(วัน)': bd,
              'วันเกิด(เดือน)': bm,
              'วันเกิด(ปีพ.ศ.)': by,
              'น้ำหนัก(กก.)': lecCellAt(ws, rr, C.weight).trim(),
              'ส่วนสูง(ซม.)': lecCellAt(ws, rr, C.height).trim(),
              'สัญชาตินักเรียน': lecCellAt(ws, rr, C.nationality).trim(),
              'เชื้อชาตินักเรียน': lecCellAt(ws, rr, C.race).trim(),
              'ศาสนานักเรียน': lecCellAt(ws, rr, C.religion).trim(),
              // ── ที่อยู่ตามทะเบียนบ้าน ──
              'บ้านเลขที่นักเรียน': lecCellAt(ws, rr, C.rNo).trim(),
              'หมู่นักเรียน': lecRoom(lecCellAt(ws, rr, C.rMoo)),
              'ตำบลนักเรียน': lecCellAt(ws, rr, C.rTambon).trim(),
              'อำเภอนักเรียน': lecCellAt(ws, rr, C.rAmphoe).trim(),
              'จังหวัดนักเรียน': lecCellAt(ws, rr, C.rProvince).trim(),
              'รหัสไปรษณีย์นักเรียน': lecRoom(lecCellAt(ws, rr, C.rZip)),
              // ── ที่อยู่ปัจจุบัน ──
              'บ้านเลขที่ปัจจุบัน': lecCellAt(ws, rr, C.cNo).trim(),
              'หมู่ปัจจุบัน': lecRoom(lecCellAt(ws, rr, C.cMoo)),
              'ตำบลปัจจุบัน': lecCellAt(ws, rr, C.cTambon).trim(),
              'อำเภอปัจจุบัน': lecCellAt(ws, rr, C.cAmphoe).trim(),
              'จังหวัดปัจจุบัน': lecCellAt(ws, rr, C.cProvince).trim(),
              'ไปรษณีย์ปัจจุบัน': lecRoom(lecCellAt(ws, rr, C.cZip)),
              // ── บิดา ──
              'คำนำหน้าบิดา': lecCellAt(ws, rr, C.fPrefix).trim(),
              'ชื่อบิดา': lecCellAt(ws, rr, C.fFirst).trim(),
              'นามสกุลบิดา': lecCellAt(ws, rr, C.fLast).trim(),
              'ชื่อ-สกุลบิดา': lecJoinName(lecCellAt(ws,rr,C.fPrefix), lecCellAt(ws,rr,C.fFirst), lecCellAt(ws,rr,C.fLast)),
              'ศาสนาบิดา': lecCellAt(ws, rr, C.fReligion).trim(),
              'อาชีพบิดา': lecCellAt(ws, rr, C.fJob).trim(),
              'รายได้บิดา': lecRoom(lecCellAt(ws, rr, C.fIncome)),
              'โทรบิดา': lecCellAt(ws, rr, C.fPhone).trim(),
              // ── มารดา ──
              'คำนำหน้ามารดา': lecCellAt(ws, rr, C.mPrefix).trim(),
              'ชื่อมารดา': lecCellAt(ws, rr, C.mFirst).trim(),
              'นามสกุลมารดา': lecCellAt(ws, rr, C.mLast).trim(),
              'ชื่อ-สกุลมารดา': lecJoinName(lecCellAt(ws,rr,C.mPrefix), lecCellAt(ws,rr,C.mFirst), lecCellAt(ws,rr,C.mLast)),
              'ศาสนามารดา': lecCellAt(ws, rr, C.mReligion).trim(),
              'อาชีพมารดา': lecCellAt(ws, rr, C.mJob).trim(),
              'รายได้มารดา': lecRoom(lecCellAt(ws, rr, C.mIncome)),
              'โทรมารดา': lecCellAt(ws, rr, C.mPhone).trim(),
              'สถานภาพบิดา-มารดา': lecCellAt(ws, rr, C.parentStatus).trim(),
              // ── ผู้ปกครอง ──
              'คำนำหน้าผู้ปกครอง': lecCellAt(ws, rr, C.gPrefix).trim(),
              'ชื่อจริงผู้ปกครอง': lecCellAt(ws, rr, C.gFirst).trim(),
              'นามสกุลผู้ปกครอง': lecCellAt(ws, rr, C.gLast).trim(),
              'ชื่อผู้ปกครอง': lecJoinName(lecCellAt(ws,rr,C.gPrefix), lecCellAt(ws,rr,C.gFirst), lecCellAt(ws,rr,C.gLast)),
              'อาชีพผู้ปกครอง': lecCellAt(ws, rr, C.gJob).trim(),
              'รายได้ผู้ปกครอง': lecRoom(lecCellAt(ws, rr, C.gIncome)),
              'ความสัมพันธ์ผู้ปกครอง': lecCellAt(ws, rr, C.gRel).trim(),
              'โทรมือถือผู้ปกครอง': lecCellAt(ws, rr, C.gPhone).trim()
            };
            // ลบคีย์ที่ว่างทิ้ง เพื่อให้ตอน merge แบบ "เติมที่ขาด" ไม่ไปทับด้วยค่าว่าง
            Object.keys(raw).forEach(function(k){ if(raw[k]==='' ) delete raw[k]; });

            out.push({
              grade: gradeKey, room: room,
              student: {
                studentId: sid,
                fullName: fullName,
                nickname: '',
                gender: lecGender(lecCellAt(ws, rr, C.gender)),
                phone: String(phone||'').trim(),
                raw: raw
              }
            });
          }
          if(!out.length) throw new Error('ไม่พบแถวข้อมูลนักเรียนในไฟล์');
          resolve(out);
        }catch(err){ reject(err); }
      };
      fr.readAsArrayBuffer(file);
    });
  };

  // ── รวมระเบียนนักเรียน: existing (ของเดิม) + incoming (นำเข้าใหม่) ──
  // matchMode: 'fill' = เก็บของเดิม เติมเฉพาะช่องที่ขาด ; 'overwrite' = ค่าใหม่ทับ (ช่องที่ใหม่ไม่มี ยังคงของเดิม)
  // คงรูปนักเรียน (photoFileId/photoURL) และ docId เดิมไว้เสมอ
  window.mergeStudentLists = function(existing, incoming, matchMode){
    function keyOf(s){
      var sid = String(s.studentId||'').trim();
      if(sid) return 'sid:'+sid;
      var nid = String((s.raw&&s.raw['เลขบัตรนักเรียน'])||'').replace(/[^0-9]/g,'');
      return nid ? 'nid:'+nid : null;
    }
    function isBlank(v){ var t=(v==null?'':String(v).trim()); return !t || t.indexOf('ไม่ทราบ')>=0; }

    var idx = {};
    var combined = existing.map(function(s){ return Object.assign({}, s); });
    combined.forEach(function(s, i){
      var k = keyOf(s); if(k && idx[k]===undefined) idx[k]=i;
      // เผื่อจับด้วยเลขบัตรได้อีกทาง
      var nid = String((s.raw&&s.raw['เลขบัตรนักเรียน'])||'').replace(/[^0-9]/g,'');
      if(nid && idx['nid:'+nid]===undefined) idx['nid:'+nid]=i;
    });

    var added=0, updated=0;
    incoming.forEach(function(ns){
      var k = keyOf(ns);
      var nid = String((ns.raw&&ns.raw['เลขบัตรนักเรียน'])||'').replace(/[^0-9]/g,'');
      var pos = (k!=null && idx[k]!==undefined) ? idx[k]
               : (nid && idx['nid:'+nid]!==undefined ? idx['nid:'+nid] : undefined);

      if(pos===undefined){
        // นักเรียนใหม่
        combined.push(Object.assign({}, ns));
        var np = combined.length-1;
        if(k!=null) idx[k]=np;
        if(nid) idx['nid:'+nid]=np;
        added++;
        return;
      }
      // มีอยู่แล้ว → merge ตามโหมด
      var cur = combined[pos];
      var curRaw = Object.assign({}, cur.raw||{});
      var inRaw  = ns.raw||{};
      if(matchMode==='overwrite'){
        // ค่าใหม่ทับ (เฉพาะที่มีค่า) — ช่องที่ใหม่ไม่มี ยังเก็บของเดิม
        Object.keys(inRaw).forEach(function(f){ if(!isBlank(inRaw[f])) curRaw[f]=inRaw[f]; });
        if(!isBlank(ns.fullName)) cur.fullName = ns.fullName;
        if(!isBlank(ns.phone))    cur.phone    = ns.phone;
        if(!isBlank(ns.gender) && ns.gender!=='ไม่ระบุ') cur.gender = ns.gender;
        if(!isBlank(ns.studentId)) cur.studentId = ns.studentId;
      } else {
        // 'fill' — เติมเฉพาะที่ขาด ของเดิมอยู่ครบ
        Object.keys(inRaw).forEach(function(f){ if(isBlank(curRaw[f]) && !isBlank(inRaw[f])) curRaw[f]=inRaw[f]; });
        if(isBlank(cur.fullName)) cur.fullName = ns.fullName;
        if(isBlank(cur.phone))    cur.phone    = ns.phone;
        if((isBlank(cur.gender)||cur.gender==='ไม่ระบุ') && ns.gender && ns.gender!=='ไม่ระบุ') cur.gender = ns.gender;
        if(isBlank(cur.studentId)) cur.studentId = ns.studentId;
      }
      cur.raw = curRaw;
      // คงรูป/รหัสเอกสารเดิมไว้ (ไม่ทับ)
      // photoFileId, photoURL, id ของ cur ยังอยู่เดิมจากการ clone ข้างต้น
      updated++;
    });
    return {list:combined, added:added, updated:updated};
  };

  // ── เลือกวิธีจัดการเมื่อนำเข้าทับห้องที่มีอยู่ (LEC) — 3 ตัวเลือก ──

            '<td style="text-align:center">'+(g.students.length-male)+'</td>'+

      html += '<thead><tr><th>เลขประจำตัว</th><th>ชื่อ-สกุล</th><th>เพศ</th><th>เลขบัตร</th><th>เกิด</th><th>บิดา</th><th>มารดา</th></tr></thead><tbody>';
      parsed.slice(0,3).forEach(function(rec){
        var s = rec.student, r = s.raw;
        var bdate = [r['วันเกิด(วัน)'],r['วันเกิด(เดือน)'],r['วันเกิด(ปีพ.ศ.)']].filter(Boolean).join('/');
        html += '<tr><td>'+window.escHTML(s.studentId)+'</td><td>'+window.escHTML(s.fullName)+'</td><td>'+window.escHTML(s.gender)+'</td>'+

      html += '</div>';

    bd.querySelector('#lecSubmit').onclick = async function(){
      if(!parsed) return;
      var year = parseInt(bd.querySelector('#lecYear').value, 10);
      if(!year || year<2400 || year>2700){ window.showToast('ปีการศึกษาไม่ถูกต้อง','warning'); return; }
      try{
        window.showLoading(true, 'กำลังประมวลผล...');
        var groups = {}, skipped = 0;
        parsed.forEach(function(rec){
          if(!rec.grade){ skipped++; return; }
          var key = rec.grade+'/'+rec.room;
          if(!groups[key]) groups[key] = {grade:rec.grade, room:rec.room, students:[]};
          groups[key].students.push(rec.student);
        });
        var keys = Object.keys(groups);
        if(!keys.length){ window.showLoading(false); window.showToast('ไม่พบแถวที่ระบุชั้นได้','error'); return; }

        // ── ตรวจห้องซ้ำจากข้อมูลจริงใน Firestore (ไม่พึ่ง AppState ที่อาจไม่ตรง) ──
        // ดึงนักเรียนของห้องปลายทางทุกห้องมาก่อน เพื่อรู้ว่าห้องไหน "มีข้อมูลอยู่จริง"
        window.showLoading(true, 'กำลังตรวจสอบข้อมูลเดิม...');
        var existingByCid = {};   // cid → [students]
        var conflicts = [];
        for(var ci=0; ci<keys.length; ci++){
          var gg = groups[keys[ci]];
          var ccid = window.classroomId(year, gg.grade, gg.room);
          var ex = [];
          try{ ex = await window.getStudentsOfClass(ccid, true); }catch(e){ ex = []; }
          existingByCid[ccid] = ex;
          if(ex && ex.length > 0) conflicts.push(ccid);
        }

        var mode = 'replace'; // ถ้าไม่มีห้องซ้ำ → ใส่ใหม่ทั้งหมด
        if(conflicts.length){
          window.showLoading(false);
          mode = await chooseLECMode(conflicts);
          if(!mode) return;          // ยกเลิก → ไม่เขียนอะไรเลย
          window.showLoading(true, 'กำลังบันทึก...');
        }

        var totalNew=0, totalUpd=0;
        for(var i=0;i<keys.length;i++){
          var g = groups[keys[i]];
          var incoming = sortAndOrder(g.students);
          var cid = window.classroomId(year, g.grade, g.room);
          var existing = existingByCid[cid] || [];
          var isConflict = existing.length > 0;
          var finalList;
          if(isConflict && (mode==='fill' || mode==='overwrite')){
            var res = window.mergeStudentLists(existing, incoming, mode);
            finalList = sortAndOrder(res.list);
            totalNew += res.added; totalUpd += res.updated;
          } else {
            // replace หรือห้องใหม่
            finalList = incoming;
            totalNew += incoming.length;
          }
          var male = finalList.filter(function(s){return s.gender==='ชาย';}).length;
          var female = finalList.filter(function(s){return s.gender==='หญิง';}).length;
          await window.upsertClassroom({ academicYear:year, grade:g.grade, room:g.room,
            studentCount: finalList.length, maleCount:male, femaleCount:female, sourceFormat:'LEC' });
          await window.bulkSaveStudents(cid, finalList);
        }
        window.showLoading(false);
        var msg = 'นำเข้าจาก LEC สำเร็จ — เพิ่มใหม่ '+totalNew+' คน';
        if(totalUpd) msg += ', อัปเดต '+totalUpd+' คน';
        msg += ' ('+keys.length+' ห้อง)';
        if(skipped) msg += ' — ข้าม '+skipped+' คน';
        window.showToast(msg, 'success', 6000);
        close();
      }catch(e){
        window.showLoading(false);
        console.error(e);
        window.showToast('นำเข้าผิดพลาด: '+e.message, 'error');
      }
    };
  };

  window.exportCurrentClassroom = async function(){

    try{
      window.showLoading(true,'กำลังสร้างไฟล์...');
      var students = await window.getStudentsOfClass(cid, true);
      if(!students.length){ window.showLoading(false); window.showToast('ห้องนี้ไม่มีนักเรียน','warning'); return; }
      var rm = (window.AppState.classrooms||[]).find(function(c){return c.id===cid});
      var info = window.GRADE_INFO[rm.grade];
      // ใช้ raw object ตามรูปแบบเดิม (ถ้า A จะมีคอลัมน์ครบ)
      var rows = students.map(function(s, i){
        var base = {
          'ลำดับ': s.order||i+1,
          'เลขประจำตัวนักเรียน': s.studentId||'',
          'ชื่อ-สกุล': s.fullName||'',
          'ชื่อเล่น': s.nickname||'',
          'เพศ': s.gender||''
        };
        // ผสานกับ raw data ของเดิม
        if(s.raw){ Object.assign(base, s.raw); }
        return base;
      });
      var ws = XLSX.utils.json_to_sheet(rows);

      var fname = 'รายชื่อนักเรียน_ม'+info.num + (rm.room?'-'+rm.room:'') +'_ปี'+rm.academicYear+'.xlsx';

      window.showLoading(false);

    }
  };

  // ═══════════════ Village name template (export blank → user fills → re-import) ═══════════════
  window.exportVillageTemplate = async function(){
    if(typeof XLSX === 'undefined'){ window.showToast('SheetJS ยังโหลดไม่เสร็จ ลองใหม่อีกครั้ง','error'); return; }
    try{
      window.showLoading(true,'กำลังเตรียม Template...');
      var year = window.AppState.settings.currentAcademicYear;
      var classrooms = (window.AppState.classrooms||[]).filter(function(c){return Number(c.academicYear)===Number(year);});
      if(!classrooms.length){
        window.showLoading(false);
        window.showToast('ไม่มีห้องเรียนในปี '+year,'warning');
        return;
      }
      // Sort classrooms by grade then room
      classrooms.sort(function(a,b){
        if(a.grade!==b.grade) return a.grade.localeCompare(b.grade);
        return String(a.room||'').localeCompare(String(b.room||''),'th',{numeric:true});
      });
      var rows = [];
      for(var i=0;i<classrooms.length;i++){
        var cr = classrooms[i];
        var info = window.GRADE_INFO[cr.grade];
        var label = window.classLabel(info.num, cr.room);
        var students = await window.getStudentsOfClass(cr.id, true);
        // Sort students by studentId for predictable order
        students.sort(function(a,b){
          return String(a.studentId||'').localeCompare(String(b.studentId||''),'th',{numeric:true});
        });
        students.forEach(function(s){
          rows.push({
            'เลขประจำตัวนักเรียน': s.studentId || '',
            'ชื่อ-สกุล': s.fullName || '',
            'ชั้น': label,
            'ชื่อหมู่บ้านนักเรียน': (s.raw && s.raw['หมู่บ้านนักเรียน']) || '',
            'ชื่อหมู่บ้านผู้ปกครอง': (s.raw && s.raw['หมู่บ้านผู้ปกครอง']) || '',
            'โรงเรียนเดิม': (function(rr){return rr['โรงเรียนเดิม']||rr['เดิม']||rr['ชื่อโรงเรียนเดิม']||rr['โรงเรียนที่จบ']||'';})(s.raw||{})
          });
        });
      }
      if(!rows.length){
        window.showLoading(false);
        window.showToast('ไม่พบนักเรียนในระบบ','warning');
        return;
      }
      var wb = XLSX.utils.book_new();
      var ws = XLSX.utils.json_to_sheet(rows);
      // Force studentId column to render as text in Excel (preserves leading zeros)
      var range = XLSX.utils.decode_range(ws['!ref']);
      for(var R=range.s.r+1; R<=range.e.r; R++){
        var addr = XLSX.utils.encode_cell({c:0, r:R});
        if(ws[addr]){ ws[addr].t = 's'; ws[addr].v = String(ws[addr].v); }
      }
      ws['!cols'] = [{wch:18},{wch:30},{wch:12},{wch:24},{wch:24},{wch:30}];
      XLSX.utils.book_append_sheet(wb, ws, 'หมู่บ้าน');

  window.importVillageData = function(){
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = '.xlsx,.xls,.csv';
    input.style.display = 'none';
    document.body.appendChild(input);
    input.onchange = async function(ev){
      var f = ev.target.files[0];
      if(!f){ input.remove(); return; }
      try{
        window.showLoading(true,'กำลังอ่านไฟล์...');
        var rows = await window.readFileToRows(f);
        if(!rows.length){
          window.showLoading(false);
          window.showToast('ไฟล์ว่างเปล่า','warning');
          input.remove();
          return;
        }
        // Validate columns
        var headers = Object.keys(rows[0]);
        if(headers.indexOf('เลขประจำตัวนักเรียน')<0 || headers.indexOf('ชื่อหมู่บ้านนักเรียน')<0){
          window.showLoading(false);
          window.showToast('ไฟล์ไม่ถูกรูปแบบ — ต้องมีคอลัมน์ "เลขประจำตัวนักเรียน" และ "ชื่อหมู่บ้านนักเรียน"','error');
          input.remove();
          return;
        }
        // Build student index across ALL classrooms (any year) by studentId
        window.showLoading(true,'กำลังจับคู่ข้อมูล...');
        var allClasses = window.AppState.classrooms || [];
        var studentIndex = {};
        for(var i=0;i<allClasses.length;i++){
          var cr = allClasses[i];
          var students = await window.getStudentsOfClass(cr.id, true);
          students.forEach(function(s){
            var sid = String(s.studentId||'').trim();
            if(sid){
              studentIndex[sid] = {
                classId: cr.id,
                docId: s.id,
                fullName: s.fullName || '',
                currentVillage: (s.raw && s.raw['หมู่บ้านนักเรียน']) || '',
                currentGuardianVillage: (s.raw && s.raw['หมู่บ้านผู้ปกครอง']) || '',
                currentSchool: (function(rr){return rr['โรงเรียนเดิม']||rr['เดิม']||rr['ชื่อโรงเรียนเดิม']||rr['โรงเรียนที่จบ']||'';})(s.raw||{})
              };
            }
          });
        }
        // Process rows
        var updates = [];
        var unmatched = [];
        rows.forEach(function(r){
          var sid = String(r['เลขประจำตัวนักเรียน']||'').trim();
          if(!sid) return;
          var vStu  = String(r['ชื่อหมู่บ้านนักเรียน']||'').trim();
          var vGuar = String(r['ชื่อหมู่บ้านผู้ปกครอง']||'').trim();
          var vSch  = String((function(rr){return rr['โรงเรียนเดิม']||rr['เดิม']||rr['ชื่อโรงเรียนเดิม']||rr['โรงเรียนที่จบ']||'';})(r)||'').trim();
          if(!vStu && !vGuar && !vSch) return;   // user didn't fill anything
          var match = studentIndex[sid];
          if(!match){
            unmatched.push({sid:sid, name:r['ชื่อ-สกุล']||''});
            return;
          }
          var changedStu  = vStu  && vStu  !== match.currentVillage;
          var changedGuar = vGuar && vGuar !== match.currentGuardianVillage;
          var changedSch  = vSch  && vSch  !== match.currentSchool;
          if(changedStu || changedGuar || changedSch){
            updates.push({
              classId: match.classId, docId: match.docId,
              name: match.fullName, sid: sid,
              vStu: changedStu ? vStu : null,
              vGuar: changedGuar ? vGuar : null,
              vSch:  changedSch ? vSch : null,
              oldVStu: match.currentVillage,
              oldVGuar: match.currentGuardianVillage,
              oldVSch: match.currentSchool
            });
          }
        });
        window.showLoading(false);

        if(!updates.length && !unmatched.length){
          window.showToast('ไม่มีข้อมูลที่ต้องอัปเดต (อาจจะตรงกับที่มีอยู่แล้ว)','info');
          input.remove();
          return;
        }

        // Build confirmation message
        var msg = '<div style="margin-bottom:10px">เตรียมอัปเดตข้อมูลให้นักเรียน <strong style="color:#16a34a">'+updates.length+'</strong> คน</div>';
        if(updates.length){
          msg += '<div style="max-height:200px;overflow:auto;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px;font-size:12px;line-height:1.6">';
          updates.slice(0,15).forEach(function(u){
            var line = '• '+window.escHTML(u.name)+' ('+window.escHTML(u.sid)+')';
            if(u.vStu)  line += '<br>&nbsp;&nbsp;หมู่บ้านนักเรียน: <span style="color:#9ca3af">'+window.escHTML(u.oldVStu||'(ว่าง)')+'</span> → <strong style="color:#16a34a">'+window.escHTML(u.vStu)+'</strong>';
            if(u.vGuar) line += '<br>&nbsp;&nbsp;หมู่บ้านผู้ปกครอง: <span style="color:#9ca3af">'+window.escHTML(u.oldVGuar||'(ว่าง)')+'</span> → <strong style="color:#16a34a">'+window.escHTML(u.vGuar)+'</strong>';
            if(u.vSch)  line += '<br>&nbsp;&nbsp;โรงเรียนเดิม: <span style="color:#9ca3af">'+window.escHTML(u.oldVSch||'(ว่าง)')+'</span> → <strong style="color:#16a34a">'+window.escHTML(u.vSch)+'</strong>';
            msg += '<div>'+line+'</div>';
          });
          if(updates.length>15) msg += '<div style="color:#6b7280;margin-top:4px">... และอีก '+(updates.length-15)+' คน</div>';
          msg += '</div>';
        }
        if(unmatched.length){
          msg += '<div style="margin-top:10px;padding:8px;background:#fef3c7;border-radius:8px;color:#92400e;font-size:12px">⚠️ ไม่พบในระบบ '+unmatched.length+' คน:';
          unmatched.slice(0,5).forEach(function(u){ msg += '<br>• '+window.escHTML(u.name)+' ('+window.escHTML(u.sid)+')'; });
          if(unmatched.length>5) msg += '<br>... และอีก '+(unmatched.length-5)+' คน';
          msg += '</div>';
        }

        var ok = await window.confirmDialog({
          title:'ยืนยันอัปเดตข้อมูล',
          message: msg,
          confirmText: 'อัปเดตทั้งหมด',
          cancelText: 'ยกเลิก'
        });
        if(!ok){ input.remove(); return; }

        // Apply updates with Firestore writeBatch
        window.showLoading(true,'กำลังอัปเดต...');
        var fns = window.firestore;
        var batch = fns.writeBatch(window.db);
        var n = 0, totalDone = 0;
        for(var j=0;j<updates.length;j++){
          var u = updates[j];
          var ref = fns.doc(window.db, 'classrooms', u.classId, 'students', u.docId);
          var snap = await fns.getDoc(ref);
          if(!snap.exists()) continue;
          var data = snap.data();
          var newRaw = Object.assign({}, data.raw||{});
          if(u.vStu)  newRaw['หมู่บ้านนักเรียน'] = u.vStu;
          if(u.vGuar) newRaw['หมู่บ้านผู้ปกครอง'] = u.vGuar;
          if(u.vSch)  newRaw['โรงเรียนเดิม'] = u.vSch;
          batch.update(ref, {raw:newRaw, updatedAt:fns.serverTimestamp()});
          n++; totalDone++;
          if(n>=400){ await batch.commit(); batch = fns.writeBatch(window.db); n=0; }
        }
        if(n>0) await batch.commit();
        // Invalidate cache
        window.AppState.studentsCache = {};
        window.showLoading(false);
        window.showToast('อัปเดตข้อมูลเรียบร้อย '+totalDone+' คน','success');
        if(window.refreshCurrentView) window.refreshCurrentView();
      }catch(e){
        console.error(e);
        window.showLoading(false);
        window.showToast('ผิดพลาด: '+e.message,'error');
      }finally{
        input.remove();
      }
    };
    input.click();
  };

  // ═══════════════ Repair date-corrupted house numbers (batch) ═══════════════
  // Scans every student in every classroom for house number fields that look like
  // "6-Dec" or other date corruption, and reverts them to "6/12" format.
  window.fixDateCorruptedHouseNos = async function(){
    function fixDateLikeStr(v){
      if(v==null) return '';
      var s = String(v).trim();
      if(!s) return '';
      var months = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
      var m1 = s.match(/^(\d{1,2})-([A-Za-z]{3})$/);
      if(m1 && months[m1[2]]){ return m1[1] + '/' + months[m1[2]]; }
      var m2 = s.match(/^([A-Za-z]{3})-(\d{1,2})$/);
      if(m2 && months[m2[1]]){ return m2[2] + '/' + months[m2[1]]; }
      var m3 = s.match(/[A-Za-z]{3}\s+([A-Za-z]{3})\s+(\d{1,2})/);
      if(m3 && months[m3[1]]){ return parseInt(m3[2],10) + '/' + months[m3[1]]; }
      var m4 = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
      if(m4){ return parseInt(m4[3],10) + '/' + parseInt(m4[2],10); }
      return s;
    }
    var fields = ['บ้านเลขที่นักเรียน','บ้านเลขที่ปัจจุบัน','บ้านเลขที่ผู้ปกครอง','บ้านเลขที่บิดา','บ้านเลขที่มารดา'];
    try{
      window.showLoading(true,'กำลังสแกน...');
      var allClasses = window.AppState.classrooms || [];
      var planned = [];   // {classId, docId, name, sid, changes:[{field, old, fixed}]}
      for(var i=0;i<allClasses.length;i++){
        var cr = allClasses[i];
        var students = await window.getStudentsOfClass(cr.id, true);
        students.forEach(function(s){
          var raw = s.raw || {};
          var changes = [];
          fields.forEach(function(f){
            var orig = raw[f];
            if(!orig) return;
            var fixed = fixDateLikeStr(orig);
            if(fixed && fixed !== String(orig)){
              changes.push({field:f, old:String(orig), fixed:fixed});
            }
          });
          if(changes.length){
            planned.push({classId:cr.id, docId:s.id, name:s.fullName||'', sid:s.studentId||'', changes:changes});
          }
        });
      }
      window.showLoading(false);
      if(!planned.length){
        window.showToast('ไม่พบข้อมูลที่ต้องซ่อม ✅','success');
        return;
      }
      // Confirm dialog
      var msg = '<div style="margin-bottom:10px">พบบ้านเลขที่ที่ต้องซ่อม <strong style="color:#16a34a">'+planned.length+'</strong> รายการ</div>'+
                '<div style="max-height:240px;overflow:auto;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px;font-size:12px;line-height:1.6">';
      planned.slice(0,20).forEach(function(p){
        msg += '<div style="margin-bottom:4px">• '+window.escHTML(p.name)+' ('+window.escHTML(p.sid)+')';
        p.changes.forEach(function(ch){
          msg += '<br>&nbsp;&nbsp;<span style="color:#6b7280">'+window.escHTML(ch.field)+'</span>: <span style="color:#dc2626">'+window.escHTML(ch.old)+'</span> → <strong style="color:#16a34a">'+window.escHTML(ch.fixed)+'</strong>';
        });
        msg += '</div>';
      });
      if(planned.length>20) msg += '<div style="color:#6b7280;margin-top:4px">... และอีก '+(planned.length-20)+' คน</div>';
      msg += '</div>';
      var ok = await window.confirmDialog({
        title:'ยืนยันการซ่อมข้อมูล',
        message: msg,
        confirmText: 'ซ่อมทั้งหมด',
        cancelText: 'ยกเลิก'
      });
      if(!ok) return;
      // Apply
      window.showLoading(true,'กำลังซ่อม...');
      var fns = window.firestore;
      var batch = fns.writeBatch(window.db);
      var n=0, total=0;
      for(var j=0;j<planned.length;j++){
        var p = planned[j];
        var ref = fns.doc(window.db, 'classrooms', p.classId, 'students', p.docId);
        var snap = await fns.getDoc(ref);
        if(!snap.exists()) continue;
        var data = snap.data();
        var newRaw = Object.assign({}, data.raw||{});
        p.changes.forEach(function(ch){ newRaw[ch.field] = ch.fixed; });
        batch.update(ref, {raw:newRaw, updatedAt:fns.serverTimestamp()});
        n++; total++;
        if(n>=400){ await batch.commit(); batch = fns.writeBatch(window.db); n=0; }
      }
      if(n>0) await batch.commit();
      window.AppState.studentsCache = {};
      window.showLoading(false);
      window.showToast('ซ่อมข้อมูลเรียบร้อย '+total+' รายการ','success');
      if(window.refreshCurrentView) window.refreshCurrentView();
    }catch(e){
      console.error(e);
      window.showLoading(false);
      window.showToast('ผิดพลาด: '+e.message,'error');
    }
  };

  async function openMissingDataQrDoc(year, grade, room){
    var st = window.AppState.settings || {};
    var schoolName = st.schoolName || 'โรงเรียนกระดุมทองวิทยา';
    var logo = st.schoolLogo || 'https://nonthaphathr.github.io/uploadimg/logorecruit2026.png';
    var info = window.GRADE_INFO[grade];
    var clsLbl = window.classLabel(info.num, room);
    var baseUrl = location.origin + location.pathname + location.search;
    var checks = window.PF_MISSING_CHECK || [];
    var isMissing = window.PF_isMissing || function(v){ var s=(v==null?'':String(v).trim()); return !s || s.indexOf('ไม่ทราบ')>=0; };

    try{
      window.showLoading(true,'กำลังโหลดรายชื่อ...');
      var classId = window.classroomId(year, grade, room);
      var students = await window.getStudentsOfClass(classId, true);
      window.showLoading(false);
      if(!students.length){ window.showToast('ห้อง '+clsLbl+' ปี '+year+' ยังไม่มีนักเรียนในระบบ','warning'); return; }

      // เรียงตามรายชื่อที่มีอยู่ในระบบ (order เดิม → ตาม studentId)
      students = students.slice().sort(function(a,b){
        var oa=Number(a.order)||9999, ob=Number(b.order)||9999;
        if(oa!==ob) return oa-ob;
        return String(a.studentId||'').localeCompare(String(b.studentId||''),'th',{numeric:true});
      });

      var cards = students.map(function(s){
        var raw = s.raw || {};
        var nid = String(raw['เลขบัตรนักเรียน']||'').replace(/[^0-9]/g,'');
        var sid = String(s.studentId||'').trim();
        // คำนวณรายการที่ยังขาด (ใช้ตรรกะเดียวกับฟอร์มเป๊ะ — แตกชื่อรวมก่อนเช็ค)
        var missingLabels = window.PF_getMissingLabels(raw);
        var missCount = missingLabels.length;

        // สร้างลิงก์ (ผูกกับเลขบัตรประชาชนก่อน, ถ้าไม่มีใช้เลขประจำตัว)
        var canBind = !!(nid || sid);
        var p = ['mode=fill', 'grade='+grade, 'year='+year];
        if(room) p.push('room='+encodeURIComponent(room));
        if(nid) p.push('nid='+encodeURIComponent(nid));
        else if(sid) p.push('sid='+encodeURIComponent(sid));
        var formUrl = baseUrl + '#form?' + p.join('&');
        var qr = canBind ? ('https://api.qrserver.com/v1/create-qr-code/?size=500x500&margin=10&data=' + encodeURIComponent(formUrl)) : '';
        // QR ปักหมุดบ้าน (โหมด pin) — ใช้ลิงก์เดียวกันแต่เปลี่ยน mode
        var pp = ['mode=pin', 'grade='+grade, 'year='+year];
        if(room) pp.push('room='+encodeURIComponent(room));

        if(missCount===0){

        return '<div class="hc-info">'+
            '<div class="hc-head">'+
              '<img class="hc-logo" src="'+window.escHTML(logo)+'" alt="" onerror="this.style.display=\'none\'">'+
              '<div><div class="hc-school">'+window.escHTML(schoolName)+'</div>'+
                '<div class="hc-cls">QR เติมข้อมูล &nbsp;•&nbsp; '+window.escHTML(clsLbl)+' &nbsp;•&nbsp; ปี '+year+'</div></div>'+
            '</div>'+
            '<div class="hc-name">'+window.escHTML(s.fullName||'(ไม่มีชื่อ)')+'</div>'+
            '<div class="hc-sub">เลขประจำตัว '+window.escHTML(sid||'—')+(s.order?(' &nbsp;•&nbsp; ลำดับที่ '+s.order):'')+'</div>'+
            missHtml+
            '<div class="hc-tip">🧩 QR ซ้าย = เติมข้อมูลที่ขาด &nbsp;•&nbsp; 📍 QR ขวา = ปักหมุดบ้าน (ยืนที่บ้านแล้วกดปักหมุด)</div>'+
          '</div>'+
          '<div class="hc-qr">'+
            (canBind
              ? '<div class="hc-qr-pair">'+
                  '<div class="hc-qr-item"><img src="'+qr+'" alt="QR เติมข้อมูล" crossorigin="anonymous"><div class="hc-scan">🧩 เติมข้อมูล</div></div>'+
                  '<div class="hc-qr-item"><img src="'+qrPin+'" alt="QR ปักหมุดบ้าน" crossorigin="anonymous"><div class="hc-scan">📍 ปักหมุดบ้าน</div></div>'+
                '</div>'
              : '<div class="hc-noqr">⚠️ ผูก QR ไม่ได้<br><small>ไม่มีเลขบัตร/เลขประจำตัว</small></div>')+
          '</div>';
      });

      // จัดหน้า: หน้าละ 2 คน (แนวนอน, มีเส้นตัดตรงกลาง)
      var pagesHtml = '';
      for(var pi=0; pi<cards.length; pi+=2){
        var top = cards[pi];
        var bot = cards[pi+1];
        pagesHtml += '<div class="page">'+
          '<div class="half cut">'+top+'</div>'+
          (bot ? ('<div class="half">'+bot+'</div>') : '<div class="half half-empty"></div>')+
        '</div>';
      }

      var html = '<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">'+
        '<title>QR เติมข้อมูล + ปักหมุดบ้าน — '+window.escHTML(clsLbl)+' — '+window.escHTML(schoolName)+'</title>'+
        '<link rel="preconnect" href="https://fonts.googleapis.com">'+
        '<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Kanit:wght@500;600;700;800&display=swap" rel="stylesheet">'+
        '<style>'+
          '@page{size:A4 landscape;margin:0}'+
          '*{box-sizing:border-box;margin:0;padding:0}'+
          'body{font-family:"Sarabun",sans-serif;color:#1f2937;background:#e5e7eb}'+
          '.toolbar{position:sticky;top:0;background:#1f2937;color:#fff;padding:10px 16px;display:flex;gap:10px;align-items:center;z-index:100}'+
          '.toolbar h2{margin:0;font-family:"Kanit",sans-serif;font-size:13pt;flex:1}'+
          '.toolbar button{background:#10b981;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:"Kanit",sans-serif;font-size:12pt}'+
          '.toolbar button.cl{background:#6b7280}'+
          '.wrap{padding:16px 0}'+
          '.page{background:#fff;width:297mm;height:210mm;margin:8mm auto;box-shadow:0 4px 14px rgba(0,0,0,.12);display:flex;flex-direction:column;page-break-after:always;break-after:page}'+
          '.half{height:50%;padding:9mm 16mm;display:flex;align-items:center;gap:14mm;position:relative;overflow:hidden}'+
          '.half.cut{border-bottom:2px dashed #94a3b8}'+
          '.half.cut::after{content:"✂";position:absolute;left:6mm;bottom:-3.4mm;font-size:11pt;color:#94a3b8;background:#fff;padding:0 4px}'+
          '.half-empty{opacity:0}'+
          '.hc-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3mm}'+
          '.hc-head{display:flex;align-items:center;gap:9px}'+
          '.hc-logo{width:44px;height:44px;border-radius:50%;object-fit:contain;border:1.5px solid #e5e7eb;flex-shrink:0;background:#fff;padding:3px}'+
          '.hc-school{font-family:"Kanit",sans-serif;font-size:12.5pt;font-weight:600;color:#0e7490;line-height:1.2}'+
          '.hc-cls{font-size:9.5pt;color:#6b7280;margin-top:1px}'+
          '.hc-name{font-family:"Kanit",sans-serif;font-size:19pt;font-weight:700;color:#1f2937;line-height:1.2}'+
          '.hc-sub{font-size:10.5pt;color:#475569}'+

  // ═══════════════ Backup / Restore ═══════════════
  window.backupAll = async function(){
    try{
      window.showLoading(true,'กำลังสำรอง...');
      var dump = {
        version: 1,
        exportedAt: new Date().toISOString(),
        settings: window.AppState.settings,
        classrooms: []
      };
      var classes = window.AppState.classrooms || [];
      for(var i=0;i<classes.length;i++){
        var c = classes[i];
        var students = await window.getStudentsOfClass(c.id, false);
        // strip Timestamps
        var cClean = Object.assign({}, c);
        delete cClean.id;
        if(cClean.importedAt && cClean.importedAt.toDate) cClean.importedAt = cClean.importedAt.toDate().toISOString();
        if(cClean.updatedAt && cClean.updatedAt.toDate) cClean.updatedAt = cClean.updatedAt.toDate().toISOString();
        var stuClean = students.map(function(s){
          var x = Object.assign({}, s);
          delete x.id;
          if(x.createdAt && x.createdAt.toDate) x.createdAt = x.createdAt.toDate().toISOString();
          if(x.updatedAt && x.updatedAt.toDate) x.updatedAt = x.updatedAt.toDate().toISOString();
          return x;
        });
        dump.classrooms.push({id: c.id, data: cClean, students: stuClean});
      }
      var blob = new Blob([JSON.stringify(dump, null, 2)], {type:'application/json'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'classroom_backup_'+new Date().toISOString().slice(0,10)+'.json';
      a.click();
      window.showLoading(false);
      window.showToast('สำรองข้อมูลเรียบร้อย','success');
    }catch(e){ window.showLoading(false); window.showToast('สำรองไม่สำเร็จ: '+e.message,'error'); }
  };

  // ═══════════════ Export นักเรียนทั้งระบบ (.xlsx) ═══════════════
  window.exportAllStudentsXlsx = async function(){
    try{
      var classes = (window.AppState.classrooms||[]);
      var curYear = (window.AppState.settings||{}).currentAcademicYear;
      // กรองเฉพาะปีปัจจุบัน แต่ถ้าไม่มีเลยให้เอาทั้งหมด
      var targets = classes.filter(function(c){ return c.academicYear===curYear; });
      if(!targets.length) targets = classes.slice();
      if(!targets.length){ window.showToast('ไม่มีห้องเรียนในระบบ','warning'); return; }

      // เรียงตาม grade → room
      var gradeOrder = {m1:1,m2:2,m3:3,m4:4,m5:5,m6:6};
      targets.sort(function(a,b){
        var ga = gradeOrder[a.grade]||9, gb = gradeOrder[b.grade]||9;
        if(ga!==gb) return ga-gb;
        return String(a.room||'').localeCompare(String(b.room||''),'th');
      });

      window.showLoading(true,'กำลังโหลดข้อมูลทุกห้อง...');
      var wb = XLSX.utils.book_new();
      var summaryRows = []; // sheet สรุปรวม

      for(var i=0;i<targets.length;i++){
        var c = targets[i];
        var info = window.GRADE_INFO[c.grade]||{num:'?'};
        var label = 'ม.'+info.num+(c.room?'-'+c.room:'');
        window.showLoading(true,'กำลังโหลด '+label+'...');

        var students = await window.getStudentsOfClass(c.id, true);

        // Sheet ของห้องนี้
        var rows = students.map(function(s, idx){
          var raw = s.raw||{};
          // วันเกิด — เก็บแยก 3 field ใน raw
          var bDay   = String(raw['วันเกิด(วัน)']   || raw['วันเกิด_วัน']   || '').trim();
          var bMonth = String(raw['วันเกิด(เดือน)'] || raw['วันเกิด_เดือน'] || raw['เดือนเกิด'] || '').trim();
          var bYear  = String(raw['วันเกิด(ปีพ.ศ.)']|| raw['วันเกิด_ปีพศ']  || raw['ปีเกิด']   || '').trim();
          var birthDate = (bDay && bMonth && bYear)
            ? (bDay+'/'+bMonth+'/'+bYear)
            : (raw['วันเดือนปีเกิด']||raw['วันเกิด']||s.birthDate||'');
          // โรงเรียนเดิม — หลาย key
          var oldSchool = raw['โรงเรียนเดิม']||raw['เดิม']||raw['ชื่อโรงเรียนเดิม']||raw['โรงเรียนที่จบ']||s.currentSchool||'';
          var row = {
            'ห้อง': label,
            'ลำดับ': s.order||idx+1,
            'เลขประจำตัวนักเรียน': s.studentId||'',
            'ชื่อ-สกุล': s.fullName||'',
            'ชื่อเล่น': s.nickname||'',
            'เพศ': s.gender||'',
            'วันเกิด': birthDate,
            'โทรนักเรียน': s.phone||raw['โทรนักเรียน']||'',
            'ชื่อผู้ปกครอง': raw['ชื่อผู้ปกครอง']||'',
            'โทรผู้ปกครอง': raw['โทรมือถือผู้ปกครอง']||raw['โทรบ้านผู้ปกครอง']||'',
            'หมู่บ้านนักเรียน': raw['หมู่บ้านนักเรียน']||s.currentVillage||'',
            'โรงเรียนเดิม': oldSchool,
          };
          // รวม raw ทั้งหมดที่เหลือ
          Object.keys(raw).forEach(function(k){
            if(!(k in row)) row[k] = raw[k];
          });
          summaryRows.push(row);
          return row;
        });

        if(rows.length){
          var ws = XLSX.utils.json_to_sheet(rows);
          // ปรับความกว้างคอลัมน์อัตโนมัติ
          var cols = Object.keys(rows[0]).map(function(k){
            var max = k.length;
            rows.forEach(function(r){ max = Math.max(max, String(r[k]||'').length); });
            return {wch: Math.min(max+2, 40)};
          });
          ws['!cols'] = cols;
          XLSX.utils.book_append_sheet(wb, ws, label);
        } else {
          // sheet ว่าง — ยังสร้างไว้ให้รู้ว่าห้องนี้ไม่มีข้อมูล
          var wsEmpty = XLSX.utils.aoa_to_sheet([['ไม่มีข้อมูลนักเรียน']]);
          XLSX.utils.book_append_sheet(wb, wsEmpty, label);
        }
      }

      // Sheet สรุปรวมทุกห้อง (sheet แรก)
      if(summaryRows.length){
        var wsSummary = XLSX.utils.json_to_sheet(summaryRows);
        var colsSummary = Object.keys(summaryRows[0]).map(function(k){
          var max = k.length;
          summaryRows.forEach(function(r){ max = Math.max(max, String(r[k]||'').length); });
          return {wch: Math.min(max+2, 40)};
        });
        wsSummary['!cols'] = colsSummary;
        // แทรก sheet นี้เป็นอันแรก
        wb.SheetNames.unshift('รวมทุกห้อง');
        wb.Sheets['รวมทุกห้อง'] = wsSummary;
      }

      var fname = 'นักเรียนทั้งระบบ_ปี'+curYear+'_'+new Date().toISOString().slice(0,10)+'.xlsx';
      XLSX.writeFile(wb, fname);
      window.showLoading(false);
      window.showToast('ส่งออกสำเร็จ '+summaryRows.length+' คน ('+targets.length+' ห้อง)','success');
    }catch(e){
      window.showLoading(false);
      console.error(e);
      window.showToast('Export ผิดพลาด: '+e.message,'error');
    }
  };

  window.restoreAll = function(){
    var input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.onchange = async function(){
      var f = input.files[0]; if(!f) return;
      var ok = await window.confirmDialog({
        title:'⚠️ กู้คืนข้อมูล',
        message:'การกู้คืนจะ <strong>เพิ่ม / รวม</strong> ข้อมูลจากไฟล์เข้ากับระบบปัจจุบัน',
        warning:'หากต้องการล้างข้อมูลก่อน ให้ใช้เมนู "ล้างข้อมูลทั้งหมด" ก่อนกู้คืน',
        confirmText:'ดำเนินการต่อ'
      });
      if(!ok) return;
      try{
        var text = await f.text();
        var obj = JSON.parse(text);
        window.showLoading(true,'กำลังกู้คืน...');
        if(obj.settings) await window.saveSettings(obj.settings);
        for(var i=0;i<(obj.classrooms||[]).length;i++){
          var c = obj.classrooms[i];
          var d = c.data;
          await window.upsertClassroom({
            academicYear: d.academicYear, grade: d.grade, room: d.room,
            advisors: d.advisors||[], studentCount: (c.students||[]).length,
            maleCount: (c.students||[]).filter(function(s){return s.gender==='ชาย'}).length,
            femaleCount: (c.students||[]).filter(function(s){return s.gender==='หญิง'}).length,
            sourceFormat: d.sourceFormat||'A'
          });
          if(c.students && c.students.length){
            await window.bulkSaveStudents(c.id, c.students);
          }
        }
        window.showLoading(false);
        window.showToast('กู้คืนข้อมูลเรียบร้อย','success');
      }catch(e){ window.showLoading(false); window.showToast('กู้คืนไม่สำเร็จ: '+e.message,'error'); }
    };
    input.click();
  };

  window.clearAllData = async function(){
    var ok = await window.confirmDialog({
      title:'🚨 ล้างข้อมูลทั้งหมด',
      message:'จะลบข้อมูลห้องเรียนและนักเรียน <strong>ทุกห้อง ทุกปีการศึกษา</strong>',
      warning:'การกระทำนี้ไม่สามารถกู้คืนได้',
      danger:true,
      confirmText:'ดำเนินการต่อ'
    });
    if(!ok) return;
    var ok2 = await window.confirmDialog({
      title:'🚨 ยืนยันขั้นสุดท้าย',
      message:'พิมพ์ <strong>ลบทั้งหมด</strong> เพื่อยืนยัน',
      requireType:'ลบทั้งหมด',
      danger:true,
      confirmText:'ดำเนินการ'
    });
    if(!ok2) return;
    try{
      window.showLoading(true,'กำลังลบ...');
      var classes = (window.AppState.classrooms||[]).slice();
      for(var i=0;i<classes.length;i++){
        await window.deleteClassroom(classes[i].id);
      }
      window.showLoading(false);
      window.showToast('ล้างข้อมูลเรียบร้อย','success');
      window.AppState.currentClassId = null;
      window.setView('main');
    }catch(e){ window.showLoading(false); window.showToast('ล้างไม่สำเร็จ: '+e.message,'error'); }
  };

  // ═══════════════ Promotion tool (placeholder ในเฟสนี้) ═══════════════
  // ═══════════════ Promotion Tool (เลื่อนชั้น) ═══════════════
  // Plan structure:
  //   { from: classroom, to: { year, grade, room } | null (graduate), studentCount }
  // ม.6 → graduates collection (no destination classroom)
  window.openPromotionTool = function(){
    var classrooms = window.AppState.classrooms || [];
    if(!classrooms.length){
      window.showToast('ยังไม่มีห้องเรียนในระบบ','warning');
      return;
    }
    var years = Array.from(new Set(classrooms.map(function(c){return Number(c.academicYear)||0;}).filter(Boolean))).sort(function(a,b){return b-a;});
    var fromYear = years[0];
    var toYear = fromYear + 1;
    var plan = [];   // [{src:classroom, dstGrade, dstRoom, included:bool, isGraduate:bool}]
    var preview = null;  // null until previewed
    var bd = document.createElement('div'); bd.className='modal-bd'; document.body.appendChild(bd);

    function buildPlan(){
      var srcs = classrooms.filter(function(c){return Number(c.academicYear)===Number(fromYear);});
      // sort: m1→m6, then by room
      srcs.sort(function(a,b){
        if(a.grade!==b.grade) return a.grade.localeCompare(b.grade);
        return String(a.room||'').localeCompare(String(b.room||''));
      });
      plan = srcs.map(function(s){
        var nextGrade = nextGradeOf(s.grade);
        return {
          src: s,
          dstGrade: nextGrade,
          dstRoom: s.room || '',
          included: true,
          isGraduate: nextGrade === null,
        };
      });
    }
    function nextGradeOf(g){
      var map = {m1:'m2',m2:'m3',m3:'m4',m4:'m5',m5:'m6',m6:null};
      return map[g] !== undefined ? map[g] : null;
    }
    function render(){
      var rowsHTML = plan.map(function(row, i){
        var info = window.GRADE_INFO[row.src.grade];
        var srcLbl = window.classLabel(info.num, row.src.room);
        var dstHTML;
        if(row.isGraduate){
          dstHTML = '<span class="tag" style="background:#7c3aed1a;color:#7c3aed">🎓 ผู้สำเร็จการศึกษา</span>';
        } else {
          var dstInfo = window.GRADE_INFO[row.dstGrade];
          dstHTML = '<span style="font-weight:600;color:'+dstInfo.color+'">ม.'+dstInfo.num+'</span>'+
                    ' / <input type="text" class="dst-room" data-i="'+i+'" value="'+window.escHTML(row.dstRoom||'')+'" '+
                    'style="width:80px;padding:.3rem .5rem;border:1px solid #cbd5e1;border-radius:6px;font-size:13px" placeholder="ห้อง">';
        }
        return '<tr style="'+(row.included?'':'opacity:.5')+'">'+
          '<td style="text-align:center"><input type="checkbox" class="inc" data-i="'+i+'" '+(row.included?'checked':'')+'></td>'+
          '<td><span style="font-weight:600;color:'+info.color+'">'+srcLbl+'</span><br><span style="font-size:11px;color:#6b7280">นักเรียน '+(row.src.studentCount||0)+' คน</span></td>'+
          '<td style="text-align:center;font-size:18px;color:#9ca3af">→</td>'+
          '<td>'+dstHTML+'</td>'+
        '</tr>';
      }).join('');

      var previewHTML = '';
      if(preview){
        previewHTML = '<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:12px;margin-top:12px">'+
          '<strong style="color:#15803d">📋 ผลตรวจสอบก่อนเลื่อนชั้น</strong>'+
          '<ul style="margin:6px 0 0 18px;padding:0;font-size:13px;line-height:1.7">'+
          '<li>นักเรียนเลื่อนชั้น: <strong>'+preview.movingCount+'</strong> คน</li>'+
          '<li>ผู้สำเร็จการศึกษา (ม.6): <strong>'+preview.graduateCount+'</strong> คน</li>'+
          '<li>ห้องปลายทางที่จะสร้าง: <strong>'+preview.newRooms+'</strong> ห้อง</li>'+
          (preview.conflicts.length ? '<li style="color:#dc2626">⚠️ พบห้องปลายทางที่มีอยู่แล้ว '+preview.conflicts.length+' ห้อง: '+window.escHTML(preview.conflicts.join(', '))+' (จะถูกทับ)</li>' : '')+
          (preview.warnings.length ? preview.warnings.map(function(w){return '<li style="color:#d97706">⚠️ '+window.escHTML(w)+'</li>';}).join('') : '')+
          '</ul></div>';
      }

      bd.innerHTML = '<div class="modal modal-lg" style="max-width:760px">'+
        '<div class="modal-head"><h3>🎓 เลื่อนชั้นนักเรียน</h3>'+
          '<button class="modal-close" data-act="close">✕</button></div>'+
        '<div class="modal-body" style="max-height:70vh;overflow:auto">'+
          '<div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap">'+
            '<label style="display:flex;align-items:center;gap:6px"><span style="font-weight:600">ปีต้นทาง</span>'+
              '<select id="prom-from" style="padding:.4rem .6rem;border:1px solid #cbd5e1;border-radius:6px">'+
                years.map(function(y){return '<option value="'+y+'" '+(y===fromYear?'selected':'')+'>'+y+'</option>';}).join('')+
              '</select></label>'+
            '<span style="font-size:18px;color:#9ca3af">→</span>'+
            '<label style="display:flex;align-items:center;gap:6px"><span style="font-weight:600">ปีปลายทาง</span>'+
              '<input type="number" id="prom-to" value="'+toYear+'" min="2500" max="2700" style="width:90px;padding:.4rem .6rem;border:1px solid #cbd5e1;border-radius:6px">'+
            '</label>'+
          '</div>'+
          '<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;line-height:1.6">'+
            '⚠️ <strong>คำเตือน:</strong> การเลื่อนชั้นจะคัดลอกนักเรียนทั้งหมดไปยังห้องปลายทาง '+
            'และ<strong>ลบ</strong>ห้องต้นทางออก ห้องปลายทาง ม.7 (ม.6 เดิม) จะกลายเป็นผู้สำเร็จการศึกษา (graduates) — '+
            '<strong>แนะนำให้สำรองข้อมูลก่อน</strong>'+
          '</div>'+
          '<div style="overflow-x:auto;border:1px solid #e5e7eb;border-radius:10px">'+
          '<table style="width:100%;border-collapse:collapse;font-size:13px">'+
            '<thead><tr style="background:#f9fafb"><th style="padding:8px;text-align:center;width:50px">นำเข้า</th>'+
              '<th style="padding:8px;text-align:left">ต้นทาง</th>'+
              '<th style="padding:8px;text-align:center;width:30px"></th>'+
              '<th style="padding:8px;text-align:left">ปลายทาง</th></tr></thead>'+
            '<tbody>'+rowsHTML+'</tbody>'+
          '</table></div>'+
          previewHTML+
        '</div>'+
        '<div class="modal-foot">'+
          '<button class="btn btn-ghost" data-act="backup">💾 สำรองก่อนเลื่อน</button>'+
          '<div style="flex:1"></div>'+
          '<button class="btn btn-ghost" data-act="close">ยกเลิก</button>'+
          '<button class="btn btn-primary" data-act="preview">🔍 ดูตัวอย่าง</button>'+
          '<button class="btn btn-danger" data-act="commit" '+(preview?'':'disabled style="opacity:.5;cursor:not-allowed"')+'>✅ ยืนยันเลื่อนชั้น</button>'+
        '</div>'+
      '</div>';

      bd.classList.add('show');
      attachEvents();
    }
    function attachEvents(){
      bd.querySelector('#prom-from').onchange = function(e){ fromYear = Number(e.target.value); toYear = fromYear+1; preview=null; buildPlan(); render(); };
      bd.querySelector('#prom-to').onchange = function(e){ toYear = Number(e.target.value); preview=null; render(); };
      bd.querySelectorAll('.inc').forEach(function(cb){
        cb.onchange = function(){ var i = Number(cb.dataset.i); plan[i].included = cb.checked; preview=null; render(); };
      });
      bd.querySelectorAll('.dst-room').forEach(function(inp){
        inp.oninput = function(){ var i = Number(inp.dataset.i); plan[i].dstRoom = inp.value.trim(); };
      });
      bd.querySelectorAll('[data-act]').forEach(function(btn){
        btn.onclick = function(){
          var act = btn.dataset.act;
          if(act==='close') close();
          else if(act==='preview') runPreview();
          else if(act==='commit') runCommit();
          else if(act==='backup') runBackup();
        };
      });
    }
    function runPreview(){
      var movingCount = 0, graduateCount = 0, newRooms = 0;
      var conflicts = [];
      var warnings = [];
      var existingClassIds = new Set((window.AppState.classrooms||[]).map(function(c){return c.id;}));
      plan.forEach(function(row){
        if(!row.included) return;
        var n = row.src.studentCount || 0;
        if(row.isGraduate){
          graduateCount += n;
        } else {
          movingCount += n;
          if(!row.dstRoom){
            warnings.push('ม.'+window.GRADE_INFO[row.src.grade].num+(row.src.room?'/'+row.src.room:'')+' ยังไม่ได้กำหนดห้องปลายทาง');
            return;
          }
          var dstId = window.classroomId(toYear, row.dstGrade, row.dstRoom);
          if(existingClassIds.has(dstId)) conflicts.push('ม.'+window.GRADE_INFO[row.dstGrade].num+'/'+row.dstRoom);
          else newRooms++;
        }
      });
      preview = {movingCount:movingCount, graduateCount:graduateCount, newRooms:newRooms, conflicts:conflicts, warnings:warnings};
      render();
    }
    async function runBackup(){
      try {
        await window.backupAll();
      } catch(e){
        window.showToast('สำรองข้อมูลผิดพลาด: '+e.message,'error');
      }
    }
    async function runCommit(){
      if(!preview){ window.showToast('กรุณากด "ดูตัวอย่าง" ก่อน','warning'); return; }
      if(preview.warnings.length){ window.showToast('กรุณาแก้ไขปัญหาก่อนยืนยัน','warning'); return; }
      var ok = await window.confirmDialog({
        title:'ยืนยันเลื่อนชั้น',
        message:'<strong>การเลื่อนชั้นเป็นการกระทำที่ย้อนกลับไม่ได้</strong><br>'+
          'นักเรียน '+preview.movingCount+' คน จะถูกย้ายไปยังห้องปลายทาง<br>'+
          'นักเรียน '+preview.graduateCount+' คน (ม.6) จะถูกย้ายไปยังผู้สำเร็จการศึกษา<br>'+
          'ห้องต้นทางทั้งหมดจะถูกลบ<br><br>'+
          'พิมพ์ <code style="background:#fee2e2;padding:2px 6px;border-radius:4px;font-weight:600">ยืนยัน</code> เพื่อดำเนินการ',
        confirmText:'เลื่อนชั้น', danger:true, requireType:'ยืนยัน'
      });
      if(!ok) return;

      try {
        window.showLoading(true,'กำลังเลื่อนชั้น...');
        await runPromotion();
        window.showLoading(false);
        window.showToast('เลื่อนชั้นสำเร็จ ✅','success');
        close();
        if(window.refreshCurrentView) window.refreshCurrentView();
      } catch(e){
        console.error(e);
        window.showLoading(false);
        window.showToast('เลื่อนชั้นผิดพลาด: '+e.message,'error');
      }
    }
    async function runPromotion(){
      var fns = window.firestore;
      var db = window.db;
      var nowISO = new Date().toISOString();
      var logEntries = [];

      for(var i=0; i<plan.length; i++){
        var row = plan[i];
        if(!row.included) continue;
        var srcId = row.src.id;
        var students = await window.getStudentsOfClass(srcId, true);

        if(row.isGraduate){
          // Move to graduates collection (snapshot)
          var bat = fns.writeBatch(db);
          var n = 0;
          for(var j=0; j<students.length; j++){
            var stu = students[j];
            var gid = String(toYear)+'_'+srcId+'_'+stu.docId;
            var gref = fns.doc(db, 'graduates', gid);
            bat.set(gref, Object.assign({}, stu, {
              graduatedYear: toYear,
              originalClassId: srcId,
              originalGrade: row.src.grade,
              originalRoom: row.src.room || '',
              graduatedAt: fns.serverTimestamp(),
            }));
            n++;
            if(n%400===0){ await bat.commit(); bat = fns.writeBatch(db); }
          }
          if(n%400!==0) await bat.commit();
          // Delete the source classroom + students
          await window.deleteClassroom(srcId);
          logEntries.push({type:'graduate', srcId:srcId, count:students.length});
        } else {
          // Move to new classroom
          var dstId = window.classroomId(toYear, row.dstGrade, row.dstRoom);
          // Create or update destination classroom
          var dstInfo = window.GRADE_INFO[row.dstGrade];
          await window.upsertClassroom({
            academicYear: toYear,
            grade: row.dstGrade,
            room: row.dstRoom,
            advisors: row.src.advisors || [],
            studentCount: students.length,
            maleCount: row.src.maleCount || 0,
            femaleCount: row.src.femaleCount || 0,
            sourceFormat: row.src.sourceFormat || 'A',
          });
          // Bulk save students into destination (overwrite)
          var stuArr = students.map(function(s){
            var copy = Object.assign({}, s);
            delete copy.id;       // strip old firestore docId field
            delete copy.docId;    // (defensive) remove if present
            return copy;
          });
          await window.bulkSaveStudents(dstId, stuArr);
          // Delete the source classroom + students
          await window.deleteClassroom(srcId);
          logEntries.push({type:'promote', srcId:srcId, dstId:dstId, count:students.length});
        }
      }

      // Write a single promotionLogs entry summarising the run
      try {
        var logRef = fns.doc(fns.collection(db,'promotionLogs'));
        await fns.setDoc(logRef, {
          fromYear: fromYear,
          toYear: toYear,
          performedAt: fns.serverTimestamp(),
          performedAtISO: nowISO,
          entries: logEntries,
          totalMoved: preview.movingCount,
          totalGraduated: preview.graduateCount,
        });
      } catch(e){ console.warn('promotionLogs write failed',e); }
    }
    function close(){ bd.classList.remove('show'); setTimeout(function(){bd.remove()},220); }

    buildPlan();
    render();
  };
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     STUDENT TABLE + DETAIL MODAL + PRINT WINDOW
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function(){
  // ═══════════════ Student table ═══════════════
  var TBL_STATE = {classId:null, all:[], filtered:[], page:1, pageSize:50, sort:{key:'order',dir:'asc'}, q:'', genderFilter:''};

  window.setupStudentTable = async function(classId){
    TBL_STATE = {classId:classId, all:[], filtered:[], page:1, pageSize:50, sort:{key:'order',dir:'asc'}, q:'', genderFilter:''};
    try{
      window.showLoading(true,'กำลังโหลดนักเรียน...');
      var students = await window.getStudentsOfClass(classId, true);
      window.showLoading(false);
      TBL_STATE.all = students;
      applyTblFilter();
    }catch(e){
      window.showLoading(false);
      var tb = document.getElementById('stuTbody');
      if(tb) tb.innerHTML = '<tr><td colspan="7" class="text-center" style="color:var(--danger);padding:2rem">โหลดผิดพลาด: '+window.escHTML(e.message)+'</td></tr>';
    }
    var s = document.getElementById('stuSearch');
    if(s){ s.oninput = function(){ TBL_STATE.q = s.value.trim(); TBL_STATE.page=1; applyTblFilter(); }; }
    var f = document.getElementById('stuFilter');
    if(f){ f.onchange = function(){ TBL_STATE.genderFilter = f.value; TBL_STATE.page=1; applyTblFilter(); }; }
    var ps = document.getElementById('stuPageSize');
    if(ps){ ps.onchange = function(){ TBL_STATE.pageSize = parseInt(ps.value,10); TBL_STATE.page=1; applyTblFilter(); }; }
    document.querySelectorAll('#stuTbl th[data-sort]').forEach(function(th){
      th.onclick = function(){
        var k = th.dataset.sort;
        if(TBL_STATE.sort.key===k) TBL_STATE.sort.dir = TBL_STATE.sort.dir==='asc'?'desc':'asc';
        else { TBL_STATE.sort.key=k; TBL_STATE.sort.dir='asc'; }
        applyTblFilter();
      };
    });
  };

  function applyTblFilter(){
    var arr = TBL_STATE.all.slice();
    var q = TBL_STATE.q.toLowerCase();
    if(q){
      arr = arr.filter(function(s){
        return ((s.fullName||'').toLowerCase().indexOf(q)>=0)
          || ((s.studentId||'').toLowerCase().indexOf(q)>=0)
          || ((s.nickname||'').toLowerCase().indexOf(q)>=0)
          || ((s.phone||'').toLowerCase().indexOf(q)>=0);
      });
    }
    if(TBL_STATE.genderFilter){
      arr = arr.filter(function(s){return s.gender===TBL_STATE.genderFilter});
    }
    var k = TBL_STATE.sort.key, dir = TBL_STATE.sort.dir==='asc'?1:-1;
    arr.sort(function(a,b){
      var va = a[k], vb = b[k];
      if(k==='order'){ va = parseInt(va,10)||0; vb = parseInt(vb,10)||0; return (va-vb)*dir; }
      return ((va||'').toString()).localeCompare((vb||'').toString(),'th') * dir;
    });
    TBL_STATE.filtered = arr;
    renderTblBody();
  }

  function renderTblBody(){
    var tb = document.getElementById('stuTbody'); if(!tb) return;
    var tot = TBL_STATE.filtered.length;
    var ps = TBL_STATE.pageSize;
    var pages = Math.max(1, Math.ceil(tot/ps));
    if(TBL_STATE.page>pages) TBL_STATE.page=pages;
    var start = (TBL_STATE.page-1)*ps;
    var slice = TBL_STATE.filtered.slice(start, start+ps);

    if(!slice.length){
      tb.innerHTML = '<tr><td colspan="8" class="text-center muted" style="padding:2rem">ไม่พบนักเรียน</td></tr>';
    } else {
      tb.innerHTML = slice.map(function(s){
        var _g = (function(g,name){ if(g && g!=='ไม่ระบุ' && g!=='') return g; var n=String(name||'').trim(); if(/^(เด็กชาย|ด.ช.|นาย)/.test(n)) return 'ชาย'; if(/^(เด็กหญิง|ด.ญ.|นางสาว|นาง)/.test(n)) return 'หญิง'; return g||''; })(s.gender,s.fullName); var gc = _g==='ชาย'?'gender-m':(_g==='หญิง'?'gender-f':'');

    // photo upload → Google Drive (ผ่าน Apps Script Web App)
    bd.querySelector('#dtPhoto').onclick = function(){
      var st = window.AppState.settings || {};
      if(!(st.driveWebAppUrl||'').trim()){
        window.showToast('ยังไม่ได้ตั้งค่าการอัปโหลดรูป — ไปที่ ⚙️ ตั้งค่า > อัปโหลดรูปนักเรียน (Google Drive)','warning');
        return;
      }
      var inp = document.createElement('input');
      inp.type='file'; inp.accept='image/*';
      inp.onchange = async function(){
        var f = inp.files[0]; if(!f) return;
        if(f.size > 15*1024*1024){ window.showToast('ไฟล์รูปต้องไม่เกิน 15 MB','warning'); return; }
        try{
          window.showLoading(true,'กำลังย่อรูป...');
          var jpg = await window.resizeImageToJpeg(f, 900, 0.85);   // ย่อก่อนอัปโหลด

          // สร้างชื่อไฟล์: แยก ม. และระบุชื่อ — เก็บรวมในโฟลเดอร์เดียว
          var rm   = (window.AppState.classrooms||[]).find(function(c){return c.id===classId}) || {};
          var info = window.GRADE_INFO[rm.grade] || {num:'?'};
          var room = rm.room || '';
          var sid  = String(s.studentId || studentDocId || '').trim();
          var nm   = String(s.fullName || '').replace(/[\/\\:*?"<>|]+/g,' ').replace(/\s+/g,' ').trim();
          var prefix   = 'ม.'+info.num + (room ? '-'+room : '') + '_' + sid + '_';
          var filename = prefix + (nm || 'นักเรียน') + '.jpg';

          window.showLoading(true,'กำลังอัปโหลดขึ้น Google Drive...');
          var resUp = await window.gasUploadStudentPhoto(jpg, filename, prefix, s.photoFileId || '');

          // บันทึกอ้างอิงรูปลง Firestore (เก็บทั้ง fileId และ URL สำหรับแสดงผลทุกที่)
          var patch = { photoFileId: resUp.fileId, photoURL: resUp.viewUrl };
          await window.savePhotoRef(classId, studentDocId, patch);

          // อัปเดต cache ในตาราง
          s.photoFileId = resUp.fileId; s.photoURL = resUp.viewUrl;
          var idx = TBL_STATE.all.findIndex(function(x){return x.id===studentDocId});
          if(idx>=0){ TBL_STATE.all[idx].photoFileId = resUp.fileId; TBL_STATE.all[idx].photoURL = resUp.viewUrl; }

          window.showLoading(false);
          window.showToast('บันทึกรูปขึ้น Google Drive แล้ว','success');

          // refresh กรอบภาพใน modal
          var pb = bd.querySelector('#dtPhoto');
          pb.innerHTML = '<img src="'+window.escHTML(window.getPhotoSrc(s))+'" referrerpolicy="no-referrer"><div class="hint">คลิกเพื่อเปลี่ยนรูป</div>';
        }catch(e){
          window.showLoading(false);
          window.showToast('อัปโหลดรูปไม่สำเร็จ: '+e.message,'error');
        }
      };
      inp.click();
    };

  function fileToDataURL(f){
    return new Promise(function(res, rej){
      var fr = new FileReader();
      fr.onload = function(){ res(fr.result); };
      fr.onerror = function(){ rej(new Error('อ่านรูปไม่ได้')); };
      fr.readAsDataURL(f);
    });
  }

  // ═══════════════ Student photo helpers (Google Drive) ═══════════════
  // คืน src ของรูปนักเรียนสำหรับนำไปใส่ใน <img>
  //  - ถ้ามี photoFileId (เก็บใน Google Drive) → สร้างลิงก์ thumbnail สาธารณะ
  //  - ถ้าเป็นข้อมูลเก่า (base64 / URL ใน photoURL) → ใช้ค่าเดิม
  window.getPhotoSrc = function(s){
    if(!s) return '';
    if(s.photoFileId) return 'https://drive.google.com/thumbnail?id=' + s.photoFileId + '&sz=w1000';
    if(s.photoURL) return s.photoURL;
    return '';
  };

  // ย่อรูปลงเหลือด้านยาวสุดไม่เกิน maxEdge แล้วแปลงเป็น JPEG (data URL)
  // ลดขนาดไฟล์ก่อนส่งขึ้น Drive — เร็วและประหยัด
  window.resizeImageToJpeg = function(file, maxEdge, quality){
    maxEdge = maxEdge || 900; quality = quality || 0.85;
    return new Promise(function(res, rej){
      var fr = new FileReader();
      fr.onload = function(){
        var img = new Image();
        img.onload = function(){
          var w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
          var scale = Math.min(1, maxEdge / Math.max(w, h));
          var cw = Math.max(1, Math.round(w * scale)), ch = Math.max(1, Math.round(h * scale));
          var cv = document.createElement('canvas'); cv.width = cw; cv.height = ch;
          var ctx = cv.getContext('2d');
          ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, cw, ch); // พื้นขาวกันรูปโปร่งใสกลายเป็นดำ
          ctx.drawImage(img, 0, 0, cw, ch);
          try{ res(cv.toDataURL('image/jpeg', quality)); }
          catch(e){ rej(new Error('แปลงรูปไม่สำเร็จ')); }
        };
        img.onerror = function(){ rej(new Error('โหลดรูปไม่ได้ — ไฟล์อาจเสียหาย')); };
        img.src = fr.result;
      };
      fr.onerror = function(){ rej(new Error('อ่านไฟล์ไม่ได้')); };
      fr.readAsDataURL(file);
    });
  };

  // อัปโหลดรูปขึ้น Google Drive ผ่าน Apps Script Web App
  //   dataB64     : data URL หรือ base64 ของรูป (JPEG)
  //   filename    : ชื่อไฟล์ที่จะบันทึก (มี ม. และชื่อ)
  //   dedupPrefix : prefix ที่ใช้หาไฟล์เดิมของนักเรียนคนนี้เพื่อทับ (กันรูปซ้ำ)
  //   oldFileId   : (สำรอง) fileId เดิม กรณีไม่มี dedupPrefix
  // คืน { ok, fileId, viewUrl, name }
  window.gasUploadStudentPhoto = function(dataB64, filename, dedupPrefix, oldFileId){
    var st = window.AppState.settings || {};
    var url = (st.driveWebAppUrl || '').trim();
    if(!url) return Promise.reject(new Error('ยังไม่ได้ตั้งค่า URL ของ Google Apps Script — ไปที่ ⚙️ ตั้งค่า > อัปโหลดรูปนักเรียน (Google Drive)'));
    var folderId = (st.driveFolderId || '1TKE0tjlFjusB3aAROo13y8CPRaP7MWs9').trim();
    var payload = JSON.stringify({
      action: 'upload',
      folderId: folderId,
      filename: filename,
      dedupPrefix: dedupPrefix || '',
      oldFileId: oldFileId || '',
      mimeType: 'image/jpeg',
      data: dataB64
    });
    // ใช้ Content-Type text/plain เพื่อเลี่ยง CORS preflight ของ Apps Script
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: payload
    }).then(function(r){ return r.json(); }).then(function(json){
      if(!json || !json.ok) throw new Error((json && json.error) || 'อัปโหลดไม่สำเร็จ');
      return json;
    });
  };
