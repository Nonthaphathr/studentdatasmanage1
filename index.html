        message:'การกู้คืนจะ <strong>เพิ่ม / รวม</strong> ข้อมูลจากไฟล์เข้ากับระบบปัจจุบัน',
        warning:'หากต้องการล้างข้อมูลก่อน ให้ใช้เมนู "ล้างข้อมูลทั้งหมด" ก่อนกู้คืน',
        confirmText:'ดำเนินการต่อ'
      });
      if(!ok) return;
      try{
        var text = await f.text();
        var obj = JSON.parse(text);
        window.showLoading(true,'กำลังกู้คืน...');
        if(obj.settings) await window.saveSettings(obj.settings);
        for(var i=0;i<(obj.classrooms||[]).length;i++){
          var c = obj.classrooms[i];
          var d = c.data;
          await window.upsertClassroom({
            academicYear: d.academicYear, grade: d.grade, room: d.room,
            advisors: d.advisors||[], studentCount: (c.students||[]).length,
            maleCount: (c.students||[]).filter(function(s){return s.gender==='ชาย'}).length,
            femaleCount: (c.students||[]).filter(function(s){return s.gender==='หญิง'}).length,
            sourceFormat: d.sourceFormat||'A'
          });
          if(c.students && c.students.length){
            await window.bulkSaveStudents(c.id, c.students);
          }
        }
        window.showLoading(false);
        window.showToast('กู้คืนข้อมูลเรียบร้อย','success');
      }catch(e){ window.showLoading(false); window.showToast('กู้คืนไม่สำเร็จ: '+e.message,'error'); }
    };
    input.click();
  };

  window.clearAllData = async function(){
    var ok = await window.confirmDialog({
      title:'🚨 ล้างข้อมูลทั้งหมด',
      message:'จะลบข้อมูลห้องเรียนและนักเรียน <strong>ทุกห้อง ทุกปีการศึกษา</strong>',
      warning:'การกระทำนี้ไม่สามารถกู้คืนได้',
      danger:true,
      confirmText:'ดำเนินการต่อ'
    });
    if(!ok) return;
    var ok2 = await window.confirmDialog({
      title:'🚨 ยืนยันขั้นสุดท้าย',
      message:'พิมพ์ <strong>ลบทั้งหมด</strong> เพื่อยืนยัน',
      requireType:'ลบทั้งหมด',
      danger:true,
      confirmText:'ดำเนินการ'
    });
    if(!ok2) return;
    try{
      window.showLoading(true,'กำลังลบ...');
      var classes = (window.AppState.classrooms||[]).slice();
      for(var i=0;i<classes.length;i++){
        await window.deleteClassroom(classes[i].id);
      }
      window.showLoading(false);
      window.showToast('ล้างข้อมูลเรียบร้อย','success');
      window.AppState.currentClassId = null;
      window.setView('main');
    }catch(e){ window.showLoading(false); window.showToast('ล้างไม่สำเร็จ: '+e.message,'error'); }
  };

  // ═══════════════ Promotion tool (placeholder ในเฟสนี้) ═══════════════
  // ═══════════════ Promotion Tool (เลื่อนชั้น) ═══════════════
  // Plan structure:
  //   { from: classroom, to: { year, grade, room } | null (graduate), studentCount }
  // ม.6 → graduates collection (no destination classroom)
  window.openPromotionTool = function(){
    var classrooms = window.AppState.classrooms || [];
    if(!classrooms.length){
      window.showToast('ยังไม่มีห้องเรียนในระบบ','warning');
      return;
    }
    var years = Array.from(new Set(classrooms.map(function(c){return Number(c.academicYear)||0;}).filter(Boolean))).sort(function(a,b){return b-a;});
    var fromYear = years[0];
    var toYear = fromYear + 1;
    var plan = [];   // [{src:classroom, dstGrade, dstRoom, included:bool, isGraduate:bool}]
    var preview = null;  // null until previewed
    var bd = document.createElement('div'); bd.className='modal-bd'; document.body.appendChild(bd);

    function buildPlan(){
      var srcs = classrooms.filter(function(c){return Number(c.academicYear)===Number(fromYear);});
      // sort: m1→m6, then by room
      srcs.sort(function(a,b){
        if(a.grade!==b.grade) return a.grade.localeCompare(b.grade);
        return String(a.room||'').localeCompare(String(b.room||''));
      });
      plan = srcs.map(function(s){
        var nextGrade = nextGradeOf(s.grade);
        return {
          src: s,
          dstGrade: nextGrade,
          dstRoom: s.room || '',
          included: true,
          isGraduate: nextGrade === null,
        };
      });
    }
    function nextGradeOf(g){
      var map = {m1:'m2',m2:'m3',m3:'m4',m4:'m5',m5:'m6',m6:null};
      return map[g] !== undefined ? map[g] : null;
    }
    function render(){
      var rowsHTML = plan.map(function(row, i){
        var info = window.GRADE_INFO[row.src.grade];
        var srcLbl = window.classLabel(info.num, row.src.room);
        var dstHTML;
        if(row.isGraduate){
          dstHTML = '<span class="tag" style="background:#7c3aed1a;color:#7c3aed">🎓 ผู้สำเร็จการศึกษา</span>';
        } else {
          var dstInfo = window.GRADE_INFO[row.dstGrade];
          dstHTML = '<span style="font-weight:600;color:'+dstInfo.color+'">ม.'+dstInfo.num+'</span>'+
                    ' / <input type="text" class="dst-room" data-i="'+i+'" value="'+window.escHTML(row.dstRoom||'')+'" '+
                    'style="width:80px;padding:.3rem .5rem;border:1px solid #cbd5e1;border-radius:6px;font-size:13px" placeholder="ห้อง">';
        }
        return '<tr style="'+(row.included?'':'opacity:.5')+'">'+
          '<td style="text-align:center"><input type="checkbox" class="inc" data-i="'+i+'" '+(row.included?'checked':'')+'></td>'+
          '<td><span style="font-weight:600;color:'+info.color+'">'+srcLbl+'</span><br><span style="font-size:11px;color:#6b7280">นักเรียน '+(row.src.studentCount||0)+' คน</span></td>'+
          '<td style="text-align:center;font-size:18px;color:#9ca3af">→</td>'+
          '<td>'+dstHTML+'</td>'+
        '</tr>';
      }).join('');

      var previewHTML = '';
      if(preview){
        previewHTML = '<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:12px;margin-top:12px">'+
          '<strong style="color:#15803d">📋 ผลตรวจสอบก่อนเลื่อนชั้น</strong>'+
          '<ul style="margin:6px 0 0 18px;padding:0;font-size:13px;line-height:1.7">'+
          '<li>นักเรียนเลื่อนชั้น: <strong>'+preview.movingCount+'</strong> คน</li>'+
          '<li>ผู้สำเร็จการศึกษา (ม.6): <strong>'+preview.graduateCount+'</strong> คน</li>'+
          '<li>ห้องปลายทางที่จะสร้าง: <strong>'+preview.newRooms+'</strong> ห้อง</li>'+
          (preview.conflicts.length ? '<li style="color:#dc2626">⚠️ พบห้องปลายทางที่มีอยู่แล้ว '+preview.conflicts.length+' ห้อง: '+window.escHTML(preview.conflicts.join(', '))+' (จะถูกทับ)</li>' : '')+
          (preview.warnings.length ? preview.warnings.map(function(w){return '<li style="color:#d97706">⚠️ '+window.escHTML(w)+'</li>';}).join('') : '')+
          '</ul></div>';
      }

      bd.innerHTML = '<div class="modal modal-lg" style="max-width:760px">'+
        '<div class="modal-head"><h3>🎓 เลื่อนชั้นนักเรียน</h3>'+
          '<button class="modal-close" data-act="close">✕</button></div>'+
        '<div class="modal-body" style="max-height:70vh;overflow:auto">'+
          '<div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap">'+
            '<label style="display:flex;align-items:center;gap:6px"><span style="font-weight:600">ปีต้นทาง</span>'+
              '<select id="prom-from" style="padding:.4rem .6rem;border:1px solid #cbd5e1;border-radius:6px">'+
                years.map(function(y){return '<option value="'+y+'" '+(y===fromYear?'selected':'')+'>'+y+'</option>';}).join('')+
              '</select></label>'+
            '<span style="font-size:18px;color:#9ca3af">→</span>'+
            '<label style="display:flex;align-items:center;gap:6px"><span style="font-weight:600">ปีปลายทาง</span>'+
              '<input type="number" id="prom-to" value="'+toYear+'" min="2500" max="2700" style="width:90px;padding:.4rem .6rem;border:1px solid #cbd5e1;border-radius:6px">'+
            '</label>'+
          '</div>'+
          '<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;line-height:1.6">'+
            '⚠️ <strong>คำเตือน:</strong> การเลื่อนชั้นจะคัดลอกนักเรียนทั้งหมดไปยังห้องปลายทาง '+
            'และ<strong>ลบ</strong>ห้องต้นทางออก ห้องปลายทาง ม.7 (ม.6 เดิม) จะกลายเป็นผู้สำเร็จการศึกษา (graduates) — '+
            '<strong>แนะนำให้สำรองข้อมูลก่อน</strong>'+
          '</div>'+
          '<div style="overflow-x:auto;border:1px solid #e5e7eb;border-radius:10px">'+
          '<table style="width:100%;border-collapse:collapse;font-size:13px">'+
            '<thead><tr style="background:#f9fafb"><th style="padding:8px;text-align:center;width:50px">นำเข้า</th>'+
              '<th style="padding:8px;text-align:left">ต้นทาง</th>'+
              '<th style="padding:8px;text-align:center;width:30px"></th>'+
              '<th style="padding:8px;text-align:left">ปลายทาง</th></tr></thead>'+
            '<tbody>'+rowsHTML+'</tbody>'+
          '</table></div>'+
          previewHTML+
        '</div>'+
        '<div class="modal-foot">'+
          '<button class="btn btn-ghost" data-act="backup">💾 สำรองก่อนเลื่อน</button>'+
          '<div style="flex:1"></div>'+
          '<button class="btn btn-ghost" data-act="close">ยกเลิก</button>'+
          '<button class="btn btn-primary" data-act="preview">🔍 ดูตัวอย่าง</button>'+
          '<button class="btn btn-danger" data-act="commit" '+(preview?'':'disabled style="opacity:.5;cursor:not-allowed"')+'>✅ ยืนยันเลื่อนชั้น</button>'+
        '</div>'+
      '</div>';

      bd.classList.add('show');
      attachEvents();
    }
    function attachEvents(){
      bd.querySelector('#prom-from').onchange = function(e){ fromYear = Number(e.target.value); toYear = fromYear+1; preview=null; buildPlan(); render(); };
      bd.querySelector('#prom-to').onchange = function(e){ toYear = Number(e.target.value); preview=null; render(); };
      bd.querySelectorAll('.inc').forEach(function(cb){
        cb.onchange = function(){ var i = Number(cb.dataset.i); plan[i].included = cb.checked; preview=null; render(); };
      });
      bd.querySelectorAll('.dst-room').forEach(function(inp){
        inp.oninput = function(){ var i = Number(inp.dataset.i); plan[i].dstRoom = inp.value.trim(); };
      });
      bd.querySelectorAll('[data-act]').forEach(function(btn){
        btn.onclick = function(){
          var act = btn.dataset.act;
          if(act==='close') close();
          else if(act==='preview') runPreview();
          else if(act==='commit') runCommit();
          else if(act==='backup') runBackup();
        };
      });
    }
    function runPreview(){
      var movingCount = 0, graduateCount = 0, newRooms = 0;
      var conflicts = [];
      var warnings = [];
      var existingClassIds = new Set((window.AppState.classrooms||[]).map(function(c){return c.id;}));
      plan.forEach(function(row){
        if(!row.included) return;
        var n = row.src.studentCount || 0;
        if(row.isGraduate){
          graduateCount += n;
        } else {
          movingCount += n;
          if(!row.dstRoom){
            warnings.push('ม.'+window.GRADE_INFO[row.src.grade].num+(row.src.room?'/'+row.src.room:'')+' ยังไม่ได้กำหนดห้องปลายทาง');
            return;
          }
          var dstId = window.classroomId(toYear, row.dstGrade, row.dstRoom);
          if(existingClassIds.has(dstId)) conflicts.push('ม.'+window.GRADE_INFO[row.dstGrade].num+'/'+row.dstRoom);
          else newRooms++;
        }
      });
      preview = {movingCount:movingCount, graduateCount:graduateCount, newRooms:newRooms, conflicts:conflicts, warnings:warnings};
      render();
    }
    async function runBackup(){
      try {
        await window.backupAll();
      } catch(e){
        window.showToast('สำรองข้อมูลผิดพลาด: '+e.message,'error');
      }
    }
    async function runCommit(){
      if(!preview){ window.showToast('กรุณากด "ดูตัวอย่าง" ก่อน','warning'); return; }
      if(preview.warnings.length){ window.showToast('กรุณาแก้ไขปัญหาก่อนยืนยัน','warning'); return; }
      var ok = await window.confirmDialog({
        title:'ยืนยันเลื่อนชั้น',
        message:'<strong>การเลื่อนชั้นเป็นการกระทำที่ย้อนกลับไม่ได้</strong><br>'+
          'นักเรียน '+preview.movingCount+' คน จะถูกย้ายไปยังห้องปลายทาง<br>'+
          'นักเรียน '+preview.graduateCount+' คน (ม.6) จะถูกย้ายไปยังผู้สำเร็จการศึกษา<br>'+
          'ห้องต้นทางทั้งหมดจะถูกลบ<br><br>'+
          'พิมพ์ <code style="background:#fee2e2;padding:2px 6px;border-radius:4px;font-weight:600">ยืนยัน</code> เพื่อดำเนินการ',
        confirmText:'เลื่อนชั้น', danger:true, requireType:'ยืนยัน'
      });
      if(!ok) return;

      try {
        window.showLoading(true,'กำลังเลื่อนชั้น...');
        await runPromotion();
        window.showLoading(false);
        window.showToast('เลื่อนชั้นสำเร็จ ✅','success');
        close();
        if(window.refreshCurrentView) window.refreshCurrentView();
      } catch(e){
        console.error(e);
        window.showLoading(false);
        window.showToast('เลื่อนชั้นผิดพลาด: '+e.message,'error');
      }
    }
    async function runPromotion(){
      var fns = window.firestore;
      var db = window.db;
      var nowISO = new Date().toISOString();
      var logEntries = [];

      for(var i=0; i<plan.length; i++){
        var row = plan[i];
        if(!row.included) continue;
        var srcId = row.src.id;
        var students = await window.getStudentsOfClass(srcId, true);

        if(row.isGraduate){
          // Move to graduates collection (snapshot)
          var bat = fns.writeBatch(db);
          var n = 0;
          for(var j=0; j<students.length; j++){
            var stu = students[j];
            var gid = String(toYear)+'_'+srcId+'_'+stu.docId;
            var gref = fns.doc(db, 'graduates', gid);
            bat.set(gref, Object.assign({}, stu, {
              graduatedYear: toYear,
              originalClassId: srcId,
              originalGrade: row.src.grade,
              originalRoom: row.src.room || '',
              graduatedAt: fns.serverTimestamp(),
            }));
            n++;
            if(n%400===0){ await bat.commit(); bat = fns.writeBatch(db); }
          }
          if(n%400!==0) await bat.commit();
          // Delete the source classroom + students
          await window.deleteClassroom(srcId);
          logEntries.push({type:'graduate', srcId:srcId, count:students.length});
        } else {
          // Move to new classroom
          var dstId = window.classroomId(toYear, row.dstGrade, row.dstRoom);
          // Create or update destination classroom
          var dstInfo = window.GRADE_INFO[row.dstGrade];
          await window.upsertClassroom({
            academicYear: toYear,
            grade: row.dstGrade,
            room: row.dstRoom,
            advisors: row.src.advisors || [],
            studentCount: students.length,
            maleCount: row.src.maleCount || 0,
            femaleCount: row.src.femaleCount || 0,
            sourceFormat: row.src.sourceFormat || 'A',
          });
          // Bulk save students into destination (overwrite)
          var stuArr = students.map(function(s){
            var copy = Object.assign({}, s);
            delete copy.id;       // strip old firestore docId field
            delete copy.docId;    // (defensive) remove if present
            return copy;
          });
          await window.bulkSaveStudents(dstId, stuArr);
          // Delete the source classroom + students
          await window.deleteClassroom(srcId);
          logEntries.push({type:'promote', srcId:srcId, dstId:dstId, count:students.length});
        }
      }

      // Write a single promotionLogs entry summarising the run
      try {
        var logRef = fns.doc(fns.collection(db,'promotionLogs'));
        await fns.setDoc(logRef, {
          fromYear: fromYear,
          toYear: toYear,
          performedAt: fns.serverTimestamp(),
          performedAtISO: nowISO,
          entries: logEntries,
          totalMoved: preview.movingCount,
          totalGraduated: preview.graduateCount,
        });
      } catch(e){ console.warn('promotionLogs write failed',e); }
    }
    function close(){ bd.classList.remove('show'); setTimeout(function(){bd.remove()},220); }

    buildPlan();
    render();
  };
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     STUDENT TABLE + DETAIL MODAL + PRINT WINDOW
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function(){
  // ═══════════════ Student table ═══════════════
  var TBL_STATE = {classId:null, all:[], filtered:[], page:1, pageSize:50, sort:{key:'order',dir:'asc'}, q:'', genderFilter:''};

  window.setupStudentTable = async function(classId){
    TBL_STATE = {classId:classId, all:[], filtered:[], page:1, pageSize:50, sort:{key:'order',dir:'asc'}, q:'', genderFilter:''};
    try{
      window.showLoading(true,'กำลังโหลดนักเรียน...');
      var students = await window.getStudentsOfClass(classId, true);
      window.showLoading(false);
      TBL_STATE.all = students;
      applyTblFilter();
    }catch(e){
      window.showLoading(false);
      var tb = document.getElementById('stuTbody');
      if(tb) tb.innerHTML = '<tr><td colspan="7" class="text-center" style="color:var(--danger);padding:2rem">โหลดผิดพลาด: '+window.escHTML(e.message)+'</td></tr>';
    }
    var s = document.getElementById('stuSearch');
    if(s){ s.oninput = function(){ TBL_STATE.q = s.value.trim(); TBL_STATE.page=1; applyTblFilter(); }; }
    var f = document.getElementById('stuFilter');
    if(f){ f.onchange = function(){ TBL_STATE.genderFilter = f.value; TBL_STATE.page=1; applyTblFilter(); }; }
    var ps = document.getElementById('stuPageSize');
    if(ps){ ps.onchange = function(){ TBL_STATE.pageSize = parseInt(ps.value,10); TBL_STATE.page=1; applyTblFilter(); }; }
    document.querySelectorAll('#stuTbl th[data-sort]').forEach(function(th){
      th.onclick = function(){
        var k = th.dataset.sort;
        if(TBL_STATE.sort.key===k) TBL_STATE.sort.dir = TBL_STATE.sort.dir==='asc'?'desc':'asc';
        else { TBL_STATE.sort.key=k; TBL_STATE.sort.dir='asc'; }
        applyTblFilter();
      };
    });
  };

  function applyTblFilter(){
    var arr = TBL_STATE.all.slice();
    var q = TBL_STATE.q.toLowerCase();
    if(q){
      arr = arr.filter(function(s){
        return ((s.fullName||'').toLowerCase().indexOf(q)>=0)
          || ((s.studentId||'').toLowerCase().indexOf(q)>=0)
          || ((s.nickname||'').toLowerCase().indexOf(q)>=0)
          || ((s.phone||'').toLowerCase().indexOf(q)>=0);
      });
    }
    if(TBL_STATE.genderFilter){
      arr = arr.filter(function(s){return s.gender===TBL_STATE.genderFilter});
    }
    var k = TBL_STATE.sort.key, dir = TBL_STATE.sort.dir==='asc'?1:-1;
    arr.sort(function(a,b){
      var va = a[k], vb = b[k];
      if(k==='order'){ va = parseInt(va,10)||0; vb = parseInt(vb,10)||0; return (va-vb)*dir; }
      return ((va||'').toString()).localeCompare((vb||'').toString(),'th') * dir;
    });
    TBL_STATE.filtered = arr;
    renderTblBody();
  }

  function renderTblBody(){
    var tb = document.getElementById('stuTbody'); if(!tb) return;
    var tot = TBL_STATE.filtered.length;
    var ps = TBL_STATE.pageSize;
    var pages = Math.max(1, Math.ceil(tot/ps));
    if(TBL_STATE.page>pages) TBL_STATE.page=pages;
    var start = (TBL_STATE.page-1)*ps;
    var slice = TBL_STATE.filtered.slice(start, start+ps);

    if(!slice.length){
      tb.innerHTML = '<tr><td colspan="7" class="text-center muted" style="padding:2rem">ไม่พบนักเรียน</td></tr>';
    } else {
      tb.innerHTML = slice.map(function(s){
        var gc = s.gender==='ชาย'?'gender-m':(s.gender==='หญิง'?'gender-f':'');
        return '<tr>'+
          '<td>'+(s.order||'')+'</td>'+
          '<td>'+window.escHTML(s.studentId||'')+'</td>'+
          '<td>'+window.escHTML(s.fullName||'')+'</td>'+
          '<td>'+window.escHTML(s.nickname||'')+'</td>'+
          '<td class="'+gc+'">'+window.escHTML(s.gender||'')+'</td>'+
          '<td>'+window.escHTML(s.phone||'')+'</td>'+
          '<td><button class="btn btn-sm btn-primary" data-act="openStudent" data-p=\'{"studentId":"'+window.escHTML(s.id||'')+'"}\'>👁 ดู</button></td>'+
          '</tr>';
      }).join('');
      // re-bind delegates for new rows
      tb.querySelectorAll('[data-act]').forEach(function(el){
        el.onclick = function(){
          var p = JSON.parse(el.dataset.p);
          window.openStudentDetail(p.studentId);
        };
      });
    }
    // sort indicators
    document.querySelectorAll('#stuTbl th[data-sort]').forEach(function(th){
      th.classList.remove('sort-asc','sort-desc');

  function fileToDataURL(f){
    return new Promise(function(res, rej){
      var fr = new FileReader();
      fr.onload = function(){ res(fr.result); };
      fr.onerror = function(){ rej(new Error('อ่านรูปไม่ได้')); };
      fr.readAsDataURL(f);
    });
  }

      w.document.open(); w.document.write(html); w.document.close();

  function buildPrintHTML(rm, students, st){
    var info = window.GRADE_INFO[rm.grade];
    var advisors = rm.advisors || [];
    var schoolName = st.schoolName || 'โรงเรียนกระดุมทองวิทยา';
    var schoolAddr = st.schoolAddress || '';

    var year = rm.academicYear;
    var clsLbl = window.classLabel(info.num, rm.room);
    var tocStartPage = 4;
    // เรียงนักเรียนตามเลขประจำตัว
    var sorted = students.slice().sort(function(a,b){
      var ia = String(a.studentId||'').trim();
      var ib = String(b.studentId||'').trim();
      if(!ia && !ib) return (a.fullName||'').localeCompare(b.fullName||'','th');
      if(!ia) return 1;
      if(!ib) return -1;
      return ia.localeCompare(ib, 'th', {numeric:true});

    // อัปเดต order

  // Fix Excel-style date corruption — values like "6-Dec", "15-Mar", "Sat Dec 06 2025" or
  // serial numbers should be reverted to "6/12", "15/3" etc.
  // Returns the fixed string. Safe for non-date inputs (passes through).
  function fixDateLike(v){
    if(v==null) return '';
    var s = String(v).trim();
    if(!s) return '';
    var months = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
    // "6-Dec", "15-Mar"  →  "6/12", "15/3"
    var m1 = s.match(/^(\d{1,2})-([A-Za-z]{3})$/);
    if(m1 && months[m1[2]]){ return m1[1] + '/' + months[m1[2]]; }
    // "Dec-6", "Mar-15"  →  "6/12", "15/3"
    var m2 = s.match(/^([A-Za-z]{3})-(\d{1,2})$/);
    if(m2 && months[m2[1]]){ return m2[2] + '/' + months[m2[1]]; }
    // "Sat Dec 06 2025 ..."
    var m3 = s.match(/[A-Za-z]{3}\s+([A-Za-z]{3})\s+(\d{1,2})/);
    if(m3 && months[m3[1]]){ return parseInt(m3[2],10) + '/' + months[m3[1]]; }
    // ISO "2025-12-06"  →  "6/12"
    var m4 = s.match(/^\d{4}-(\d{1,2})-(\d{1,2})/);
    if(m4){ return parseInt(m4[2],10) + '/' + parseInt(m4[1],10); }
    return s;
  }

  // Extract last name (last whitespace-separated token) from a fullname string
  // e.g. "นาย สมชาย ใจดี" → "ใจดี", "เด็กหญิงกัลกร พร้อมพรม" → "พร้อมพรม"
  // Returns empty string if no clear last name (e.g. only a single token).
  function extractLastName(fullname){
    if(!fullname) return '';
    var s = String(fullname).trim();
    if(!s) return '';
    // Strip common Thai prefixes (without space)
    s = s.replace(/^(เด็กชาย|เด็กหญิง|ด\.ช\.|ด\.ญ\.|นางสาว|นาย|นาง)\s*/, '');
    var parts = s.split(/\s+/).filter(Boolean);
    if(parts.length < 2) return '';
    return parts[parts.length - 1];
  }

  function kvRow(k1,v1,k2,v2){
    function cell(v){
      if(v==='_BLANK_') return '<td></td>';                       // intentionally blank (for writing by pen)
      if(v==null || v==='') return '<td><span class="dash">-</span></td>';
      // Allow trusted HTML (for highlighted/styled values) using prefix marker
      if(typeof v==='string' && v.indexOf('__HTML__')===0) return '<td>'+v.slice(8)+'</td>';
      return '<td>'+escH(v)+'</td>';
    }
    var c1 = '<th>'+escH(k1)+'</th>'+cell(v1);
    var c2 = (k2!==undefined) ? ('<th>'+escH(k2)+'</th>'+cell(v2)) : '<th></th><td></td>';
    return '<tr>'+c1+c2+'</tr>';
  }
  function sectionTitle(t, c){
    return '<div class="sp-section" style="border-left-color:'+c+'">'+escH(t)+'</div>';
  }
  function escH(s){
    s = (s==null?'':String(s));
    return s.replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
  }

  // ═══════════════ Manual Add Student (in-app form, same schema as CSV import) ═══════════════
  window.openManualAddStudent = function(classId){
    if(!classId){ window.showToast('ยังไม่ได้เลือกห้อง','warning'); return; }
    var rm = (window.AppState.classrooms||[]).find(function(c){return c.id===classId});
    if(!rm){ window.showToast('ไม่พบห้อง','error'); return; }
    var info = window.GRADE_INFO[rm.grade];
    var clsLbl = window.classLabel(info.num, rm.room);

    var bd = document.createElement('div'); bd.className='modal-bd show';
    document.body.appendChild(bd);

    function fld(label, id, opts){
      opts = opts || {};
      var req = opts.required ? '<span style="color:#dc2626">*</span>' : '';
      var inp;
      if(opts.type==='select'){
        inp = '<select id="'+id+'">'+(opts.options||[]).map(function(o){return '<option value="'+window.escHTML(o.value||o)+'">'+window.escHTML(o.label||o)+'</option>';}).join('')+'</select>';
      } else if(opts.type==='textarea'){
        inp = '<textarea id="'+id+'" rows="2"></textarea>';
      } else {
        inp = '<input type="'+(opts.type||'text')+'" id="'+id+'"'+(opts.inputmode?' inputmode="'+opts.inputmode+'"':'')+(opts.maxlength?' maxlength="'+opts.maxlength+'"':'')+(opts.value?' value="'+window.escHTML(opts.value)+'"':'')+'>';
      }
      return '<div class="form-row" style="margin:0"><label>'+label+' '+req+'</label>'+inp+'</div>';
    }
    function row2(){ var args = Array.prototype.slice.call(arguments); return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">'+args.join('')+'</div>'; }
    function row3(){ var args = Array.prototype.slice.call(arguments); return '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem">'+args.join('')+'</div>'; }
    function sect(title){ return '<h4 style="font-family:Kanit;color:'+info.color+';margin:1.1rem 0 .5rem;border-bottom:2px solid '+info.color+'33;padding-bottom:.3rem">'+title+'</h4>'; }

    bd.innerHTML = '<div class="modal modal-lg" style="max-width:760px"><div class="modal-head">'+
      '<h3>➕ เพิ่มข้อมูลนักเรียนใหม่ — '+clsLbl+' ปี '+rm.academicYear+'</h3>'+
      '<button class="modal-close" id="masClose">×</button></div>'+
      '<div class="modal-body" style="max-height:70vh;overflow:auto">'+

        sect('👤 ข้อมูลส่วนตัว')+
        fld('คำนำหน้า','masPrefix',{required:true,type:'select',options:[{value:'',label:'-- เลือก --'},'เด็กชาย','เด็กหญิง','นาย','นางสาว']})+
        row2(
          fld('ชื่อจริง','masFirstName',{required:true}),
          fld('นามสกุล','masLastName',{required:true})
        )+
        row2(
          fld('ชื่อเล่น','masNickname'),
          fld('เลขประจำตัวนักเรียน','masStudentId',{inputmode:'numeric'})
        )+
        fld('เลขบัตรประชาชน','masNationalId',{required:true,inputmode:'numeric',maxlength:13})+
        row3(
          fld('วันเกิด (วัน)','masBirthDay',{type:'number',inputmode:'numeric'}),
          fld('เดือน','masBirthMonth',{type:'select',options:[{value:'',label:'--'}].concat(['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'])}),
          fld('ปี (พ.ศ.)','masBirthYear',{type:'number',inputmode:'numeric'})
        )+
        row3(
          fld('อายุ (ปี)','masAge',{type:'number',inputmode:'numeric'}),
          fld('น้ำหนัก (กก.)','masWeight',{type:'number'}),
          fld('ส่วนสูง (ซม.)','masHeight',{type:'number'})
        )+
        row3(
          fld('สัญชาติ','masNationality',{value:'ไทย'}),
          fld('เชื้อชาติ','masRace',{value:'ไทย'}),
          fld('ศาสนา','masReligion',{value:'พุทธ'})
        )+
        fld('โรคประจำตัว','masDisease')+
        fld('โรงเรียนเดิม','masOldSchool')+

        sect('🏠 ที่อยู่ตามทะเบียนบ้าน')+
        row2(
          fld('บ้านเลขที่','masHouseNo'),
          fld('หมู่','masMoo',{inputmode:'numeric'})
        )+
        fld('ชื่อหมู่บ้าน','masVillage')+
        row2(
          fld('ตำบล','masSubdistrict'),
          fld('อำเภอ','masDistrict')
        )+
        row2(
          fld('จังหวัด','masProvince'),
          fld('รหัสไปรษณีย์','masPostal',{inputmode:'numeric',maxlength:5})
        )+
        fld('เบอร์โทรนักเรียน','masStudentPhone',{type:'tel',inputmode:'numeric'})+

        sect('👨 บิดา')+
        row3(
          fld('คำนำหน้า','masFatherPrefix',{type:'select',options:[{value:'',label:'--'},'นาย','ดร.','ผศ.','รศ.','ศ.']}),
          fld('ชื่อจริง','masFatherFirstName'),
          fld('นามสกุล','masFatherLastName')
        )+
        row2(
          fld('อาชีพ','masFatherJob'),
          fld('เบอร์โทร','masFatherPhone',{type:'tel',inputmode:'numeric'})
        )+
        row2(
          fld('สถานะ','masFatherStatus',{type:'select',options:[{value:'',label:'--'},'มีชีวิต','เสียชีวิต']}),
          fld('รายได้/ปี (บาท)','masFatherIncome',{type:'number'})
        )+

        sect('👩 มารดา')+
        row3(
          fld('คำนำหน้า','masMotherPrefix',{type:'select',options:[{value:'',label:'--'},'นาง','นางสาว','ดร.','ผศ.','รศ.','ศ.']}),
          fld('ชื่อจริง','masMotherFirstName'),
          fld('นามสกุล','masMotherLastName')
        )+
        row2(
          fld('อาชีพ','masMotherJob'),
          fld('เบอร์โทร','masMotherPhone',{type:'tel',inputmode:'numeric'})
        )+
        row2(
          fld('สถานะ','masMotherStatus',{type:'select',options:[{value:'',label:'--'},'มีชีวิต','เสียชีวิต']}),
          fld('รายได้/ปี (บาท)','masMotherIncome',{type:'number'})
        )+
        fld('สถานภาพบิดา-มารดา','masParentStatus',{type:'select',options:[{value:'',label:'-- เลือก --'},'อยู่ด้วยกัน','แยกกันอยู่','หย่าร้าง','บิดาเสียชีวิต','มารดาเสียชีวิต','เสียชีวิตทั้งคู่']})+

        sect('👨‍👩‍👧 ผู้ปกครอง')+
        row3(
          fld('คำนำหน้า','masGuardianPrefix',{required:true,type:'select',options:[{value:'',label:'--'},'นาย','นาง','นางสาว','ดร.','ผศ.','รศ.','ศ.']}),
          fld('ชื่อจริง','masGuardianFirstName',{required:true}),
          fld('นามสกุล','masGuardianLastName',{required:true})
        )+
        row2(
          fld('ความสัมพันธ์','masGuardianRel',{required:true,type:'select',options:[{value:'',label:'-- เลือก --'},'บิดา','มารดา','ปู่','ย่า','ตา','ยาย','ลุง','ป้า','น้า','อา','พี่','อื่นๆ']}),
          fld('เบอร์มือถือ','masGuardianPhone',{required:true,type:'tel',inputmode:'numeric'})
        )+
        row2(
          fld('อาชีพ','masGuardianJob'),
          fld('เบอร์บ้าน','masGuardianHomePhone',{type:'tel',inputmode:'numeric'})
        )+
        fld('รายได้/ปี (บาท)','masGuardianIncome',{type:'number'})+

        sect('🚌 การเดินทาง')+
        row2(
          fld('วิธีเดินทาง','masTravel',{type:'select',options:[{value:'',label:'-- เลือก --'},'เดิน','จักรยาน','มอเตอร์ไซค์','รถยนต์','รถโรงเรียน','รถประจำทาง','อื่นๆ']}),
          fld('ระยะทาง (กม.)','masDistance',{type:'number'})
        )+

      '</div>'+
      '<div class="modal-foot">'+
        '<button class="btn" id="masCancel">ยกเลิก</button>'+
        '<button class="btn btn-success" id="masSave">💾 บันทึก</button>'+
      '</div></div>';

    function close(){ bd.classList.remove('show'); setTimeout(function(){bd.remove();},220); }
    bd.querySelector('#masClose').onclick = close;
    bd.querySelector('#masCancel').onclick = close;
    bd.querySelector('#masSave').onclick = handleSave;

    async function handleSave(){
      var V = function(id){ var el=bd.querySelector('#'+id); return el && el.value ? String(el.value).trim() : ''; };

      var prefix = V('masPrefix');
      var firstName = V('masFirstName');
      var lastName = V('masLastName');
      var nationalId = V('masNationalId').replace(/[^0-9]/g,'');
      var guardianPrefix = V('masGuardianPrefix');
      var guardianFirst = V('masGuardianFirstName');
      var guardianLast = V('masGuardianLastName');
      var guardianRel = V('masGuardianRel');
      var guardianPhone = V('masGuardianPhone');

      if(!prefix || !firstName || !lastName){ window.showToast('กรุณากรอก คำนำหน้า ชื่อ และนามสกุลของนักเรียน','warning'); return; }
      if(!nationalId || nationalId.length<13){ window.showToast('กรุณากรอกเลขบัตรประชาชน 13 หลักให้ครบ','warning'); return; }
      if(!guardianPrefix || !guardianFirst || !guardianLast || !guardianRel || !guardianPhone){
        window.showToast('กรุณากรอกข้อมูลผู้ปกครองให้ครบ','warning'); return;
      }

      try {
        window.showLoading(true,'กำลังบันทึก...');
        var fullName = prefix + firstName + ' ' + lastName;
        var gender = (prefix==='เด็กชาย'||prefix==='นาย')?'ชาย':((prefix==='เด็กหญิง'||prefix==='นางสาว'||prefix==='นาง')?'หญิง':'ไม่ระบุ');

        var fatherFirst = V('masFatherFirstName'), fatherLast = V('masFatherLastName'), fatherPrefix = V('masFatherPrefix');
        var fatherFull = (fatherFirst||fatherLast) ? ((fatherPrefix||'')+fatherFirst+(fatherLast?' '+fatherLast:'')) : '';
        var motherFirst = V('masMotherFirstName'), motherLast = V('masMotherLastName'), motherPrefix = V('masMotherPrefix');
        var motherFull = (motherFirst||motherLast) ? ((motherPrefix||'')+motherFirst+(motherLast?' '+motherLast:'')) : '';
        var guardianFull = guardianPrefix + guardianFirst + ' ' + guardianLast;

        var raw = {
          'วันที่บันทึก': new Date().toLocaleString('th-TH'),
          'ปีการศึกษา': String(rm.academicYear),
          'ชั้น/ห้อง': rm.room ? ('ม.'+info.num+'/'+rm.room) : ('ม.'+info.num),
          'เลขประจำตัวนักเรียน': V('masStudentId'),
          'ชื่อ-สกุลนักเรียน': fullName,
          'ชื่อเล่น': V('masNickname'),
          'เลขบัตรนักเรียน': nationalId,
          'วันเกิด(วัน)': V('masBirthDay'), 'วันเกิด(เดือน)': V('masBirthMonth'), 'วันเกิด(ปีพ.ศ.)': V('masBirthYear'),
          'อายุ': V('masAge'), 'น้ำหนัก(กก.)': V('masWeight'), 'ส่วนสูง(ซม.)': V('masHeight'),
          'สัญชาตินักเรียน': V('masNationality'), 'เชื้อชาตินักเรียน': V('masRace'), 'ศาสนานักเรียน': V('masReligion'),
          'โรคประจำตัว': V('masDisease'), 'โรงเรียนเดิม': V('masOldSchool'),
          'บ้านเลขที่นักเรียน': V('masHouseNo'), 'หมู่นักเรียน': V('masMoo'), 'หมู่บ้านนักเรียน': V('masVillage'),
          'ตำบลนักเรียน': V('masSubdistrict'), 'อำเภอนักเรียน': V('masDistrict'),
          'จังหวัดนักเรียน': V('masProvince'), 'รหัสไปรษณีย์นักเรียน': V('masPostal'),
          'โทรนักเรียน': V('masStudentPhone'),
          'ชื่อ-สกุลบิดา': fatherFull, 'คำนำหน้าบิดา': fatherPrefix, 'ชื่อบิดา': fatherFirst, 'นามสกุลบิดา': fatherLast,
          'อาชีพบิดา': V('masFatherJob'), 'โทรบิดา': V('masFatherPhone'),
          'สถานะบิดา': V('masFatherStatus'), 'รายได้บิดา': V('masFatherIncome'),
          'ชื่อ-สกุลมารดา': motherFull, 'คำนำหน้ามารดา': motherPrefix, 'ชื่อมารดา': motherFirst, 'นามสกุลมารดา': motherLast,
          'อาชีพมารดา': V('masMotherJob'), 'โทรมารดา': V('masMotherPhone'),
          'สถานะมารดา': V('masMotherStatus'), 'รายได้มารดา': V('masMotherIncome'),
          'สถานภาพบิดา-มารดา': V('masParentStatus'),
          'ชื่อผู้ปกครอง': guardianFull, 'คำนำหน้าผู้ปกครอง': guardianPrefix,
          'ชื่อจริงผู้ปกครอง': guardianFirst, 'นามสกุลผู้ปกครอง': guardianLast,
          'ความสัมพันธ์ผู้ปกครอง': guardianRel,
          'อาชีพผู้ปกครอง': V('masGuardianJob'),
          'โทรบ้านผู้ปกครอง': V('masGuardianHomePhone'),
          'โทรมือถือผู้ปกครอง': guardianPhone,
          'รายได้ผู้ปกครอง': V('masGuardianIncome'),
          'การเดินทาง': V('masTravel'), 'ระยะทาง(กม.)': V('masDistance'),
          '_addedManually': true,
          '_addedAt': new Date().toISOString()
        };

        var newStudent = {
          studentId: raw['เลขประจำตัวนักเรียน'] || nationalId,
          fullName: fullName,
          nickname: raw['ชื่อเล่น'],
          gender: gender,
          phone: raw['โทรนักเรียน'] || guardianPhone,
          raw: raw
        };

        var existing = await window.getStudentsOfClass(classId, true);
        var dup = existing.find(function(s){
          return (s.raw && s.raw['เลขบัตรนักเรียน']===nationalId) ||
                 (newStudent.studentId && s.studentId===newStudent.studentId);
        });
        if(dup){
          window.showLoading(false);
          window.showToast('พบข้อมูลซ้ำ — เลขบัตรประชาชนหรือเลขประจำตัวนี้มีอยู่แล้ว','error',5000);
          return;
        }
        var combined = existing.slice();
        combined.push(newStudent);
        combined.sort(function(a,b){
          var ia=String(a.studentId||'').trim(), ib=String(b.studentId||'').trim();
          if(!ia&&!ib) return (a.fullName||'').localeCompare(b.fullName||'','th');
          if(!ia) return 1; if(!ib) return -1;
          return ia.localeCompare(ib,'th',{numeric:true});
        });
        combined.forEach(function(s,i){ s.order = i+1; });

        await window.upsertClassroom({
          academicYear: rm.academicYear, grade: rm.grade, room: rm.room,
          studentCount: combined.length,
          maleCount: combined.filter(function(s){return s.gender==='ชาย';}).length,
          femaleCount: combined.filter(function(s){return s.gender==='หญิง';}).length,
          sourceFormat: rm.sourceFormat || 'A'
        });
        await window.bulkSaveStudents(classId, combined);

        window.AppState.studentsCache = {};
        window.showLoading(false);
        window.showToast('เพิ่มนักเรียน '+window.escHTML(fullName)+' เรียบร้อย','success');
        close();
        if(window.refreshCurrentView) window.refreshCurrentView();
      } catch(e){
        console.error(e);
        window.showLoading(false);
        window.showToast('บันทึกผิดพลาด: '+e.message,'error');
      }
    }
  };
})();
</script>

     PUBLIC STUDENT FORM (rendered when URL hash is #form)

<script>
(function(){
  // Parse hash params: #form?grade=m1&room=1&year=2569
  function parseHashParams(){
    var hash = location.hash || '';
    var qIdx = hash.indexOf('?');
    var params = {};
    if(qIdx<0) return params;
    var qs = hash.slice(qIdx+1);
    qs.split('&').forEach(function(pair){
      var kv = pair.split('=');
      if(kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]||'');
    });
    return params;
  }

    async function handleSubmit(){
      var btn = document.getElementById('pfSubmit');
      var $ = function(id){ return document.getElementById(id); };
      var V = function(id){ return ($(id) && $(id).value) ? $(id).value.trim() : ''; };

      // Validate required
      var prefix = V('pfPrefix');
      var firstName = V('pfFirstName');
      var lastName = V('pfLastName');
      var nationalId = V('pfNationalId').replace(/[^0-9]/g,'');
      var guardianPrefix = V('pfGuardianPrefix');
      var guardianFirst = V('pfGuardianFirstName');
      var guardianLast = V('pfGuardianLastName');
      var guardianRel = V('pfGuardianRel');
      var guardianPhone = V('pfGuardianPhone');

      if(!prefix || !firstName || !lastName){
        window.showToast('กรุณากรอกคำนำหน้า ชื่อ และนามสกุลของนักเรียนให้ครบ','warning');
        return;
      }
      if(!nationalId || nationalId.length<13){
        window.showToast('กรุณากรอกเลขบัตรประชาชน 13 หลักให้ครบถ้วน','warning');
        return;
      }
      if(!guardianPrefix || !guardianFirst || !guardianLast || !guardianRel || !guardianPhone){
        window.showToast('กรุณากรอกข้อมูลผู้ปกครองให้ครบ (คำนำหน้า ชื่อ นามสกุล ความสัมพันธ์ และเบอร์โทร)','warning');
        return;
      }

      btn.disabled = true; btn.textContent = 'กำลังส่ง...';

      try {
        var fullName = prefix + firstName + ' ' + lastName;
        var gender = (prefix==='เด็กชาย'||prefix==='นาย')?'ชาย':((prefix==='เด็กหญิง'||prefix==='นางสาว'||prefix==='นาง')?'หญิง':'ไม่ระบุ');

        // Build composed names — preserve original "ชื่อ-สกุล*" CSV schema
        var fatherFirst = V('pfFatherFirstName');
        var fatherLast = V('pfFatherLastName');
        var fatherPrefix = V('pfFatherPrefix');
        var fatherFull = (fatherFirst || fatherLast)
          ? ((fatherPrefix?fatherPrefix:'') + fatherFirst + (fatherLast?' '+fatherLast:''))
          : '';

        var motherFirst = V('pfMotherFirstName');
        var motherLast = V('pfMotherLastName');
        var motherPrefix = V('pfMotherPrefix');
        var motherFull = (motherFirst || motherLast)
          ? ((motherPrefix?motherPrefix:'') + motherFirst + (motherLast?' '+motherLast:''))
          : '';

        var guardianFull = guardianPrefix + guardianFirst + ' ' + guardianLast;

        // Build raw object matching Format A schema
        var raw = {
          'วันที่บันทึก': new Date().toLocaleString('th-TH'),
          'ปีการศึกษา': String(year),
          'ชั้น/ห้อง': room ? ('ม.'+info.num+'/'+room) : ('ม.'+info.num),
          'เลขประจำตัวนักเรียน': V('pfStudentId'),
          'ชื่อ-สกุลนักเรียน': fullName,
          'ชื่อเล่น': V('pfNickname'),
          'เลขบัตรนักเรียน': nationalId,
          'วันเกิด(วัน)': V('pfBirthDay'),
          'วันเกิด(เดือน)': V('pfBirthMonth'),
          'วันเกิด(ปีพ.ศ.)': V('pfBirthYear'),
          'อายุ': V('pfAge'),
          'น้ำหนัก(กก.)': V('pfWeight'),
          'ส่วนสูง(ซม.)': V('pfHeight'),
          'สัญชาตินักเรียน': V('pfNationality'),
          'เชื้อชาตินักเรียน': V('pfRace'),
          'ศาสนานักเรียน': V('pfReligion'),
          'โรคประจำตัว': V('pfDisease'),
          'โรงเรียนเดิม': V('pfOldSchool'),
          'บ้านเลขที่นักเรียน': V('pfHouseNo'),
          'หมู่นักเรียน': V('pfMoo'),
          'หมู่บ้านนักเรียน': V('pfVillage'),
          'ตำบลนักเรียน': V('pfSubdistrict'),
          'อำเภอนักเรียน': V('pfDistrict'),
          'จังหวัดนักเรียน': V('pfProvince'),
          'รหัสไปรษณีย์นักเรียน': V('pfPostal'),
          'โทรนักเรียน': V('pfStudentPhone'),
          // Father
          'ชื่อ-สกุลบิดา': fatherFull,
          'คำนำหน้าบิดา': fatherPrefix,
          'ชื่อบิดา': fatherFirst,
          'นามสกุลบิดา': fatherLast,
          'อาชีพบิดา': V('pfFatherJob'),
          'โทรบิดา': V('pfFatherPhone'),
          'สถานะบิดา': V('pfFatherStatus'),
          'รายได้บิดา': V('pfFatherIncome'),
          // Mother
          'ชื่อ-สกุลมารดา': motherFull,
          'คำนำหน้ามารดา': motherPrefix,
          'ชื่อมารดา': motherFirst,
          'นามสกุลมารดา': motherLast,
          'อาชีพมารดา': V('pfMotherJob'),
          'โทรมารดา': V('pfMotherPhone'),
          'สถานะมารดา': V('pfMotherStatus'),
          'รายได้มารดา': V('pfMotherIncome'),
          'สถานภาพบิดา-มารดา': V('pfParentStatus'),
          // Guardian
          'ชื่อผู้ปกครอง': guardianFull,
          'คำนำหน้าผู้ปกครอง': guardianPrefix,
          'ชื่อจริงผู้ปกครอง': guardianFirst,
          'นามสกุลผู้ปกครอง': guardianLast,
          'ความสัมพันธ์ผู้ปกครอง': guardianRel,
          'อาชีพผู้ปกครอง': V('pfGuardianJob'),
          'โทรบ้านผู้ปกครอง': V('pfGuardianHomePhone'),
          'โทรมือถือผู้ปกครอง': guardianPhone,
          'รายได้ผู้ปกครอง': V('pfGuardianIncome'),
          'การเดินทาง': V('pfTravel'),
          'ระยะทาง(กม.)': V('pfDistance'),
          '_submittedViaForm': true,
          '_submittedAt': new Date().toISOString()
        };

        var student = {
          studentId: raw['เลขประจำตัวนักเรียน'] || nationalId,
          fullName: fullName,
          nickname: raw['ชื่อเล่น'],
          gender: gender,
          phone: raw['โทรนักเรียน'] || guardianPhone,
          raw: raw
        };

        // Use existing helpers — upsert classroom (creates if missing) then add student
        var classId = window.classroomId(year, grade, room);
        // Don't overwrite existing students — load existing and add new one
        var existing = await window.getStudentsOfClass(classId, true).catch(function(){return [];});
        // Check duplicate by national ID or studentId
        var dup = existing.find(function(s){
          return (s.raw && s.raw['เลขบัตรนักเรียน']===nationalId) ||
                 (student.studentId && s.studentId===student.studentId);
        });
        if(dup){
          window.showToast('พบข้อมูลซ้ำ — เลขบัตรประชาชนหรือเลขประจำตัวนี้มีอยู่แล้ว กรุณาติดต่อครูที่ปรึกษา','error',6000);
          btn.disabled=false; btn.textContent = '📤 ส่งข้อมูล';
          return;
        }
        var combined = existing.slice();
        combined.push(student);
        // Re-sort by studentId
        combined.sort(function(a,b){
          var ia=String(a.studentId||'').trim(), ib=String(b.studentId||'').trim();
          if(!ia&&!ib) return (a.fullName||'').localeCompare(b.fullName||'','th');
          if(!ia) return 1; if(!ib) return -1;
          return ia.localeCompare(ib,'th',{numeric:true});
        });
        combined.forEach(function(s,i){ s.order = i+1; });

        await window.upsertClassroom({
          academicYear: year, grade: grade, room: room,
          studentCount: combined.length,
          maleCount: combined.filter(function(s){return s.gender==='ชาย';}).length,
          femaleCount: combined.filter(function(s){return s.gender==='หญิง';}).length,
          sourceFormat: 'A'
        });
        await window.bulkSaveStudents(classId, combined);

        // Show success screen
        root.innerHTML =
          '<div class="pf-wrap">'+
            '<div class="pf-success">'+
              '<div class="pf-check">✅</div>'+
              '<h2>ส่งข้อมูลเรียบร้อยแล้ว</h2>'+
              '<p style="color:#475569;margin:.5rem 0">ขอบคุณ <strong>'+window.escHTML(fullName)+'</strong></p>'+
              '<p style="color:#6b7280;font-size:.9rem;margin-top:1rem">ครูที่ปรึกษาจะตรวจสอบข้อมูลและบันทึกในระบบสารสนเทศประจำชั้นต่อไป</p>'+
              '<button class="pf-submit" style="margin-top:1.5rem" onclick="location.reload()">กรอกอีกคน</button>'+
            '</div>'+
          '</div>';
        window.scrollTo({top:0, behavior:'smooth'});
      } catch(e){
        console.error(e);
        window.showToast('ส่งข้อมูลไม่สำเร็จ: '+e.message,'error',5000);
        btn.disabled=false; btn.textContent = '📤 ส่งข้อมูล';
      }
    }

    renderForm();
  };
})();
</script>

</body>
</html>
